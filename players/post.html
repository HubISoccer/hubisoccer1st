<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HubISoccer – Publication</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/feed.css">
    <style>
        /* Ajustements spécifiques pour la page post */
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
        }
        .post-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .post-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .comments-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .comment {
            margin-bottom: 15px;
        }
        .comment-author {
            font-weight: 600;
            color: var(--primary);
        }
        .comment-text {
            margin-top: 5px;
        }
        .cta-box {
            background: var(--bg-light);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        .navbar {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }
        .post-stats {
            display: flex;
            gap: 20px;
            margin: 15px 0;
            color: var(--gray);
            font-size: 0.9rem;
        }
        .post-stats span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .post-media img, .post-media video {
            max-width: 100%;
            max-height: 500px;
            border-radius: 12px;
            margin: 15px 0;
        }
        .load-more {
            text-align: center;
            margin-top: 20px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="dashboard-nav">
        <div class="nav-left">
            <img src="img/logo-navbar.png" alt="HubISoccer" class="logo-nav" onclick="window.location.href='../index.html'">
            <span class="dashboard-title">HubISoccer</span>
        </div>
        <div class="nav-right">
            <a href="feed.html" class="back-btn" style="background: var(--primary); color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none;">Communauté</a>
        </div>
    </nav>

    <div class="post-container" id="app">
        <div id="loader" class="feed-loader" style="display: flex; justify-content: center; padding: 40px;">
            <div class="spinner"></div>
        </div>
        <div id="postContent" style="display: none;"></div>
        <div id="commentsContent" style="display: none;"></div>
    </div>

    <script>
        // Configuration Supabase (identique)
        const SUPABASE_URL = 'https://wxlpcflanihqwumjwpjs.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4bHBjZmxhbmlocXd1bWp3cGpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzcwNzAsImV4cCI6MjA4Nzg1MzA3MH0.i1ZW-9MzSaeOKizKjaaq6mhtl7X23LsVpkkohc_p6Fw';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let postId = null;
        let currentUser = null;

        // Fonctions utilitaires (reprises de feed.js)
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        function timeSince(date) {
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            let interval = Math.floor(seconds / 31536000);
            if (interval >= 1) return `il y a ${interval} an${interval > 1 ? 's' : ''}`;
            interval = Math.floor(seconds / 2592000);
            if (interval >= 1) return `il y a ${interval} mois`;
            interval = Math.floor(seconds / 86400);
            if (interval >= 1) return `il y a ${interval} jour${interval > 1 ? 's' : ''}`;
            interval = Math.floor(seconds / 3600);
            if (interval >= 1) return `il y a ${interval} heure${interval > 1 ? 's' : ''}`;
            interval = Math.floor(seconds / 60);
            if (interval >= 1) return `il y a ${interval} minute${interval > 1 ? 's' : ''}`;
            return `il y a ${seconds} seconde${seconds > 1 ? 's' : ''}`;
        }

        async function loadPost() {
            const loader = document.getElementById('loader');
            const postDiv = document.getElementById('postContent');
            const commentsDiv = document.getElementById('commentsContent');

            if (!postId) {
                postDiv.innerHTML = '<p>Identifiant de publication manquant.</p>';
                loader.style.display = 'none';
                postDiv.style.display = 'block';
                return;
            }

            try {
                // Charger le post
                const { data: post, error } = await supabaseClient
                    .from('unified_posts')
                    .select('*')
                    .eq('id', postId)
                    .single();

                if (error || !post) {
                    throw new Error('Publication introuvable');
                }

                // Charger l'auteur
                const { data: author } = await supabaseClient
                    .from('profiles')
                    .select('id, full_name, avatar_url, username')
                    .eq('id', post.user_id)
                    .single();

                // Compteurs
                const { count: likesCount } = await supabaseClient
                    .from('unified_likes')
                    .select('*', { count: 'exact', head: true })
                    .eq('post_id', post.id);
                const { count: commentsCount } = await supabaseClient
                    .from('unified_comments')
                    .select('*', { count: 'exact', head: true })
                    .eq('post_id', post.id);
                const { count: sharesCount } = await supabaseClient
                    .from('unified_shares')
                    .select('*', { count: 'exact', head: true })
                    .eq('post_id', post.id);
                const { count: viewsCount } = await supabaseClient
                    .from('post_views')
                    .select('*', { count: 'exact', head: true })
                    .eq('post_id', post.id);

                // Construire le HTML du post
                let mediaHtml = '';
                if (post.media_url) {
                    if (post.media_type === 'image') {
                        mediaHtml = `<div class="post-media"><img src="${post.media_url}" alt="Post media" onclick="openMediaZoom('${post.media_url}', 'image')"></div>`;
                    } else if (post.media_type === 'video') {
                        mediaHtml = `<div class="post-media"><video src="${post.media_url}" controls></video></div>`;
                    }
                }

                const authorName = author?.full_name || 'Anonyme';
                const authorAvatar = author?.avatar_url || 'img/user-default.jpg';

                const postHtml = `
                    <div class="post-card">
                        <div class="post-header">
                            <img src="${authorAvatar}" alt="${authorName}">
                            <div class="post-author">
                                <h4>${escapeHtml(authorName)}</h4>
                                <small>@${author?.username || 'inconnu'} · ${timeSince(post.created_at)}</small>
                            </div>
                        </div>
                        <div class="post-content">${formatPostContent(post.content)}</div>
                        ${mediaHtml}
                        <div class="post-stats">
                            <span><i class="fas fa-heart"></i> ${likesCount || 0}</span>
                            <span><i class="fas fa-comment"></i> ${commentsCount || 0}</span>
                            <span><i class="fas fa-share"></i> ${sharesCount || 0}</span>
                            <span><i class="fas fa-eye"></i> ${viewsCount || 0}</span>
                        </div>
                        ${!currentUser ? `
                            <div class="cta-box">
                                <p>Connectez-vous pour interagir avec cette publication !</p>
                                <a href="../auth/login.html" class="btn-primary">Se connecter / S'inscrire</a>
                            </div>
                        ` : ''}
                    </div>
                `;

                // Charger les commentaires
                const { data: comments, error: commentsError } = await supabaseClient
                    .from('unified_comments')
                    .select('*, author:profiles!user_id(id, full_name, avatar_url, username)')
                    .eq('post_id', post.id)
                    .is('parent_id', null)
                    .order('created_at', { ascending: true });

                let commentsHtml = '<h3>Commentaires</h3>';
                if (commentsError) {
                    commentsHtml += '<p>Impossible de charger les commentaires.</p>';
                } else if (!comments || comments.length === 0) {
                    commentsHtml += '<p>Aucun commentaire pour le moment.</p>';
                } else {
                    comments.forEach(comment => {
                        const commentAuthor = comment.author?.full_name || 'Anonyme';
                        const commentAvatar = comment.author?.avatar_url || 'img/user-default.jpg';
                        commentsHtml += `
                            <div class="comment">
                                <div class="comment-header">
                                    <img src="${commentAvatar}" style="width: 30px; height: 30px; border-radius: 50%; vertical-align: middle; margin-right: 8px;">
                                    <span class="comment-author">${escapeHtml(commentAuthor)}</span>
                                    <small style="color: var(--gray);">${timeSince(comment.created_at)}</small>
                                </div>
                                <div class="comment-text">${formatPostContent(comment.content)}</div>
                            </div>
                        `;
                    });
                }

                // Si l'utilisateur n'est pas connecté, ajouter une incitation
                if (!currentUser) {
                    commentsHtml += `
                        <div class="cta-box">
                            <p>Connectez-vous pour commenter cette publication !</p>
                            <a href="../auth/login.html" class="btn-primary">Se connecter / S'inscrire</a>
                        </div>
                    `;
                }

                // Afficher
                postDiv.innerHTML = postHtml;
                commentsDiv.innerHTML = `<div class="comments-section">${commentsHtml}</div>`;
                loader.style.display = 'none';
                postDiv.style.display = 'block';
                commentsDiv.style.display = 'block';
            } catch (err) {
                console.error(err);
                loader.style.display = 'none';
                postDiv.style.display = 'block';
                postDiv.innerHTML = '<p style="color: red;">Publication introuvable ou une erreur est survenue.</p>';
            }
        }

        function formatPostContent(text) {
            if (!text) return '';
            text = text.replace(/@(\w+)/g, '<a href="#" onclick="openUserProfileByUsername(\'$1\')">@$1</a>');
            text = text.replace(/#(\w+)/g, '<a href="#" onclick="searchHashtag(\'$1\')">#$1</a>');
            return text;
        }

        // (Ces fonctions sont pour les hashtags/mentions ; elles ne feront rien sur cette page car non implémentées, mais évitent des erreurs)
        window.openUserProfileByUsername = (username) => { alert('Connectez-vous pour voir le profil'); };
        window.searchHashtag = (tag) => { alert('Connectez-vous pour rechercher des hashtags'); };
        window.openMediaZoom = (url, type) => {
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.backgroundColor = 'rgba(0,0,0,0.8)';
            modal.style.zIndex = '2000';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            if (type === 'image') {
                modal.innerHTML = `<img src="${url}" style="max-width:90%; max-height:90%;">`;
            } else {
                modal.innerHTML = `<video src="${url}" controls autoplay style="max-width:90%; max-height:90%;"></video>`;
            }
            modal.onclick = () => modal.remove();
            document.body.appendChild(modal);
        };

        // Vérifier si l'utilisateur est connecté (pour afficher les messages incitatifs)
        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            currentUser = session?.user || null;
        }

        // Initialisation
        (async () => {
            await checkAuth();
            const urlParams = new URLSearchParams(window.location.search);
            postId = urlParams.get('id');
            if (!postId) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('postContent').style.display = 'block';
                document.getElementById('postContent').innerHTML = '<p>Identifiant de publication manquant.</p>';
                return;
            }
            await loadPost();
        })();
    </script>
</body>
</html>
