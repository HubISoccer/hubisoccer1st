<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration de la licence | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="css/admin-global.css">
    <style>
        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: var(--shadow);
        }
        .section h2 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
            color: var(--dark);
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--light-gray);
            border-radius: 5px;
        }
        .file-upload {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .file-upload input {
            flex: 1;
        }
        .preview-img {
            max-width: 100px;
            max-height: 50px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .btn-save {
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Navbar admin -->
    <nav class="admin-nav">
        <div class="nav-left" onclick="window.location.href='index.html'" style="cursor: pointer;">
            <img src="img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
            <span class="admin-title">Configuration de la licence</span>
        </div>
        <div class="nav-right">
            <span class="user-name" id="userName">Admin</span>
            <button class="logout-link" id="logoutBtn">Déconnexion</button>
        </div>
    </nav>

    <div class="admin-main">
        <div class="admin-container">
            <h1>Paramètres de la carte de licence</h1>

            <form id="configForm">
                <div class="config-grid">
                    <!-- Recto -->
                    <div class="section">
                        <h2>Recto de la carte</h2>
                        <div class="form-group">
                            <label>Drapeau (URL ou upload)</label>
                            <div class="file-upload">
                                <input type="file" id="flagFile" accept="image/*">
                                <input type="text" id="recto_flag_url" placeholder="URL du drapeau">
                            </div>
                            <img id="flagPreview" class="preview-img" src="" alt="Prévisualisation">
                        </div>
                        <div class="form-group">
                            <label>Logo HubISoccer (URL ou upload)</label>
                            <div class="file-upload">
                                <input type="file" id="logoFile" accept="image/*">
                                <input type="text" id="recto_logo_url" placeholder="URL du logo">
                            </div>
                            <img id="logoPreview" class="preview-img" src="" alt="Prévisualisation">
                        </div>
                        <div class="form-group">
                            <label>Pays (ex: République du Bénin)</label>
                            <input type="text" id="recto_country">
                        </div>
                        <div class="form-group">
                            <label>Ministère</label>
                            <input type="text" id="recto_ministry">
                        </div>
                        <div class="form-group">
                            <label>Nom de la société</label>
                            <input type="text" id="recto_company_name">
                        </div>
                        <div class="form-group">
                            <label>Titre de la carte</label>
                            <input type="text" id="recto_title">
                        </div>
                    </div>

                    <!-- Verso -->
                    <div class="section">
                        <h2>Verso de la carte</h2>
                        <div class="form-group">
                            <label>Logo en filigrane (URL ou upload)</label>
                            <div class="file-upload">
                                <input type="file" id="watermarkFile" accept="image/*">
                                <input type="text" id="verso_background_logo_url" placeholder="URL du logo">
                            </div>
                            <img id="watermarkPreview" class="preview-img" src="" alt="Prévisualisation">
                        </div>
                        <div class="form-group">
                            <label>Mention "Délivrée par"</label>
                            <textarea id="verso_issued_by" rows="2" placeholder="The Hub of Inspiration of Soccer, ..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Informations juridiques</label>
                            <textarea id="verso_legal_info" rows="3" placeholder="RCCM, IFU, etc."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Nom du président</label>
                            <input type="text" id="president_name">
                        </div>
                        <div class="form-group">
                            <label>Signature du président (URL ou upload)</label>
                            <div class="file-upload">
                                <input type="file" id="signatureFile" accept="image/*">
                                <input type="text" id="president_signature_url" placeholder="URL de la signature">
                            </div>
                            <img id="signaturePreview" class="preview-img" src="" alt="Prévisualisation">
                        </div>
                        <div class="form-group">
                            <label>Cachet (URL ou upload)</label>
                            <div class="file-upload">
                                <input type="file" id="stampFile" accept="image/*">
                                <input type="text" id="president_stamp_url" placeholder="URL du cachet">
                            </div>
                            <img id="stampPreview" class="preview-img" src="" alt="Prévisualisation">
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-save">Enregistrer la configuration</button>
            </form>
        </div>
    </div>

    <script src="js/admin-common.js"></script>
    <script src="js/license-config.js"></script>
</body>
</html>
