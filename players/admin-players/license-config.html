<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration de la licence | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="css/admin-global.css">
    <style>
        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: var(--shadow);
        }
        .section h2 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.3rem;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
            color: var(--dark);
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--light-gray);
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--primary);
            outline: none;
        }
        .file-upload-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .file-upload-group input[type="file"] {
            display: none;
        }
        .file-upload-group label {
            background: var(--primary);
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .file-upload-group label:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        .file-upload-group input[type="text"] {
            flex: 1;
        }
        .preview-img {
            max-width: 100px;
            max-height: 60px;
            border: 1px solid var(--light-gray);
            border-radius: 5px;
            margin-top: 5px;
            padding: 3px;
            background: var(--bg-light);
        }
        .btn-save {
            margin-top: 30px;
            padding: 15px 40px;
            background: linear-gradient(45deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-block;
        }
        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(85,27,140,0.3);
        }
        .info-text {
            font-size: 0.8rem;
            color: var(--gray);
            margin-top: 5px;
        }
        @media (max-width: 700px) {
            .config-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Navbar admin -->
    <nav class="admin-nav">
        <div class="nav-left" onclick="window.location.href='index.html'" style="cursor: pointer;">
            <img src="img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
            <span class="admin-title">Configuration de la licence</span>
        </div>
        <div class="nav-right">
            <span class="user-name" id="userName">Admin</span>
            <button class="logout-link" id="logoutBtn">Déconnexion</button>
        </div>
    </nav>

    <div class="admin-main">
        <div class="admin-container">
            <div class="admin-header">
                <h1><i class="fas fa-id-card"></i> Paramètres de la carte de licence</h1>
                <button class="btn-refresh" id="refreshBtn"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
            </div>

            <form id="configForm">
                <div class="config-grid">
                    <!-- Recto -->
                    <div class="section">
                        <h2><i class="fas fa-address-card"></i> Recto de la carte</h2>
                        
                        <div class="form-group">
                            <label>Drapeau du pays</label>
                            <div class="file-upload-group">
                                <input type="file" id="flagFile" accept="image/*">
                                <label for="flagFile"><i class="fas fa-upload"></i> Choisir un fichier</label>
                                <input type="text" id="recto_flag_url" placeholder="URL du drapeau">
                            </div>
                            <img id="flagPreview" class="preview-img" src="" alt="Aperçu">
                            <div class="info-text">Formats acceptés : PNG, JPG, SVG. Taille max : 2 Mo.</div>
                        </div>

                        <div class="form-group">
                            <label>Logo HubISoccer</label>
                            <div class="file-upload-group">
                                <input type="file" id="logoFile" accept="image/*">
                                <label for="logoFile"><i class="fas fa-upload"></i> Choisir un fichier</label>
                                <input type="text" id="recto_logo_url" placeholder="URL du logo">
                            </div>
                            <img id="logoPreview" class="preview-img" src="" alt="Aperçu">
                        </div>

                        <div class="form-group">
                            <label>Pays (ex: République du Bénin)</label>
                            <input type="text" id="recto_country" placeholder="République du Bénin">
                        </div>

                        <div class="form-group">
                            <label>Ministère</label>
                            <input type="text" id="recto_ministry" placeholder="Ministère des Sports et des Loisirs">
                        </div>

                        <div class="form-group">
                            <label>Nom de la société</label>
                            <input type="text" id="recto_company_name" placeholder="The Hub of Inspiration of Soccer">
                        </div>

                        <div class="form-group">
                            <label>Titre de la carte</label>
                            <input type="text" id="recto_title" placeholder="Licence HubISoccer">
                        </div>
                    </div>

                    <!-- Verso -->
                    <div class="section">
                        <h2><i class="fas fa-rotate-left"></i> Verso de la carte</h2>

                        <div class="form-group">
                            <label>Logo en filigrane (arrière-plan)</label>
                            <div class="file-upload-group">
                                <input type="file" id="watermarkFile" accept="image/*">
                                <label for="watermarkFile"><i class="fas fa-upload"></i> Choisir un fichier</label>
                                <input type="text" id="verso_background_logo_url" placeholder="URL du logo">
                            </div>
                            <img id="watermarkPreview" class="preview-img" src="" alt="Aperçu">
                        </div>

                        <div class="form-group">
                            <label>Mention "Délivrée par"</label>
                            <textarea id="verso_issued_by" rows="2" placeholder="The Hub of Inspiration of Soccer - Direction Nationale des Licences"></textarea>
                        </div>

                        <div class="form-group">
                            <label>Informations juridiques</label>
                            <textarea id="verso_legal_info" rows="3" placeholder="RCCM : RB/ABC/24 A 111814 | IFU : 0201910800236"></textarea>
                        </div>

                        <div class="form-group">
                            <label>Nom du président</label>
                            <input type="text" id="president_name" placeholder="Ozawa">
                        </div>

                        <div class="form-group">
                            <label>Signature du président</label>
                            <div class="file-upload-group">
                                <input type="file" id="signatureFile" accept="image/*">
                                <label for="signatureFile"><i class="fas fa-upload"></i> Choisir un fichier</label>
                                <input type="text" id="president_signature_url" placeholder="URL de la signature">
                            </div>
                            <img id="signaturePreview" class="preview-img" src="" alt="Aperçu">
                        </div>

                        <div class="form-group">
                            <label>Cachet / Sceau officiel</label>
                            <div class="file-upload-group">
                                <input type="file" id="stampFile" accept="image/*">
                                <label for="stampFile"><i class="fas fa-upload"></i> Choisir un fichier</label>
                                <input type="text" id="president_stamp_url" placeholder="URL du cachet">
                            </div>
                            <img id="stampPreview" class="preview-img" src="" alt="Aperçu">
                        </div>
                    </div>
                </div>

                <div style="text-align: center;">
                    <button type="submit" class="btn-save"><i class="fas fa-save"></i> Enregistrer la configuration</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="js/admin-common.js"></script>
    <script src="js/license-config.js"></script>
</body>
</html>
