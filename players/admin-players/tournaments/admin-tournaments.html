<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Tournois | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== VARIABLES ===== */
        :root {
            --primary: #551B8C;
            --primary-dark: #3d1266;
            --gold: #ffcc00;
            --bg-light: #F0F8FF;
            --white: #ffffff;
            --dark: #1a1a1a;
            --gray: #6c757d;
            --light-gray: #e9ecef;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --shadow-hover: 0 15px 40px rgba(85,27,140,0.1);
            --transition: all 0.3s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            color: var(--dark);
            min-height: 100vh;
        }
        /* Navbar admin */
        .admin-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            background: var(--white);
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }
        .logo-nav { height: 40px; }
        .admin-title {
            font-weight: 600;
            color: var(--primary);
            border-left: 2px solid var(--light-gray);
            padding-left: 15px;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-name { font-weight: 500; color: var(--dark); }
        .logout-link {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
        }
        .logout-link:hover { background: var(--primary); color: white; }
        /* Contenu principal */
        .admin-main { padding: 40px 5%; min-height: calc(100vh - 70px); }
        .admin-container { max-width: 1400px; margin: 0 auto; }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        h1 { color: var(--primary-dark); }
        .btn-refresh {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-refresh:hover { background: var(--primary); color: white; }
        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-add:hover { background: var(--primary-dark); }
        /* Onglets */
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--light-gray);
            padding-bottom: 10px;
        }
        .tab-btn {
            padding: 10px 25px;
            background: transparent;
            border: none;
            border-radius: 8px 8px 0 0;
            font-weight: 600;
            color: var(--gray);
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn:hover { color: var(--primary); }
        .tab-btn.active {
            color: var(--primary);
            background: white;
            box-shadow: 0 -3px 5px rgba(0,0,0,0.05);
            position: relative;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--gold);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        /* Liste des tournois */
        .tournaments-list { display: flex; flex-direction: column; gap: 15px; }
        .tournament-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.2s;
            border-left: 5px solid var(--primary);
            flex-wrap: wrap;
        }
        .tournament-card:hover { transform: translateX(3px); box-shadow: var(--shadow-hover); }
        .tournament-info { flex: 2; min-width: 200px; }
        .tournament-name {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 3px;
        }
        .tournament-date {
            font-size: 0.8rem;
            color: var(--gray);
        }
        .tournament-stats {
            flex: 1;
            font-size: 0.9rem;
            color: var(--dark);
        }
        .tournament-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .btn-action {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
        }
        .btn-action.view { background: var(--primary); color: white; }
        .btn-action.view:hover { background: var(--primary-dark); }
        .btn-action.edit { background: #17a2b8; color: white; }
        .btn-action.edit:hover { background: #138496; }
        .btn-action.delete { background: var(--danger); color: white; }
        .btn-action.delete:hover { background: #c82333; }
        .btn-action.player { background: var(--success); color: white; }
        .btn-action.player:hover { background: #218838; }
        /* Modales */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            overflow: auto;
        }
        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow-hover);
            animation: modalopen 0.3s ease;
        }
        .modal-content.large { max-width: 800px; }
        .modal-content.small { max-width: 400px; }
        @keyframes modalopen {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h2 { color: var(--primary); }
        .close-modal {
            color: var(--gray);
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-modal:hover { color: var(--dark); }
        .modal-body { max-height: 70vh; overflow-y: auto; }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--light-gray);
            flex-wrap: wrap;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--dark);
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--light-gray);
            border-radius: 5px;
            font-family: 'Poppins', sans-serif;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-cancel {
            padding: 10px 20px;
            background: var(--light-gray);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-save {
            padding: 10px 20px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-confirm {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        /* Gestion des joueurs */
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .player-check-item {
            background: var(--bg-light);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .player-check-item input { width: auto; }
        .player-check-item label { flex: 1; }
        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            min-width: 250px;
            background: white;
            border-radius: 8px;
            padding: 12px 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(400px);
            animation: slideIn 0.3s forwards;
            pointer-events: auto;
            border-left: 4px solid transparent;
        }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast.info { border-left-color: var(--primary); }
        .toast.warning { border-left-color: var(--warning); }
        .toast-icon { font-size: 1.2rem; }
        .toast-content { flex: 1; font-size: 0.9rem; color: var(--dark); }
        .toast-close {
            background: none;
            border: none;
            color: var(--gray);
            cursor: pointer;
            font-size: 1rem;
        }
        @keyframes slideIn { to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(400px); } }
        /* Loader */
        .global-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(85,27,140,0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Responsive */
        @media (max-width: 900px) {
            .tournament-card { flex-direction: column; align-items: flex-start; }
            .tournament-actions { width: 100%; justify-content: space-around; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Navbar admin -->
    <nav class="admin-nav">
        <div class="nav-left" onclick="window.location.href='../index.html'">
            <img src="../../img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
            <span class="admin-title">Administration - Tournois</span>
        </div>
        <div class="nav-right">
            <span class="user-name" id="userName">Admin</span>
            <button class="logout-link" id="logoutBtn">Déconnexion</button>
        </div>
    </nav>

    <div class="admin-main">
        <div class="admin-container">
            <div class="admin-header">
                <h1><i class="fas fa-trophy"></i> Gestion des tournois</h1>
                <div>
                    <button class="btn-refresh" id="refreshBtn"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
                    <button class="btn-add" id="addTournamentBtn"><i class="fas fa-plus"></i> Nouveau tournoi</button>
                </div>
            </div>

            <!-- Onglets -->
            <div class="admin-tabs">
                <button class="tab-btn active" data-tab="tournaments">Tournois</button>
                <button class="tab-btn" data-tab="players">Participants</button>
            </div>

            <!-- Contenu des onglets -->
            <div id="tab-tournaments" class="tab-content active">
                <div id="tournamentsList" class="tournaments-list"></div>
            </div>

            <div id="tab-players" class="tab-content">
                <div class="filters-panel" style="display: flex; gap: 15px; margin-bottom: 20px;">
                    <select id="tournamentFilter" style="flex: 2; padding: 8px;">
                        <option value="">Tous les tournois</option>
                    </select>
                    <input type="text" id="playerSearch" placeholder="Rechercher un joueur..." style="flex: 3; padding: 8px;">
                </div>
                <div id="playersList" class="tournaments-list"></div>
            </div>
        </div>
    </div>

    <!-- MODALE TOURNOI (ajout/édition) -->
    <div id="tournamentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="tournamentModalTitle">Ajouter un tournoi</h2>
                <span class="close-modal" onclick="closeTournamentModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="tournamentForm">
                    <input type="hidden" id="tournamentId">
                    <div class="form-group">
                        <label>Nom du tournoi</label>
                        <input type="text" id="tournamentName" required>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="tournamentDate" required>
                    </div>
                    <div class="form-group">
                        <label>URL du stream (YouTube)</label>
                        <input type="url" id="tournamentStreamUrl" placeholder="https://www.youtube.com/embed/...">
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-cancel" onclick="closeTournamentModal()">Annuler</button>
                        <button type="submit" class="btn-save">Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MODALE GESTION DES JOUEURS -->
    <div id="playersModal" class="modal">
        <div class="modal-content large">
            <div class="modal-header">
                <h2>Gérer les joueurs du tournoi</h2>
                <span class="close-modal" onclick="closePlayersModal()">&times;</span>
            </div>
            <div class="modal-body">
                <h3 id="playersModalTournamentName"></h3>
                <div id="playersCheckList" class="players-grid"></div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closePlayersModal()">Fermer</button>
                    <button type="button" class="btn-save" onclick="savePlayers()">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODALE DE CONFIRMATION -->
    <div id="confirmModal" class="modal">
        <div class="modal-content small">
            <div class="modal-header">
                <h2>Confirmation</h2>
                <span class="close-modal" onclick="closeConfirmModal()">&times;</span>
            </div>
            <div class="modal-body" id="confirmModalBody">
                <p>Êtes-vous sûr ?</p>
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeConfirmModal()">Annuler</button>
                    <button class="btn-confirm" id="confirmActionBtn">Confirmer</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Loader global -->
    <div id="globalLoader" class="global-loader" style="display: none;">
        <div class="spinner"></div>
    </div>

    <script src="admin-tournaments.js"></script>
</body>
</html>
