<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin CV | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../css/admin-global.css">
    <link rel="stylesheet" href="admin-edit-cv.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Navbar admin -->
    <nav class="admin-nav">
        <div class="nav-left" onclick="window.location.href='../index.html'" style="cursor: pointer;">
            <img src="../../img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
            <span class="admin-title">Administration - CV Joueurs</span>
        </div>
        <div class="nav-right">
            <span class="user-name" id="userName">Admin</span>
            <button class="logout-link" id="logoutBtn">Déconnexion</button>
        </div>
    </nav>

    <div class="admin-main">
        <div class="admin-container">
            <div class="admin-header">
                <h1><i class="fas fa-file-alt"></i> Gestion des CV</h1>
                <button class="btn-refresh" id="refreshBtn"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
            </div>

            <!-- Filtres -->
            <div class="filters-panel">
                <input type="text" id="searchInput" placeholder="Rechercher par nom du joueur...">
                <select id="statusFilter">
                    <option value="all">Tous les statuts</option>
                    <option value="pending">En attente</option>
                    <option value="approved">Validés</option>
                    <option value="rejected">Rejetés</option>
                </select>
            </div>

            <!-- Statistiques rapides -->
            <div class="stats-cards">
                <div class="stat-card">
                    <span class="stat-label">En attente</span>
                    <span class="stat-value" id="pendingCount">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Validés</span>
                    <span class="stat-value" id="approvedCount">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Rejetés</span>
                    <span class="stat-value" id="rejectedCount">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Total</span>
                    <span class="stat-value" id="totalCount">0</span>
                </div>
            </div>

            <!-- Liste des CV -->
            <div id="cvList" class="cv-list">
                <!-- Les cartes seront chargées dynamiquement -->
            </div>
        </div>
    </div>

    <!-- MODALE DE DÉTAIL DU CV -->
    <div id="cvDetailModal" class="modal">
        <div class="modal-content large">
            <div class="modal-header">
                <h2>Détail du CV</h2>
                <span class="close-modal" onclick="closeCvModal()">&times;</span>
            </div>
            <div class="modal-body" id="cvModalBody">
                <!-- Rempli dynamiquement -->
            </div>
            <div class="modal-footer">
                <button class="btn-action approve" id="modalApproveBtn"><i class="fas fa-check"></i> Approuver</button>
                <button class="btn-action reject" id="modalRejectBtn"><i class="fas fa-times"></i> Rejeter</button>
                <button class="btn-action pending" id="modalPendingBtn"><i class="fas fa-clock"></i> En attente</button>
                <button class="btn-action delete" id="modalDeleteBtn"><i class="fas fa-trash"></i> Supprimer</button>
                <button class="btn-action edit" id="modalEditBtn"><i class="fas fa-edit"></i> Modifier</button>
                <button class="btn-action close" onclick="closeCvModal()"><i class="fas fa-times"></i> Fermer</button>
            </div>
        </div>
    </div>

    <!-- MODALE D'ÉDITION RAPIDE DU CV -->
    <div id="editCvModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Modifier le CV</h2>
                <span class="close-modal" onclick="closeEditModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="editCvForm">
                    <div class="form-group">
                        <label>Nom complet</label>
                        <input type="text" id="editNom" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Poste</label>
                        <input type="text" id="editPoste" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Téléphone</label>
                        <input type="text" id="editTelephone" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="editEmail" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Club</label>
                        <input type="text" id="editClub" class="form-control">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-save">Enregistrer</button>
                        <button type="button" class="btn-cancel" onclick="closeEditModal()">Annuler</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MODALE DE CONFIRMATION -->
    <div id="confirmModal" class="modal">
        <div class="modal-content small">
            <div class="modal-header">
                <h2>Confirmation</h2>
                <span class="close-modal" onclick="closeConfirmModal()">&times;</span>
            </div>
            <div class="modal-body" id="confirmModalBody">
                <p>Êtes-vous sûr ?</p>
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeConfirmModal()">Annuler</button>
                    <button class="btn-confirm" id="confirmActionBtn">Confirmer</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="../js/admin-common.js"></script>
    <script src="admin-edit-cv.js"></script>
</body>
</html>
