<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Certifications | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== VARIABLES (reprises pour être autonome) ===== */
        :root {
            --primary: #551B8C;
            --primary-dark: #3d1266;
            --gold: #ffcc00;
            --bg-light: #F0F8FF;
            --white: #ffffff;
            --dark: #1a1a1a;
            --gray: #6c757d;
            --light-gray: #e9ecef;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --shadow-hover: 0 15px 40px rgba(85,27,140,0.1);
            --transition: all 0.3s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            color: var(--dark);
            min-height: 100vh;
        }
        /* Navbar admin */
        .admin-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            background: var(--white);
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }
        .logo-nav { height: 40px; }
        .admin-title {
            font-weight: 600;
            color: var(--primary);
            border-left: 2px solid var(--light-gray);
            padding-left: 15px;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-name { font-weight: 500; color: var(--dark); }
        .logout-link {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
        }
        .logout-link:hover { background: var(--primary); color: white; }
        /* Contenu principal */
        .admin-main { padding: 40px 5%; min-height: calc(100vh - 70px); }
        .admin-container { max-width: 1400px; margin: 0 auto; }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h1 { color: var(--primary-dark); }
        .btn-refresh {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-refresh:hover { background: var(--primary); color: white; }
        /* Filtres */
        .filters-panel {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: var(--shadow);
        }
        .filters-panel input {
            flex: 2;
            padding: 10px;
            border: 1px solid var(--light-gray);
            border-radius: 5px;
            font-family: 'Poppins', sans-serif;
        }
        .filters-panel select {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--light-gray);
            border-radius: 5px;
            font-family: 'Poppins', sans-serif;
        }
        /* Statistiques */
        .stats-cards {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 15px 20px;
            box-shadow: var(--shadow);
            flex: 1;
            min-width: 120px;
            text-align: center;
        }
        .stat-label { font-size: 0.9rem; color: var(--gray); text-transform: uppercase; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--primary); }
        /* Liste des certificats */
        .certs-list { display: flex; flex-direction: column; gap: 15px; }
        .cert-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.2s;
            border-left: 5px solid transparent;
            flex-wrap: wrap;
        }
        .cert-card:hover { transform: translateX(3px); box-shadow: var(--shadow-hover); }
        .cert-card.pending { border-left-color: var(--warning); }
        .cert-card.approved { border-left-color: var(--success); }
        .cert-card.rejected { border-left-color: var(--danger); }
        .cert-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }
        .cert-info { flex: 2; min-width: 200px; }
        .cert-player { font-weight: 600; color: var(--primary); margin-bottom: 3px; }
        .cert-title { font-weight: 500; font-size: 0.9rem; }
        .cert-meta { font-size: 0.8rem; color: var(--gray); }
        .cert-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .cert-status.pending { background: var(--warning); color: #856404; }
        .cert-status.approved { background: var(--success); color: white; }
        .cert-status.rejected { background: var(--danger); color: white; }
        .cert-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .btn-action {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
        }
        .btn-action.view { background: var(--primary); color: white; }
        .btn-action.view:hover { background: var(--primary-dark); }
        .btn-action.approve { background: var(--success); color: white; }
        .btn-action.approve:hover { background: #218838; }
        .btn-action.reject { background: var(--danger); color: white; }
        .btn-action.reject:hover { background: #c82333; }
        .btn-action.pending { background: var(--warning); color: #856404; }
        .btn-action.pending:hover { background: #e0a800; }
        .btn-action.download { background: #17a2b8; color: white; }
        .btn-action.download:hover { background: #138496; }
        /* Modales */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            overflow: auto;
        }
        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            box-shadow: var(--shadow-hover);
            animation: modalopen 0.3s ease;
        }
        .modal-content.large { max-width: 800px; }
        .modal-content.small { max-width: 400px; }
        @keyframes modalopen {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h2 { color: var(--primary); }
        .close-modal {
            color: var(--gray);
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-modal:hover { color: var(--dark); }
        .modal-body { max-height: 70vh; overflow-y: auto; }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--light-gray);
            flex-wrap: wrap;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-cancel {
            padding: 10px 20px;
            background: var(--light-gray);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-confirm {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        /* Détail certificat */
        .detail-row {
            display: flex;
            margin-bottom: 10px;
            padding: 8px;
            background: var(--bg-light);
            border-radius: 5px;
        }
        .detail-label {
            font-weight: 600;
            width: 120px;
            color: var(--gray);
        }
        .detail-value {
            flex: 1;
            color: var(--dark);
        }
        .file-preview {
            text-align: center;
            margin: 15px 0;
        }
        .file-preview iframe, .file-preview img {
            max-width: 100%;
            max-height: 300px;
            border: 1px solid var(--light-gray);
            border-radius: 5px;
        }
        .file-preview .file-icon {
            font-size: 4rem;
            color: var(--primary);
        }
        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            min-width: 250px;
            background: white;
            border-radius: 8px;
            padding: 12px 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(400px);
            animation: slideIn 0.3s forwards;
            pointer-events: auto;
            border-left: 4px solid transparent;
        }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast.info { border-left-color: var(--primary); }
        .toast.warning { border-left-color: var(--warning); }
        .toast-icon { font-size: 1.2rem; }
        .toast-content { flex: 1; font-size: 0.9rem; color: var(--dark); }
        .toast-close {
            background: none;
            border: none;
            color: var(--gray);
            cursor: pointer;
            font-size: 1rem;
        }
        @keyframes slideIn { to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(400px); } }
        /* Loader */
        .global-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(85,27,140,0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Responsive */
        @media (max-width: 900px) {
            .filters-panel, .stats-cards { flex-direction: column; }
            .cert-card { flex-direction: column; align-items: flex-start; }
            .cert-actions { width: 100%; justify-content: space-around; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Navbar admin -->
    <nav class="admin-nav">
        <div class="nav-left" onclick="window.location.href='../index.html'">
            <img src="../../img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
            <span class="admin-title">Administration - Certifications</span>
        </div>
        <div class="nav-right">
            <span class="user-name" id="userName">Admin</span>
            <button class="logout-link" id="logoutBtn">Déconnexion</button>
        </div>
    </nav>

    <div class="admin-main">
        <div class="admin-container">
            <div class="admin-header">
                <h1><i class="fas fa-certificate"></i> Gestion des certificats</h1>
                <button class="btn-refresh" id="refreshBtn"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
            </div>

            <!-- Filtres -->
            <div class="filters-panel">
                <input type="text" id="searchInput" placeholder="Rechercher par joueur ou titre...">
                <select id="statusFilter">
                    <option value="all">Tous les statuts</option>
                    <option value="pending">En attente</option>
                    <option value="approved">Validés</option>
                    <option value="rejected">Rejetés</option>
                </select>
            </div>

            <!-- Statistiques -->
            <div class="stats-cards">
                <div class="stat-card"><span class="stat-label">En attente</span><span class="stat-value" id="pendingCount">0</span></div>
                <div class="stat-card"><span class="stat-label">Validés</span><span class="stat-value" id="approvedCount">0</span></div>
                <div class="stat-card"><span class="stat-label">Rejetés</span><span class="stat-value" id="rejectedCount">0</span></div>
                <div class="stat-card"><span class="stat-label">Total</span><span class="stat-value" id="totalCount">0</span></div>
            </div>

            <!-- Liste des certificats -->
            <div id="certsList" class="certs-list"></div>
        </div>
    </div>

    <!-- MODALE DE DÉTAIL -->
    <div id="certDetailModal" class="modal">
        <div class="modal-content large">
            <div class="modal-header">
                <h2>Détail du certificat</h2>
                <span class="close-modal" onclick="closeDetailModal()">&times;</span>
            </div>
            <div class="modal-body" id="certModalBody"></div>
            <div class="modal-footer">
                <button class="btn-action approve" id="modalApproveBtn"><i class="fas fa-check"></i> Approuver</button>
                <button class="btn-action reject" id="modalRejectBtn"><i class="fas fa-times"></i> Rejeter</button>
                <button class="btn-action pending" id="modalPendingBtn"><i class="fas fa-clock"></i> En attente</button>
                <button class="btn-action close" onclick="closeDetailModal()"><i class="fas fa-times"></i> Fermer</button>
            </div>
        </div>
    </div>

    <!-- MODALE DE CONFIRMATION -->
    <div id="confirmModal" class="modal">
        <div class="modal-content small">
            <div class="modal-header">
                <h2>Confirmation</h2>
                <span class="close-modal" onclick="closeConfirmModal()">&times;</span>
            </div>
            <div class="modal-body" id="confirmModalBody">
                <p>Êtes-vous sûr ?</p>
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeConfirmModal()">Annuler</button>
                    <button class="btn-confirm" id="confirmActionBtn">Confirmer</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Loader global -->
    <div id="globalLoader" class="global-loader" style="display: none;">
        <div class="spinner"></div>
    </div>

    <script src="admin-certifications.js"></script>
</body>
</html>
