<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Support | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== VARIABLES (identiques aux autres pages admin) ===== */
        :root {
            --primary: #551B8C;
            --primary-dark: #3d1266;
            --gold: #ffcc00;
            --bg-light: #F0F8FF;
            --white: #ffffff;
            --dark: #1a1a1a;
            --gray: #6c757d;
            --light-gray: #e9ecef;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --shadow-hover: 0 15px 40px rgba(85,27,140,0.1);
            --transition: all 0.3s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            color: var(--dark);
            min-height: 100vh;
        }
        /* Navbar admin */
        .admin-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            background: var(--white);
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }
        .logo-nav { height: 40px; }
        .admin-title {
            font-weight: 600;
            color: var(--primary);
            border-left: 2px solid var(--light-gray);
            padding-left: 15px;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-name { font-weight: 500; color: var(--dark); }
        .logout-link {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
        }
        .logout-link:hover { background: var(--primary); color: white; }
        /* Contenu principal */
        .admin-main { padding: 40px 5%; min-height: calc(100vh - 70px); }
        .admin-container { max-width: 1400px; margin: 0 auto; }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h1 { color: var(--primary-dark); }
        .btn-refresh {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-refresh:hover { background: var(--primary); color: white; }
        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-left: 10px;
        }
        .btn-add:hover { background: var(--primary-dark); }
        /* Onglets */
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--light-gray);
            padding-bottom: 10px;
        }
        .tab-btn {
            padding: 10px 25px;
            background: transparent;
            border: none;
            border-radius: 8px 8px 0 0;
            font-weight: 600;
            color: var(--gray);
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn:hover { color: var(--primary); }
        .tab-btn.active {
            color: var(--primary);
            background: white;
            box-shadow: 0 -3px 5px rgba(0,0,0,0.05);
            position: relative;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--gold);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        /* Filtres */
        .filters-panel {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            flex-wrap: wrap;
        }
        .filters-panel input {
            flex: 2;
            padding: 10px;
            border: 1px solid var(--light-gray);
            border-radius: 5px;
            font-family: 'Poppins', sans-serif;
        }
        .filters-panel select {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--light-gray);
            border-radius: 5px;
            font-family: 'Poppins', sans-serif;
        }
        /* Listes */
        .items-list { display: flex; flex-direction: column; gap: 15px; }
        .item-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.2s;
            flex-wrap: wrap;
        }
        .item-card:hover { transform: translateX(3px); box-shadow: var(--shadow-hover); }
        .item-info { flex: 2; min-width: 250px; }
        .item-player { font-weight: 600; color: var(--primary); margin-bottom: 3px; }
        .item-subject { font-weight: 500; }
        .item-meta { font-size: 0.8rem; color: var(--gray); margin-top: 5px; }
        .item-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .item-status.new { background: #17a2b8; color: white; }
        .item-status.in_progress { background: var(--warning); color: #856404; }
        .item-status.resolved { background: var(--success); color: white; }
        .item-status.closed { background: var(--gray); color: white; }
        .item-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .btn-action {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
        }
        .btn-action.view { background: var(--primary); color: white; }
        .btn-action.view:hover { background: var(--primary-dark); }
        .btn-action.edit { background: #17a2b8; color: white; }
        .btn-action.edit:hover { background: #138496; }
        .btn-action.delete { background: #dc3545; color: white; }
        .btn-action.delete:hover { background: #c82333; }
        .btn-action.toggle {
            background: var(--warning);
            color: #856404;
        }
        .btn-action.toggle.active { background: var(--success); color: white; }
        /* FAQ spécifique */
        .faq-item {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .faq-question { flex: 2; font-weight: 600; }
        .faq-answer { flex: 3; color: var(--gray); }
        .faq-position {
            width: 60px;
            text-align: center;
            font-weight: 600;
        }
        .faq-active {
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .faq-active.true { background: var(--success); color: white; }
        .faq-active.false { background: var(--gray); color: white; }
        /* Modales */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            overflow: auto;
        }
        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            box-shadow: var(--shadow-hover);
            animation: modalopen 0.3s ease;
        }
        .modal-content.large { max-width: 800px; }
        .modal-content.small { max-width: 400px; }
        @keyframes modalopen {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h2 { color: var(--primary); }
        .close-modal {
            color: var(--gray);
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-modal:hover { color: var(--dark); }
        .modal-body { max-height: 70vh; overflow-y: auto; }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-cancel {
            padding: 10px 20px;
            background: var(--light-gray);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-confirm {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-save {
            background: var(--success);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
        }
        /* Formulaires */
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--light-gray);
            border-radius: 5px;
            font-family: 'Poppins', sans-serif;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        /* Détail ticket */
        .detail-row {
            display: flex;
            margin-bottom: 10px;
            padding: 8px;
            background: var(--bg-light);
            border-radius: 5px;
        }
        .detail-label {
            font-weight: 600;
            width: 120px;
            color: var(--gray);
        }
        .detail-value {
            flex: 1;
            color: var(--dark);
        }
        .attachment-link {
            display: inline-block;
            margin-top: 5px;
            color: var(--primary);
            text-decoration: none;
        }
        .attachment-link:hover { text-decoration: underline; }
        /* Toast et loader */
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast {
            min-width: 250px; background: white; border-radius: 8px; padding: 12px 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px;
            transform: translateX(400px); animation: slideIn 0.3s forwards; pointer-events: auto;
            border-left: 4px solid transparent;
        }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast.info { border-left-color: var(--primary); }
        .toast.warning { border-left-color: var(--warning); }
        .toast-icon { font-size: 1.2rem; }
        .toast-content { flex: 1; font-size: 0.9rem; color: var(--dark); }
        .toast-close { background: none; border: none; color: var(--gray); cursor: pointer; font-size: 1rem; }
        @keyframes slideIn { to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(400px); } }
        .global-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center;
            z-index: 10000;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(85,27,140,0.2);
            border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Responsive */
        @media (max-width: 900px) {
            .filters-panel { flex-direction: column; }
            .item-card { flex-direction: column; align-items: flex-start; }
            .faq-item { flex-direction: column; align-items: flex-start; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Navbar admin -->
    <nav class="admin-nav">
        <div class="nav-left" onclick="window.location.href='../index.html'">
            <img src="../../img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
            <span class="admin-title">Administration - Support</span>
        </div>
        <div class="nav-right">
            <span class="user-name" id="userName">Admin</span>
            <button class="logout-link" id="logoutBtn">Déconnexion</button>
        </div>
    </nav>

    <div class="admin-main">
        <div class="admin-container">
            <div class="admin-header">
                <h1><i class="fas fa-headset"></i> Gestion du support</h1>
                <button class="btn-refresh" id="refreshBtn"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
            </div>

            <!-- Onglets -->
            <div class="admin-tabs">
                <button class="tab-btn active" data-tab="tickets">Tickets</button>
                <button class="tab-btn" data-tab="faq">FAQ</button>
            </div>

            <!-- Onglet Tickets -->
            <div id="tab-tickets" class="tab-content active">
                <div class="filters-panel">
                    <input type="text" id="ticketSearch" placeholder="Rechercher (joueur, sujet...)">
                    <select id="ticketStatusFilter">
                        <option value="">Tous statuts</option>
                        <option value="new">Nouveau</option>
                        <option value="in_progress">En cours</option>
                        <option value="resolved">Résolu</option>
                        <option value="closed">Fermé</option>
                    </select>
                </div>
                <div id="ticketsList" class="items-list"></div>
            </div>

            <!-- Onglet FAQ -->
            <div id="tab-faq" class="tab-content">
                <div class="filters-panel">
                    <input type="text" id="faqSearch" placeholder="Rechercher dans les questions...">
                    <button class="btn-add" id="addFaqBtn"><i class="fas fa-plus"></i> Ajouter une FAQ</button>
                </div>
                <div id="faqList" class="items-list"></div>
            </div>
        </div>
    </div>

    <!-- MODALE DÉTAIL TICKET -->
    <div id="ticketDetailModal" class="modal">
        <div class="modal-content large">
            <div class="modal-header">
                <h2>Détail du ticket</h2>
                <span class="close-modal" onclick="closeTicketModal()">&times;</span>
            </div>
            <div class="modal-body" id="ticketModalBody"></div>
            <div class="modal-footer" style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                <select id="ticketStatusSelect" style="padding: 8px; border-radius: 5px;">
                    <option value="new">Nouveau</option>
                    <option value="in_progress">En cours</option>
                    <option value="resolved">Résolu</option>
                    <option value="closed">Fermé</option>
                </select>
                <button class="btn-action" onclick="updateTicketStatus()">Changer le statut</button>
                <button class="btn-action close" onclick="closeTicketModal()">Fermer</button>
            </div>
        </div>
    </div>

    <!-- MODALE ÉDITION FAQ -->
    <div id="faqModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="faqModalTitle">Ajouter une FAQ</h2>
                <span class="close-modal" onclick="closeFaqModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="faqForm">
                    <input type="hidden" id="faqId">
                    <div class="form-group">
                        <label>Question *</label>
                        <input type="text" id="faqQuestion" required>
                    </div>
                    <div class="form-group">
                        <label>Réponse *</label>
                        <textarea id="faqAnswer" rows="5" required></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Position</label>
                            <input type="number" id="faqPosition" value="0">
                        </div>
                        <div class="form-group">
                            <label>Active</label>
                            <select id="faqActive">
                                <option value="true">Oui</option>
                                <option value="false">Non</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-cancel" onclick="closeFaqModal()">Annuler</button>
                        <button type="submit" class="btn-save">Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MODALE DE CONFIRMATION -->
    <div id="confirmModal" class="modal">
        <div class="modal-content small">
            <div class="modal-header">
                <h2>Confirmation</h2>
                <span class="close-modal" onclick="closeConfirmModal()">&times;</span>
            </div>
            <div class="modal-body" id="confirmModalBody">
                <p>Êtes-vous sûr ?</p>
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeConfirmModal()">Annuler</button>
                    <button class="btn-confirm" id="confirmActionBtn">Confirmer</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Loader global -->
    <div id="globalLoader" class="global-loader" style="display: none;">
        <div class="spinner"></div>
    </div>

    <script src="admin-support.js"></script>
</body>
</html>
