<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #551B8C;
            text-align: center;
            margin-bottom: 10px;
        }
        p {
            text-align: center;
            color: #6c757d;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #1a1a1a;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
        }
        input:focus {
            border-color: #551B8C;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #551B8C, #3d1266);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(85,27,140,0.3);
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="login-container">
        <h1>Administration</h1>
        <p>Connectez-vous pour gérer l'espace joueur</p>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Se connecter</button>
        </form>
        <div id="message" class="message"></div>
    </div>

    <script>
        // Renommer la variable pour éviter les conflits
        const supabaseAdmin = window.supabase.createClient(
            'https://wxlpcflanihqwumjwpjs.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4bHBjZmxhbmlocXd1bWp3cGpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzcwNzAsImV4cCI6MjA4Nzg1MzA3MH0.i1ZW-9MzSaeOKizKjaaq6mhtl7X23LsVpkkohc_p6Fw'
        );

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            messageDiv.style.display = 'none';

            const { data, error } = await supabaseAdmin.auth.signInWithPassword({ email, password });

            if (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Email ou mot de passe incorrect.';
                messageDiv.style.display = 'block';
                return;
            }

            // Vérifier si l'utilisateur est dans admin_users
            const { data: admin, error: adminError } = await supabaseAdmin
                .from('admin_users')
                .select('*')
                .eq('user_id', data.user.id)
                .maybeSingle();

            if (adminError || !admin) {
                // Déconnecter l'utilisateur car il n'est pas admin
                await supabaseAdmin.auth.signOut();
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Accès non autorisé.';
                messageDiv.style.display = 'block';
                return;
            }

            // Rediriger vers le dashboard admin
            window.location.href = '../index.html';
        });
    </script>
</body>
</html>
