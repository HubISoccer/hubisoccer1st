<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Candidatures acteurs | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.quilljs.com/1.3.6/quill.snow.css">
    <link rel="stylesheet" href="assets/css/admin.css">
    <link rel="stylesheet" href="assets/css/acteurs-admin.css">
</head>
<body>
    <div id="globalLoader" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; color: white; font-size: 1.2rem;">
        <div class="spinner"></div> Chargement...
    </div>

    <nav class="admin-nav">
        <div class="admin-nav-left">
            <img src="../public/img/logo-navbar.png" alt="HubISoccer" class="admin-logo">
            <span class="admin-title">Administration</span>
        </div>
        <div class="admin-nav-right">
            <a href="administration.html">Tableau de bord</a>
            <a href="inscriptions-admin.html">Inscriptions</a>
            <a href="acteurs-admin.html" class="active">Acteurs</a>
            <a href="#" id="logoutAdmin">Déconnexion</a>
        </div>
    </nav>

    <div class="admin-container acteurs-page">
        <h1>Gestion des candidatures acteurs (parrains, coachs, agents, etc.)</h1>

        <div class="admin-card">
            <div class="card-header">
                <h2><i class="fas fa-users"></i> Liste des candidatures</h2>
                <div class="header-actions">
                    <button class="btn-refresh" id="refreshBtn" title="Actualiser"><i class="fas fa-sync-alt"></i></button>
                </div>
            </div>
            <div id="candidaturesList" class="admin-list"></div>
        </div>
    </div>

    <!-- MODALE PRINCIPALE (détails + messages + édition) -->
    <div id="candidatureModal" class="admin-modal">
        <div class="modal-content large">
            <span class="close" onclick="closeModal()">×</span>
            <h3 id="modalTitle">Détails de la candidature</h3>

            <div class="modal-tabs">
                <button class="tab-btn active" data-tab="details">📋 Détails</button>
                <button class="tab-btn" data-tab="messages">💬 Messages</button>
                <button class="tab-btn" data-tab="edit">✏️ Modifier</button>
            </div>

            <div id="tabDetails" class="tab-pane active">
                <div id="modalDetails" class="modal-details scrollable"></div>
                <div class="modal-actions">
                    <button class="btn-valid" id="modalValid">✓ Valider</button>
                    <button class="btn-pause" id="modalPause">⏸ Mettre en pause</button>
                    <button class="btn-reject" id="modalReject">✗ Rejeter</button>
                    <button class="btn-delete" id="modalDelete">🗑 Supprimer</button>
                </div>
            </div>

            <div id="tabMessages" class="tab-pane">
                <div id="messagesContainer" class="messages-container scrollable"></div>
                <div class="message-compose">
                    <div id="messageEditor" style="height: 120px;"></div>
                    <button id="sendMessageBtn" class="btn-send">Envoyer</button>
                </div>
            </div>

            <div id="tabEdit" class="tab-pane">
                <form id="editForm" class="edit-form">
                    <div class="form-group">
                        <label>Nom complet</label>
                        <input type="text" id="editFullName" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="editEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Téléphone</label>
                        <input type="tel" id="editPhone" required>
                    </div>
                    <div class="form-group">
                        <label>Rôle</label>
                        <select id="editRole">
                            <option value="PR">Parrain</option>
                            <option value="ST">Staff médical</option>
                            <option value="CO">Coach</option>
                            <option value="AG">Agent</option>
                            <option value="AC">Académie</option>
                            <option value="CL">Club</option>
                            <option value="FO">Formateur</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Données spécifiques (JSON)</label>
                        <div id="roleDataEditor" style="height: 150px;"></div>
                        <textarea id="editRoleData" style="display: none;"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Notes admin</label>
                        <textarea id="editAdminNotes" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Enregistrer les modifications</button>
                </form>
            </div>
        </div>
    </div>

    <footer class="admin-footer">
        <p>© 2026 HubISoccer - Tous droits réservés.</p>
    </footer>

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="assets/js/acteurs-admin.js"></script>
</body>
</html>
