<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-container { max-width: 400px; margin: 80px auto; padding: 30px; background: white; border-radius: 20px; box-shadow: var(--shadow); }
        .auth-container h1 { color: var(--primary); text-align: center; margin-bottom: 10px; }
        .auth-container p { text-align: center; color: var(--gray); margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid var(--light-gray); border-radius: 10px; }
        .btn-submit { width: 100%; padding: 14px; background: linear-gradient(45deg, var(--primary), var(--primary-dark)); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(85,27,140,0.3); }
        .auth-footer { text-align: center; margin-top: 20px; }
        .auth-footer a { color: var(--gold); text-decoration: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="auth-container">
        <h1>Mot de passe oublié</h1>
        <p>Saisissez votre email, nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>
        <form id="resetForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <button type="submit" class="btn-submit">Envoyer le lien</button>
        </form>
        <div class="auth-footer">
            <p><a href="login.html">Retour à la connexion</a></p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://wxlpcflanihqwumjwpjs.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4bHBjZmxhbmlocXd1bWp3cGpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzcwNzAsImV4cCI6MjA4Nzg1MzA3MH0.i1ZW-9MzSaeOKizKjaaq6mhtl7X23LsVpkkohc_p6Fw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: 'https://hubisoccer.github.io/hubisoccer1st/public/auth/update-password.html'
            });

            if (error) {
                alert('Erreur : ' + error.message);
            } else {
                alert('Un email de réinitialisation a été envoyé. Vérifiez votre boîte de réception.');
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
