<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-container { max-width: 400px; margin: 80px auto; padding: 30px; background: white; border-radius: 20px; box-shadow: var(--shadow); }
        .auth-container h1 { color: var(--primary); text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid var(--light-gray); border-radius: 10px; }
        .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .btn-submit:hover { background: var(--primary-light); }
        .auth-footer { text-align: center; margin-top: 20px; }
        .auth-footer a { color: var(--gold); text-decoration: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="auth-container">
        <h1>Connexion</h1>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-submit">Se connecter</button>
        </form>
        <div class="auth-footer">
          <p><a href="reset-password.html">Mot de passe oublié ?</a></p>
          <p>Pas encore de compte ? <a href="signup.html">Inscrivez-vous</a></p>
        </div>
    </div>

    <script>
        // Attendre que le DOM soit prêt
        document.addEventListener('DOMContentLoaded', function() {
            console.log('✅ DOM chargé, initialisation du formulaire');

            const SUPABASE_URL = 'https://wxlpcflanihqwumjwpjs.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4bHBjZmxhbmlocXd1bWp3cGpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzcwNzAsImV4cCI6MjA4Nzg1MzA3MH0.i1ZW-9MzSaeOKizKjaaq6mhtl7X23LsVpkkohc_p6Fw';
            
            // Utiliser un nom différent pour éviter les conflits
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const loginForm = document.getElementById('loginForm');
            if (!loginForm) {
                console.error('❌ Formulaire introuvable !');
                return;
            }

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault(); // Empêche le rechargement par défaut
                console.log('📤 Tentative de connexion...');

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();

                try {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

                    if (error) {
                        console.error('❌ Erreur Supabase:', error);
                        alert('Erreur de connexion : ' + error.message);
                    } else {
                        console.log('✅ Connexion réussie, redirection...');
                        window.location.href = '../../players/dashboard.html';
                    }
                } catch (err) {
                    console.error('❌ Erreur JS inattendue:', err);
                    alert('Une erreur est survenue : ' + err.message);
                }
            });
        });
    </script>
</body>
</html>
