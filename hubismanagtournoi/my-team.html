<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mon équipe | HubISoccer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/hubismanagtournoi.css">
    <link rel="stylesheet" href="css/my-team.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="my-team-container">
        <div class="page-header">
            <button class="btn-back" id="backBtn">
                <i class="fas fa-arrow-left"></i>
                Retour
            </button>
            <h1>
                <i class="fas fa-users"></i>
                Mon équipe
            </h1>
        </div>

        <!-- Sélecteur d'équipe -->
        <div class="team-selector">
            <label><i class="fas fa-trophy"></i> Choisir une équipe</label>
            <select id="teamSelect">
                <option value="">Chargement...</option>
            </select>
            <button id="createTeamBtn" class="btn-secondary">
                <i class="fas fa-plus"></i> Créer une équipe
            </button>
        </div>

        <!-- Informations de l'équipe -->
        <div id="teamInfo" class="team-info-card" style="display: none;">
            <div class="team-logo" id="teamLogo">
                <i class="fas fa-users"></i>
            </div>
            <div class="team-meta">
                <div class="meta-row"><i class="fas fa-tag"></i> Nom : <strong id="teamName">-</strong></div>
                <div class="meta-row"><i class="fas fa-calendar-alt"></i> Catégorie : <span id="teamCategory">-</span></div>
                <div class="meta-row"><i class="fas fa-futbol"></i> Sport : <span id="teamSport">-</span></div>
                <div class="meta-row"><i class="fas fa-user"></i> Créateur : <span id="teamCreator">-</span></div>
                <div class="meta-row"><i class="fas fa-calendar-plus"></i> Créée le : <span id="teamCreated">-</span></div>
            </div>
            <div class="team-actions">
                <button id="editTeamBtn" class="btn-primary" style="display: none;">
                    <i class="fas fa-edit"></i> Modifier
                </button>
            </div>
        </div>

        <!-- Gestion des joueurs -->
        <div class="players-section">
            <div class="players-header">
                <h2><i class="fas fa-users"></i> Effectif</h2>
                <button id="addPlayerBtn" class="btn-primary" style="display: none;">
                    <i class="fas fa-plus"></i> Ajouter un joueur
                </button>
            </div>
            <div id="playersList" class="players-list">
                <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Chargement...</div>
            </div>
        </div>
    </div>

    <!-- Modale Créer/Modifier équipe -->
    <div id="teamModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="teamModalTitle">Créer une équipe</h2>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <form id="teamForm">
                    <div class="form-group">
                        <label>Nom de l'équipe *</label>
                        <input type="text" id="teamNameInput" required>
                    </div>
                    <div class="form-group">
                        <label>Catégorie d'âge (optionnel)</label>
                        <input type="text" id="teamAgeCategoryInput">
                    </div>
                    <div class="form-group">
                        <label>Logo (URL)</label>
                        <input type="url" id="teamLogoInput">
                    </div>
                    <div class="form-group">
                        <label>Sport *</label>
                        <select id="teamSportInput" required></select>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-cancel">Annuler</button>
                        <button type="submit" class="btn-confirm">Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modale Ajouter joueur -->
    <div id="addPlayerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Ajouter un joueur</h2>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <form id="addPlayerForm">
                    <div class="form-group">
                        <label>Rechercher un joueur</label>
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="playerSearch" placeholder="Nom du joueur...">
                        </div>
                    </div>
                    <div id="playerSearchResults" class="player-search-results"></div>
                    <div class="form-group">
                        <label>Numéro de maillot</label>
                        <input type="number" id="playerJersey" placeholder="Ex: 10">
                    </div>
                    <div class="form-group">
                        <label>Poste</label>
                        <input type="text" id="playerPosition" placeholder="Ex: Attaquant, Milieu">
                    </div>
                    <div class="form-check">
                        <input type="checkbox" id="playerIsCaptain">
                        <label>Capitaine</label>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-cancel">Annuler</button>
                        <button type="submit" class="btn-confirm">Ajouter</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/supabase-client.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/my-team.js"></script>
</body>
</html>
