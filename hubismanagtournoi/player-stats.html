<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Statistiques joueur | HubISoccer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/hubismanagtournoi.css">
    <link rel="stylesheet" href="css/player-stats.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="player-stats-container">
        <div class="page-header">
            <button class="btn-back" id="backBtn">
                <i class="fas fa-arrow-left"></i>
                Retour
            </button>
            <h1 id="playerName">Chargement...</h1>
        </div>

        <div class="player-info-card">
            <div class="player-avatar" id="playerAvatar">
                <i class="fas fa-user"></i>
            </div>
            <div class="player-details">
                <div class="detail-row"><i class="fas fa-tag"></i> Position : <span id="playerPosition">-</span></div>
                <div class="detail-row"><i class="fas fa-hashtag"></i> Numéro : <span id="playerNumber">-</span></div>
                <div class="detail-row"><i class="fas fa-users"></i> Équipe actuelle : <span id="playerTeam">-</span></div>
                <div class="detail-row"><i class="fas fa-calendar-alt"></i> Membre depuis : <span id="playerSince">-</span></div>
            </div>
        </div>

        <div class="stats-summary">
            <div class="stat-card">
                <div class="stat-value" id="totalGoals">0</div>
                <div class="stat-label">Buts</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalAssists">0</div>
                <div class="stat-label">Passes décisives</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalYellow">0</div>
                <div class="stat-label">Cartons jaunes</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalRed">0</div>
                <div class="stat-label">Cartons rouges</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalMatches">0</div>
                <div class="stat-label">Matchs joués</div>
            </div>
        </div>

        <div class="tournament-selector">
            <label><i class="fas fa-trophy"></i> Sélectionner un tournoi</label>
            <select id="tournamentSelect">
                <option value="">Tous les tournois</option>
            </select>
        </div>

        <div class="stats-table-container">
            <h2><i class="fas fa-chart-line"></i> Détail par match</h2>
            <div id="matchesStatsList" class="matches-stats-list">
                <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Chargement...</div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/supabase-client.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/player-stats.js"></script>

</body>
</html>
