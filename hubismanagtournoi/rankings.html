<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Classements | HubISoccer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/hubismanagtournoi.css">
    <link rel="stylesheet" href="css/rankings.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="rankings-container">
        <div class="page-header">
            <button class="btn-back" id="backBtn">
                <i class="fas fa-arrow-left"></i>
                Retour
            </button>
            <h1>
                <i class="fas fa-chart-line"></i>
                Classements et statistiques
            </h1>
        </div>

        <!-- Sélecteur de tournoi -->
        <div class="tournament-selector">
            <label><i class="fas fa-trophy"></i> Sélectionner un tournoi</label>
            <select id="tournamentSelect">
                <option value="">Chargement...</option>
            </select>
        </div>

        <!-- Onglets des classements -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="teams">Classement équipes</button>
            <button class="tab-btn" data-tab="scorers">Classement buteurs</button>
            <button class="tab-btn" data-tab="assists">Classement passeurs</button>
            <button class="tab-btn" data-tab="cards">Cartons</button>
        </div>

        <!-- Contenu des onglets -->
        <div id="teamsTab" class="tab-content active">
            <div class="ranking-card">
                <h2>Classement général</h2>
                <div id="teamsRanking" class="ranking-table-container">
                    <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Chargement...</div>
                </div>
            </div>
        </div>

        <div id="scorersTab" class="tab-content">
            <div class="ranking-card">
                <h2>Meilleurs buteurs</h2>
                <div id="scorersRanking" class="ranking-table-container">
                    <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Chargement...</div>
                </div>
            </div>
        </div>

        <div id="assistsTab" class="tab-content">
            <div class="ranking-card">
                <h2>Meilleurs passeurs</h2>
                <div id="assistsRanking" class="ranking-table-container">
                    <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Chargement...</div>
                </div>
            </div>
        </div>

        <div id="cardsTab" class="tab-content">
            <div class="ranking-card">
                <h2>Cartons jaunes et rouges</h2>
                <div id="cardsRanking" class="ranking-table-container">
                    <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Chargement...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/supabase-client.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/rankings.js"></script>
</body>
</html>
