<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Créer un tournoi | HubISoccer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/hubismanagtournoi.css">
    <link rel="stylesheet" href="css/create-tournament.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="create-tournament-container">
        <div class="form-header">
            <button class="btn-back" id="backBtn">
                <i class="fas fa-arrow-left"></i>
                Retour
            </button>
            <h1>Créer un tournoi</h1>
        </div>

        <form id="createTournamentForm" class="tournament-form">
            <div class="form-section">
                <h2>Informations générales</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="tournamentName">Nom du tournoi *</label>
                        <input type="text" id="tournamentName" required>
                    </div>
                    <div class="form-group">
                        <label for="sportId">Sport *</label>
                        <select id="sportId" required></select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="tournamentType">Type de tournoi *</label>
                        <select id="tournamentType" required></select>
                    </div>
                    <div class="form-group">
                        <label for="registrationCode">Code d'inscription (pour tournois publics)</label>
                        <input type="text" id="registrationCode" placeholder="Laisser vide si non utilisé">
                    </div>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="4"></textarea>
                </div>
            </div>

            <div class="form-section">
                <h2>Dates et lieu</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="startDate">Date de début *</label>
                        <input type="datetime-local" id="startDate" required>
                    </div>
                    <div class="form-group">
                        <label for="endDate">Date de fin *</label>
                        <input type="datetime-local" id="endDate" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="location">Lieu</label>
                    <input type="text" id="location">
                </div>
            </div>

            <div class="form-section">
                <h2>Récompenses et conditions</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="prizePool">Prix total (FCFA)</label>
                        <input type="number" id="prizePool" min="0" step="1000" value="0">
                    </div>
                    <div class="form-group">
                        <label for="requiresFirstPas">Nécessite premier‑pas</label>
                        <select id="requiresFirstPas">
                            <option value="false">Non</option>
                            <option value="true">Oui</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="rules">Règlement (optionnel)</label>
                    <textarea id="rules" rows="4"></textarea>
                </div>
            </div>

            <div class="form-section">
                <h2>Streaming (optionnel)</h2>
                <div class="form-group">
                    <label for="streamUrl">URL du stream (YouTube, Twitch, etc.)</label>
                    <input type="url" id="streamUrl" placeholder="https://...">
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-secondary" id="cancelBtn">Annuler</button>
                <button type="submit" class="btn-primary">Créer le tournoi</button>
            </div>
        </form>
    </div>

    <script src="js/supabase-client.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/create-tournament.js"></script>
</body>
</html>
