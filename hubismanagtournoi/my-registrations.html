<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mes inscriptions | HubISoccer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/hubismanagtournoi.css">
    <link rel="stylesheet" href="css/my-registrations.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="my-registrations-container">
        <div class="page-header">
            <button class="btn-back" id="backBtn">
                <i class="fas fa-arrow-left"></i>
                Retour
            </button>
            <h1>
                <i class="fas fa-clipboard-list"></i>
                Mes inscriptions
            </h1>
        </div>

        <div class="filters-bar">
            <div class="filter-group">
                <label>
                    <i class="fas fa-filter"></i>
                    Statut
                </label>
                <select id="statusFilter">
                    <option value="all">Tous</option>
                    <option value="pending">En attente</option>
                    <option value="approved">Approuvé</option>
                    <option value="rejected">Rejeté</option>
                </select>
            </div>
            <div class="filter-group">
                <label>
                    <i class="fas fa-calendar-alt"></i>
                    Période
                </label>
                <select id="periodFilter">
                    <option value="all">Tous</option>
                    <option value="upcoming">À venir</option>
                    <option value="ongoing">En cours</option>
                    <option value="past">Terminés</option>
                </select>
            </div>
        </div>

        <div id="registrationsList" class="registrations-list">
            <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Chargement...</div>
        </div>
    </div>

    <script src="js/supabase-client.js"></script>
    <script src="js/tournaments.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/my-registrations.js"></script>
</body>
</html>
