<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Paiement | HubISoccer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/hubismanagtournoi.css">
    <link rel="stylesheet" href="css/payment.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="payment-container">
        <div class="page-header">
            <button class="btn-back" id="backBtn">
                <i class="fas fa-arrow-left"></i>
                Retour
            </button>
            <h1>
                <i class="fas fa-credit-card"></i>
                Paiement
            </h1>
        </div>

        <div class="payment-card">
            <div class="payment-summary">
                <h2>Récapitulatif</h2>
                <div id="tournamentInfo" class="tournament-info">
                    <p>Chargement...</p>
                </div>
                <div class="amount-due">
                    <span>Montant à payer :</span>
                    <strong id="amount">0 FCFA</strong>
                </div>
            </div>

            <div class="payment-methods">
                <h3>Mode de paiement</h3>
                <div class="methods-list">
                    <label class="method-option">
                        <input type="radio" name="paymentMethod" value="mobile_money" checked>
                        <i class="fas fa-mobile-alt"></i>
                        <span>Mobile Money (MTN, Moov)</span>
                    </label>
                    <label class="method-option">
                        <input type="radio" name="paymentMethod" value="card">
                        <i class="fas fa-credit-card"></i>
                        <span>Carte bancaire</span>
                    </label>
                    <label class="method-option">
                        <input type="radio" name="paymentMethod" value="bank_transfer">
                        <i class="fas fa-university"></i>
                        <span>Virement bancaire</span>
                    </label>
                </div>
            </div>

            <div id="mobileMoneyFields" class="payment-details">
                <div class="form-group">
                    <label>Numéro de téléphone *</label>
                    <input type="tel" id="phoneNumber" placeholder="+229 XX XX XX XX">
                </div>
                <div class="form-group">
                    <label>Opérateur</label>
                    <select id="operator">
                        <option value="mtn">MTN</option>
                        <option value="moov">Moov</option>
                    </select>
                </div>
            </div>

            <div id="cardFields" class="payment-details" style="display: none;">
                <div class="form-group">
                    <label>Numéro de carte *</label>
                    <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Date d'expiration</label>
                        <input type="text" id="cardExpiry" placeholder="MM/AA">
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="text" id="cardCvv" placeholder="123">
                    </div>
                </div>
            </div>

            <div id="bankTransferFields" class="payment-details" style="display: none;">
                <div class="bank-info">
                    <p><strong>Coordonnées bancaires :</strong></p>
                    <p>Banque : HubISoccer Bank<br>
                    IBAN : BJ66 1234 5678 9012 3456 7890 1234<br>
                    BIC : HUBIBJBB</p>
                    <p class="small">Veuillez utiliser votre email comme référence.</p>
                </div>
                <div class="form-group">
                    <label>Preuve de virement (facultatif)</label>
                    <input type="file" id="proofFile" accept=".pdf,.jpg,.jpeg,.png">
                </div>
            </div>

            <div class="form-actions">
                <button id="payBtn" class="btn-primary">Payer maintenant</button>
                <button id="cancelBtn" class="btn-secondary">Annuler</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/supabase-client.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/payment.js"></script>
</body>
</html>
