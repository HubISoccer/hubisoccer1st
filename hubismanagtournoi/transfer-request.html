<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Demande de transfert | HubISoccer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/hubismanagtournoi.css">
    <link rel="stylesheet" href="css/transfer-request.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="transfer-container">
        <div class="page-header">
            <button class="btn-back" id="backBtn">
                <i class="fas fa-arrow-left"></i>
                Retour
            </button>
            <h1>
                <i class="fas fa-exchange-alt"></i>
                Demandes de transfert
            </h1>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="my">Mes demandes</button>
            <button class="tab-btn" data-tab="pending">Demandes en attente (admin)</button>
        </div>

        <!-- Onglet Mes demandes -->
        <div id="myTab" class="tab-content active">
            <div class="request-form">
                <h2><i class="fas fa-paper-plane"></i> Demander un transfert</h2>
                <form id="transferForm">
                    <div class="form-group">
                        <label>Joueur</label>
                        <select id="playerSelect" required>
                            <option value="">Sélectionnez votre joueur</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Équipe actuelle</label>
                        <input type="text" id="currentTeamDisplay" readonly placeholder="Sélectionnez un joueur">
                    </div>
                    <div class="form-group">
                        <label>Équipe de destination *</label>
                        <select id="targetTeamSelect" required>
                            <option value="">Sélectionnez une équipe</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Motif (optionnel)</label>
                        <textarea id="transferReason" rows="3" placeholder="Expliquez pourquoi vous souhaitez changer d'équipe..."></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Envoyer la demande</button>
                </form>
            </div>

            <div class="requests-list">
                <h2><i class="fas fa-list"></i> Mes demandes</h2>
                <div id="myRequestsList" class="items-list">
                    <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Chargement...</div>
                </div>
            </div>
        </div>

        <!-- Onglet Demandes en attente (admin) -->
        <div id="pendingTab" class="tab-content">
            <div id="pendingRequestsList" class="items-list">
                <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Chargement...</div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/supabase-client.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/transfer-request.js"></script>
</body>
</html>
