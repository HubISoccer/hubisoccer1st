<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mes tournois | HubISoccer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/hubismanagtournoi.css">
    <link rel="stylesheet" href="css/my-tournaments.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="my-tournaments-container">
        <div class="page-header">
            <button class="btn-back" id="backBtn">
                <i class="fas fa-arrow-left"></i>
                Retour
            </button>
            <h1>
                <i class="fas fa-trophy"></i>
                Mes tournois
            </h1>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-status="all">Tous</button>
            <button class="tab-btn" data-status="draft">Brouillons</button>
            <button class="tab-btn" data-status="active">Actifs</button>
            <button class="tab-btn" data-status="finished">Terminés</button>
        </div>

        <div id="tournamentsList" class="tournaments-list">
            <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Chargement...</div>
        </div>
    </div>

    <script src="js/supabase-client.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/my-tournaments.js"></script>
</body>
</html>
