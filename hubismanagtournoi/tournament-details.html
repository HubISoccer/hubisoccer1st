<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Détails du tournoi | HubISoccer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/hubismanagtournoi.css">
    <link rel="stylesheet" href="css/tournament-details.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="tournament-detail-container">
        <!-- En‑tête avec navigation -->
        <div class="detail-header">
            <button class="btn-back" id="backBtn">
                <i class="fas fa-arrow-left"></i>
                Retour
            </button>
            <h1 id="tournamentName">Chargement...</h1>
        </div>

        <!-- Informations générales -->
        <div class="info-section">
            <div class="info-card">
                <div class="info-row">
                    <i class="fas fa-calendar-alt"></i>
                    <span id="tournamentDates">-</span>
                </div>
                <div class="info-row">
                    <i class="fas fa-map-marker-alt"></i>
                    <span id="tournamentLocation">-</span>
                </div>
                <div class="info-row">
                    <i class="fas fa-trophy"></i>
                    <span id="tournamentPrize">-</span>
                </div>
                <div class="info-row">
                    <i class="fas fa-tag"></i>
                    <span id="tournamentType">-</span>
                </div>
                <div class="info-row">
                    <i class="fas fa-futbol"></i>
                    <span id="tournamentSport">-</span>
                </div>
            </div>
            <div class="description-card">
                <h3>Description</h3>
                <p id="tournamentDescription">-</p>
                <div id="registrationBlock" class="registration-block" style="display: none;">
                    <button id="registerBtn" class="btn-primary">
                        <i class="fas fa-check-circle"></i>
                        S'inscrire au tournoi
                    </button>
                    <div id="registrationMessage" class="registration-message"></div>
                </div>
            </div>
        </div>

        <!-- Équipes participantes -->
        <div class="teams-section">
            <h2>
                <i class="fas fa-users"></i>
                Équipes participantes
            </h2>
            <div id="teamsList" class="teams-grid">
                <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Chargement...</div>
            </div>
        </div>

        <!-- Calendrier des matchs -->
        <div class="matches-section">
            <h2>
                <i class="fas fa-calendar-week"></i>
                Calendrier des matchs
            </h2>
            <div id="matchesList" class="matches-list">
                <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Chargement...</div>
            </div>
        </div>

        <!-- Classement -->
        <div class="standings-section">
            <h2>
                <i class="fas fa-chart-line"></i>
                Classement
            </h2>
            <div id="standingsList" class="standings-table">
                <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Chargement...</div>
            </div>
        </div>

        <!-- Prime (si applicable) -->
        <div id="prizeSection" class="prize-section" style="display: none;">
            <h2>
                <i class="fas fa-gift"></i>
                Récompenses
            </h2>
            <div id="prizeList" class="prize-list"></div>
        </div>
    </div>

    <script src="js/supabase-client.js"></script>
    <script src="js/tournaments.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/tournament-details.js"></script>
</body>
</html>
