<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ma carte de tournoi – HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            padding: 40px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: #551B8C; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .form-section, .card-section {
            background: white; border-radius: 32px; padding: 30px; margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e9ecef;
        }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: 600; margin-bottom: 5px; color: #1a1a1a; }
        .form-group input, .form-group select, .form-group textarea {
            padding: 12px; border: 1px solid #e9ecef; border-radius: 12px; font-family: 'Poppins', sans-serif;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #551B8C; }
        .file-label { display: inline-block; background: #f0f0f5; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-size: 0.9rem; }
        .file-label i { margin-right: 5px; }
        .image-preview { margin-top: 8px; max-width: 100px; border-radius: 12px; overflow: hidden; border: 1px solid #e9ecef; }
        .image-preview img { width: 100%; height: auto; display: block; }
        .signature-preview {
            border: 2px dashed #551B8C; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer;
            background: #f9f9ff; min-height: 80px; display: flex; align-items: center; justify-content: center;
        }
        .btn { padding: 12px 24px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: #551B8C; color: white; }
        .btn-primary:hover { background: #3d1266; transform: translateY(-2px); }
        .btn-secondary { background: #e9ecef; color: #1a1a1a; }
        .card-preview {
            background: #f3e8ff; border-radius: 24px; padding: 20px; margin-top: 30px; display: flex; flex-wrap: wrap; gap: 30px;
        }
        .card-face { flex: 1; min-width: 280px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card-front { background: #f3e8ff; border: 1px solid #551B8C; }
        .card-back { background: linear-gradient(135deg, #fff3bf, #cce7ff); border: 1px solid #ffcc00; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-header img { height: 50px; object-fit: contain; }
        .card-info p { margin: 8px 0; }
        .signature-area { margin-top: 20px; border-top: 1px solid #ddd; padding-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        .signature-area img, .signature-area canvas { max-height: 50px; max-width: 150px; }
        .qr-code { text-align: center; margin: 15px 0; }
        .footer-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 24px; padding: 20px; width: 90%; max-width: 500px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .modal-header h3 { color: #551B8C; }
        .close-modal { font-size: 24px; cursor: pointer; }
        canvas.signature-canvas { border: 1px solid #ccc; border-radius: 8px; width: 100%; height: 200px; touch-action: none; }
        .signature-actions { display: flex; gap: 10px; margin-top: 10px; }
        @media (max-width: 768px) { .card-preview { flex-direction: column; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-id-card"></i> Demande de carte de tournoi</h1>

        <div class="form-section">
            <h2>Informations personnelles</h2>
            <form id="carteForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nom complet *</label>
                        <input type="text" id="fullName" required>
                    </div>
                    <div class="form-group">
                        <label>Date de naissance *</label>
                        <input type="date" id="birthDate" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Nationalité *</label>
                        <input type="text" id="nationality" required>
                    </div>
                    <div class="form-group">
                        <label>Pays de résidence *</label>
                        <input type="text" id="country" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Club / Équipe</label>
                        <input type="text" id="club" placeholder="Facultatif">
                    </div>
                    <div class="form-group">
                        <label>Logo du club (image)</label>
                        <input type="file" id="clubLogoFile" accept="image/*" style="display: none;">
                        <button type="button" class="file-label" onclick="document.getElementById('clubLogoFile').click()"><i class="fas fa-upload"></i> Choisir un logo</button>
                        <div id="clubLogoPreview" class="image-preview"></div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Photo du titulaire (obligatoire)</label>
                        <input type="file" id="photoFile" accept="image/*" style="display: none;" required>
                        <button type="button" class="file-label" onclick="document.getElementById('photoFile').click()"><i class="fas fa-camera"></i> Choisir une photo</button>
                        <div id="photoPreview" class="image-preview"></div>
                    </div>
                    <div class="form-group">
                        <label>Code pays (ex: BJ, FR)</label>
                        <input type="text" id="countryCode" placeholder="BJ" maxlength="2">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Catégorie de tournoi</label>
                        <input type="text" id="categoryDisplay" readonly>
                    </div>
                    <div class="form-group">
                        <label>Nom du tournoi (facultatif)</label>
                        <input type="text" id="tournamentName" placeholder="Ex: Coupe des Étoiles">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Signature du propriétaire *</label>
                        <div class="signature-preview" id="ownerSignaturePreview" onclick="openSignatureModal('owner')">
                            <i class="fas fa-pen"></i> Cliquez pour signer
                        </div>
                        <input type="hidden" id="ownerSignatureData">
                    </div>
                </div>
                <div class="form-group">
                    <div class="rules-checkbox">
                        <input type="checkbox" id="acceptRules" required>
                        <label for="acceptRules">J'ai lu et j'accepte le règlement du tournoi</label>
                    </div>
                </div>
                <div class="footer-buttons">
                    <button type="button" class="btn btn-primary" id="generateCardBtn">Générer ma carte</button>
                    <button type="button" class="btn btn-secondary" id="resetFormBtn">Réinitialiser</button>
                </div>
            </form>
        </div>

        <div class="card-section" id="cardPreviewSection" style="display: none;">
            <h2>Aperçu de votre carte</h2>
            <div class="card-preview" id="cardPreview">
                <div class="card-face card-front" id="cardFront">
                    <div class="card-header">
                        <img id="organizerLogo" src="img/default-organizer.png" alt="Logo organisateur">
                        <img id="clubLogoDisplay" src="img/default-club.png" alt="Logo club">
                    </div>
                    <div class="card-info" id="frontInfo"></div>
                    <div class="signature-area">
                        <div><strong>Signature propriétaire</strong><br><img id="ownerSignImg" style="max-height:50px;"></div>
                        <div><strong>Signature organisateur</strong><br><img id="organizerSignImg" style="max-height:50px;"></div>
                    </div>
                    <div class="qr-code" id="qrCode"></div>
                </div>
                <div class="card-face card-back" id="cardBack">
                    <div class="card-header">
                        <img id="flagImg" src="img/default-flag.png" alt="Drapeau">
                        <img id="hubisoccerLogo" src="img/hubisoccer-logo.png" alt="HubISoccer">
                    </div>
                    <div class="card-info" id="backInfo"></div>
                    <div class="signature-area">
                        <div><strong>Signature du président</strong><br><img id="presidentSignImg" style="max-height:50px;"></div>
                    </div>
                </div>
            </div>
            <div class="footer-buttons">
                <button class="btn btn-primary" id="printCardBtn">Imprimer / PDF</button>
                <button class="btn btn-secondary" id="editCardBtn">Modifier ma demande</button>
            </div>
        </div>
    </div>

    <!-- Modale de signature -->
    <div id="signatureModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="signatureModalTitle">Signature</h3>
                <span class="close-modal" onclick="closeSignatureModal()">&times;</span>
            </div>
            <div class="modal-body">
                <canvas id="signatureCanvas" class="signature-canvas" width="400" height="200" style="width:100%; height:200px;"></canvas>
                <div class="signature-actions">
                    <button class="btn btn-secondary" id="clearSignatureBtn">Effacer</button>
                    <button class="btn btn-primary" id="saveSignatureBtn">Valider</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('type');
        const categoryLabels = {
            public_show: 'Public Show You',
            public_detection: 'Détection HubISoccer',
            private_hubisoccer: 'Privé HubISoccer',
            private_simple: 'Privé Simple'
        };
        if (!category || !categoryLabels[category]) {
            alert('Catégorie invalide, retour à la page de choix.');
            window.location.href = 'demande-carte.html';
        }
        document.getElementById('categoryDisplay').value = categoryLabels[category];

        let ownerSignatureData = null;
        let signaturePad = null;
        let currentSignatureType = null;

        // Gestion des fichiers
        function handleFileUpload(fileInput, previewDiv, callback) {
            const file = fileInput.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const dataURL = e.target.result;
                previewDiv.innerHTML = `<img src="${dataURL}" style="max-width:100px;">`;
                if (callback) callback(dataURL);
            };
            reader.readAsDataURL(file);
        }
        document.getElementById('clubLogoFile').addEventListener('change', function() {
            handleFileUpload(this, document.getElementById('clubLogoPreview'), (dataURL) => {
                window.clubLogoData = dataURL;
            });
        });
        document.getElementById('photoFile').addEventListener('change', function() {
            handleFileUpload(this, document.getElementById('photoPreview'), (dataURL) => {
                window.photoData = dataURL;
            });
        });

        // Signature
        function openSignatureModal(type) {
            currentSignatureType = type;
            const title = type === 'owner' ? 'Signature du propriétaire' : 'Signature';
            document.getElementById('signatureModalTitle').innerText = title;
            document.getElementById('signatureModal').style.display = 'flex';
            const canvas = document.getElementById('signatureCanvas');
            canvas.width = canvas.offsetWidth || 400;
            canvas.height = canvas.offsetHeight || 200;
            if (signaturePad) signaturePad.clear();
            else signaturePad = new SignaturePad(canvas, { backgroundColor: 'white', penColor: '#551B8C' });
        }
        function closeSignatureModal() { document.getElementById('signatureModal').style.display = 'none'; }
        document.getElementById('clearSignatureBtn').addEventListener('click', () => { if (signaturePad) signaturePad.clear(); });
        document.getElementById('saveSignatureBtn').addEventListener('click', () => {
            if (signaturePad && !signaturePad.isEmpty()) {
                const dataURL = signaturePad.toDataURL();
                if (currentSignatureType === 'owner') {
                    ownerSignatureData = dataURL;
                    document.getElementById('ownerSignImg').src = dataURL;
                    document.getElementById('ownerSignaturePreview').innerHTML = `<img src="${dataURL}" style="max-height:60px;">`;
                }
                closeSignatureModal();
            } else alert('Veuillez signer.');
        });
        window.openSignatureModal = openSignatureModal;
        window.closeSignatureModal = closeSignatureModal;

        function generateTrackingCode() { return 'HUB-' + Math.random().toString(36).substring(2, 10).toUpperCase(); }

        function generateCard() {
            const fullName = document.getElementById('fullName').value.trim();
            const birthDate = document.getElementById('birthDate').value;
            const nationality = document.getElementById('nationality').value.trim();
            const country = document.getElementById('country').value.trim();
            const club = document.getElementById('club').value.trim();
            const tournamentName = document.getElementById('tournamentName').value.trim();
            const countryCode = document.getElementById('countryCode').value.trim().toUpperCase();
            const acceptRules = document.getElementById('acceptRules').checked;
            if (!fullName || !birthDate || !nationality || !country || !acceptRules || !window.photoData) {
                alert('Veuillez remplir tous les champs obligatoires, accepter le règlement et charger une photo.');
                return;
            }
            if (!ownerSignatureData) { alert('Veuillez signer la carte.'); return; }

            const trackingCode = generateTrackingCode();
            const issueDate = new Date().toLocaleDateString('fr-FR');
            const expiryDate = new Date(); expiryDate.setFullYear(expiryDate.getFullYear() + 1);
            const expiryDateStr = expiryDate.toLocaleDateString('fr-FR');
            const deliveryPlace = 'Cotonou, Bénin';

            const cardData = {
                fullName, birthDate, nationality, country, club, tournamentName,
                trackingCode, issueDate, expiryDateStr, deliveryPlace,
                ownerSignature: ownerSignatureData,
                category, categoryLabel: categoryLabels[category],
                photo: window.photoData,
                clubLogo: window.clubLogoData || null,
                countryCode: countryCode || 'bj'
            };
            localStorage.setItem('pendingCard_' + trackingCode, JSON.stringify(cardData));

            // Affichage carte
            document.getElementById('frontInfo').innerHTML = `
                <p><strong>N° Carte :</strong> ${trackingCode}</p>
                <p><strong>Nom :</strong> ${escapeHtml(fullName)}</p>
                <p><strong>Date naissance :</strong> ${birthDate}</p>
                <p><strong>Nationalité :</strong> ${escapeHtml(nationality)}</p>
                <p><strong>Pays :</strong> ${escapeHtml(country)}</p>
                <p><strong>Club :</strong> ${escapeHtml(club) || '-'}</p>
                <p><strong>Catégorie :</strong> ${categoryLabels[category]}</p>
                <p><strong>Tournoi :</strong> ${escapeHtml(tournamentName) || '-'}</p>
            `;
            document.getElementById('ownerSignImg').src = ownerSignatureData;
            if (window.clubLogoData) document.getElementById('clubLogoDisplay').src = window.clubLogoData;
            if (window.photoData) {
                // Ajouter la photo dans la carte (on peut l'ajouter dans le frontInfo)
                const frontInfoDiv = document.getElementById('frontInfo');
                const photoHtml = `<div class="photo-titulaire"><img src="${window.photoData}" style="width:80px; height:80px; border-radius:50%; object-fit:cover; margin-top:10px;"></div>`;
                frontInfoDiv.insertAdjacentHTML('beforeend', photoHtml);
            }
            const qrDiv = document.getElementById('qrCode');
            qrDiv.innerHTML = '';
            new QRCode(qrDiv, { text: `https://hubisoccer.com/verify-card?code=${trackingCode}`, width: 100, height: 100 });
            document.getElementById('backInfo').innerHTML = `
                <p><strong>Délivré par :</strong> HubISoccer</p>
                <p><strong>Lieu de délivrance :</strong> ${deliveryPlace}</p>
                <p><strong>Date de délivrance :</strong> ${issueDate}</p>
                <p><strong>Valable jusqu'au :</strong> ${expiryDateStr}</p>
            `;
            document.getElementById('flagImg').src = `https://flagcdn.com/64x48/${countryCode || 'bj'}.png`;
            document.getElementById('cardPreviewSection').style.display = 'block';
            document.querySelector('.form-section').style.display = 'none';
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

        document.getElementById('generateCardBtn').addEventListener('click', generateCard);
        document.getElementById('printCardBtn').addEventListener('click', () => {
            const element = document.getElementById('cardPreview');
            html2pdf().from(element).set({ margin: 0.5, filename: `carte_${document.getElementById('fullName').value.trim().replace(/\s/g, '_')}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' } }).save();
        });
        document.getElementById('editCardBtn').addEventListener('click', () => {
            document.getElementById('cardPreviewSection').style.display = 'none';
            document.querySelector('.form-section').style.display = 'block';
        });
        document.getElementById('resetFormBtn').addEventListener('click', () => {
            document.getElementById('carteForm').reset();
            ownerSignatureData = null;
            window.photoData = null;
            window.clubLogoData = null;
            document.getElementById('ownerSignaturePreview').innerHTML = '<i class="fas fa-pen"></i> Cliquez pour signer';
            document.getElementById('photoPreview').innerHTML = '';
            document.getElementById('clubLogoPreview').innerHTML = '';
            document.getElementById('cardPreviewSection').style.display = 'none';
            document.querySelector('.form-section').style.display = 'block';
        });
    </script>
</body>
</html>
