<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ma carte de tournoi – HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #551B8C;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .form-section, .card-section {
            background: white;
            border-radius: 32px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #e9ecef;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #1a1a1a;
        }
        .form-group input, .form-group select, .form-group textarea {
            padding: 12px;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #551B8C;
        }
        .signature-preview {
            border: 2px dashed #551B8C;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: #f9f9ff;
        }
        .signature-preview canvas, .signature-preview img {
            max-width: 100%;
            max-height: 80px;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #551B8C;
            color: white;
        }
        .btn-primary:hover {
            background: #3d1266;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #e9ecef;
            color: #1a1a1a;
        }
        .btn-secondary:hover {
            background: #d0d4d9;
        }
        .card-preview {
            background: #f3e8ff; /* violet clair */
            border-radius: 24px;
            padding: 20px;
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }
        .card-face {
            flex: 1;
            min-width: 280px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        .card-front {
            background: #f3e8ff;
            border: 1px solid #551B8C;
        }
        .card-back {
            background: linear-gradient(135deg, #fff3bf, #cce7ff);
            border: 1px solid #ffcc00;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .card-header img {
            height: 50px;
            object-fit: contain;
        }
        .card-info {
            margin: 20px 0;
        }
        .card-info p {
            margin: 8px 0;
            font-size: 0.9rem;
        }
        .signature-area {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #ddd;
            padding-top: 15px;
        }
        .signature-area img, .signature-area canvas {
            max-height: 50px;
            max-width: 150px;
        }
        .qr-code {
            text-align: center;
            margin: 15px 0;
        }
        .footer-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 20px;
            width: 90%;
            max-width: 500px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .modal-header h3 {
            color: #551B8C;
        }
        .close-modal {
            font-size: 24px;
            cursor: pointer;
        }
        canvas.signature-canvas {
            border: 1px solid #ccc;
            border-radius: 8px;
            width: 100%;
            height: 200px;
            touch-action: none;
        }
        .signature-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .loading {
            text-align: center;
            margin: 20px;
            display: none;
        }
        @media (max-width: 768px) {
            .card-preview { flex-direction: column; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-id-card"></i> Demande de carte de tournoi</h1>

        <div class="form-section">
            <h2>Informations personnelles</h2>
            <form id="carteForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nom complet *</label>
                        <input type="text" id="fullName" required>
                    </div>
                    <div class="form-group">
                        <label>Date de naissance *</label>
                        <input type="date" id="birthDate" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Nationalité *</label>
                        <input type="text" id="nationality" required>
                    </div>
                    <div class="form-group">
                        <label>Pays de résidence *</label>
                        <input type="text" id="country" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Club / Équipe</label>
                        <input type="text" id="club" placeholder="Facultatif">
                    </div>
                    <div class="form-group">
                        <label>Logo du club (URL ou upload)</label>
                        <input type="text" id="clubLogoUrl" placeholder="URL du logo">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Catégorie de tournoi</label>
                        <input type="text" id="categoryDisplay" readonly>
                    </div>
                    <div class="form-group">
                        <label>Nom du tournoi (facultatif)</label>
                        <input type="text" id="tournamentName" placeholder="Ex: Coupe des Étoiles">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Signature du propriétaire *</label>
                        <div class="signature-preview" id="ownerSignaturePreview" onclick="openSignatureModal('owner')">
                            <i class="fas fa-pen"></i> Cliquez pour signer
                        </div>
                        <input type="hidden" id="ownerSignatureData">
                    </div>
                </div>
                <div class="form-group">
                    <label>Règlement du tournoi</label>
                    <div class="rules-checkbox">
                        <input type="checkbox" id="acceptRules" required>
                        <label for="acceptRules">J'ai lu et j'accepte le règlement du tournoi</label>
                    </div>
                </div>
                <div class="footer-buttons">
                    <button type="button" class="btn btn-primary" id="generateCardBtn">Générer ma carte</button>
                    <button type="button" class="btn btn-secondary" id="resetFormBtn">Réinitialiser</button>
                </div>
            </form>
        </div>

        <div class="card-section" id="cardPreviewSection" style="display: none;">
            <h2>Aperçu de votre carte</h2>
            <div class="card-preview" id="cardPreview">
                <!-- Recto -->
                <div class="card-face card-front" id="cardFront">
                    <div class="card-header">
                        <img id="organizerLogo" src="img/default-organizer.png" alt="Logo organisateur">
                        <img id="clubLogo" src="img/default-club.png" alt="Logo club">
                    </div>
                    <div class="card-info" id="frontInfo"></div>
                    <div class="signature-area">
                        <div><strong>Signature propriétaire</strong><br><img id="ownerSignImg" style="max-height:50px;"></div>
                        <div><strong>Signature organisateur</strong><br><img id="organizerSignImg" style="max-height:50px;"></div>
                    </div>
                    <div class="qr-code" id="qrCode"></div>
                </div>
                <!-- Verso -->
                <div class="card-face card-back" id="cardBack">
                    <div class="card-header">
                        <img id="flagImg" src="img/default-flag.png" alt="Drapeau">
                        <img id="hubisoccerLogo" src="img/hubisoccer-logo.png" alt="HubISoccer">
                    </div>
                    <div class="card-info" id="backInfo"></div>
                    <div class="signature-area">
                        <div><strong>Signature du président</strong><br><img id="presidentSignImg" style="max-height:50px;"></div>
                    </div>
                </div>
            </div>
            <div class="footer-buttons">
                <button class="btn btn-primary" id="printCardBtn">Imprimer / PDF</button>
                <button class="btn btn-secondary" id="editCardBtn">Modifier ma demande</button>
            </div>
        </div>
    </div>

    <!-- Modale de signature -->
    <div id="signatureModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="signatureModalTitle">Signature</h3>
                <span class="close-modal" onclick="closeSignatureModal()">&times;</span>
            </div>
            <div class="modal-body">
                <canvas id="signatureCanvas" class="signature-canvas" width="400" height="200" style="width:100%; height:200px;"></canvas>
                <div class="signature-actions">
                    <button class="btn btn-secondary" id="clearSignatureBtn">Effacer</button>
                    <button class="btn btn-primary" id="saveSignatureBtn">Valider</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Récupération du paramètre de catégorie
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('type');
        const categoryLabels = {
            public_show: 'Public Show You',
            public_detection: 'Détection HubISoccer',
            private_hubisoccer: 'Privé HubISoccer',
            private_simple: 'Privé Simple'
        };
        if (!category || !categoryLabels[category]) {
            alert('Catégorie invalide, retour à la page de choix.');
            window.location.href = 'demande-carte.html';
        }
        document.getElementById('categoryDisplay').value = categoryLabels[category];

        // Gestion des signatures
        let currentSignatureType = null;
        let signaturePad = null;
        let ownerSignatureData = null;
        let organizerSignatureData = null; // sera définie lors de la validation admin (simulé)
        let presidentSignatureData = null; // sera définie lors de la validation admin

        const ownerPreview = document.getElementById('ownerSignaturePreview');
        const ownerSignImg = document.getElementById('ownerSignImg');

        function openSignatureModal(type) {
            currentSignatureType = type;
            const modal = document.getElementById('signatureModal');
            const title = document.getElementById('signatureModalTitle');
            title.innerText = type === 'owner' ? 'Signature du propriétaire' : 'Signature';
            modal.style.display = 'flex';
            const canvas = document.getElementById('signatureCanvas');
            canvas.width = canvas.offsetWidth || 400;
            canvas.height = canvas.offsetHeight || 200;
            if (signaturePad) signaturePad.clear();
            else {
                signaturePad = new SignaturePad(canvas, {
                    backgroundColor: 'white',
                    penColor: '#551B8C'
                });
            }
        }
        function closeSignatureModal() {
            document.getElementById('signatureModal').style.display = 'none';
        }
        document.getElementById('clearSignatureBtn').addEventListener('click', () => {
            if (signaturePad) signaturePad.clear();
        });
        document.getElementById('saveSignatureBtn').addEventListener('click', () => {
            if (signaturePad && !signaturePad.isEmpty()) {
                const dataURL = signaturePad.toDataURL();
                if (currentSignatureType === 'owner') {
                    ownerSignatureData = dataURL;
                    ownerSignImg.src = dataURL;
                    ownerPreview.innerHTML = `<img src="${dataURL}" style="max-height:60px;">`;
                } else {
                    // pour l'organisateur ou président, on stockerait dans des variables globales
                    if (currentSignatureType === 'organizer') organizerSignatureData = dataURL;
                    if (currentSignatureType === 'president') presidentSignatureData = dataURL;
                }
                closeSignatureModal();
            } else {
                alert('Veuillez signer dans le cadre.');
            }
        });
        window.openSignatureModal = openSignatureModal;
        window.closeSignatureModal = closeSignatureModal;

        // Génération de la carte (code de suivi, QR code)
        function generateTrackingCode() {
            return 'HUB-' + Math.random().toString(36).substring(2, 10).toUpperCase();
        }

        function generateCard() {
            // Validation des champs
            const fullName = document.getElementById('fullName').value.trim();
            const birthDate = document.getElementById('birthDate').value;
            const nationality = document.getElementById('nationality').value.trim();
            const country = document.getElementById('country').value.trim();
            const club = document.getElementById('club').value.trim();
            const clubLogoUrl = document.getElementById('clubLogoUrl').value.trim();
            const tournamentName = document.getElementById('tournamentName').value.trim();
            const acceptRules = document.getElementById('acceptRules').checked;
            if (!fullName || !birthDate || !nationality || !country || !acceptRules) {
                alert('Veuillez remplir tous les champs obligatoires et accepter le règlement.');
                return;
            }
            if (!ownerSignatureData) {
                alert('Veuillez signer la carte.');
                return;
            }

            // Génération du code de suivi
            const trackingCode = generateTrackingCode();
            const issueDate = new Date().toLocaleDateString('fr-FR');
            const expiryDate = new Date();
            expiryDate.setFullYear(expiryDate.getFullYear() + 1);
            const expiryDateStr = expiryDate.toLocaleDateString('fr-FR');
            const deliveryPlace = 'Cotonou, Bénin';

            // Stockage local des données (simule la persistance pour récupération plus tard)
            const cardData = {
                fullName, birthDate, nationality, country, club, clubLogoUrl, tournamentName,
                trackingCode, issueDate, expiryDateStr, deliveryPlace,
                ownerSignature: ownerSignatureData,
                category: category,
                categoryLabel: categoryLabels[category]
            };
            localStorage.setItem('pendingCard_' + trackingCode, JSON.stringify(cardData));

            // Affichage de la carte
            displayCard(cardData);
            document.getElementById('cardPreviewSection').style.display = 'block';
            document.querySelector('.form-section').style.display = 'none';
        }

        function displayCard(data) {
            // Recto
            const frontInfo = document.getElementById('frontInfo');
            frontInfo.innerHTML = `
                <p><strong>N° Carte :</strong> ${data.trackingCode}</p>
                <p><strong>Nom :</strong> ${escapeHtml(data.fullName)}</p>
                <p><strong>Date naissance :</strong> ${data.birthDate}</p>
                <p><strong>Nationalité :</strong> ${escapeHtml(data.nationality)}</p>
                <p><strong>Pays :</strong> ${escapeHtml(data.country)}</p>
                <p><strong>Club :</strong> ${escapeHtml(data.club) || '-'}</p>
                <p><strong>Catégorie :</strong> ${data.categoryLabel}</p>
                <p><strong>Tournoi :</strong> ${escapeHtml(data.tournamentName) || '-'}</p>
            `;
            document.getElementById('ownerSignImg').src = data.ownerSignature;
            // Logos (si URL fournie)
            if (data.clubLogoUrl) document.getElementById('clubLogo').src = data.clubLogoUrl;
            else document.getElementById('clubLogo').src = 'img/default-club.png';
            // QR code (pour le suivi)
            const qrDiv = document.getElementById('qrCode');
            qrDiv.innerHTML = '';
            new QRCode(qrDiv, {
                text: `https://hubisoccer.com/verify-card?code=${data.trackingCode}`,
                width: 100,
                height: 100
            });

            // Verso
            const backInfo = document.getElementById('backInfo');
            backInfo.innerHTML = `
                <p><strong>Délivré par :</strong> HubISoccer</p>
                <p><strong>Lieu de délivrance :</strong> ${data.deliveryPlace}</p>
                <p><strong>Date de délivrance :</strong> ${data.issueDate}</p>
                <p><strong>Valable jusqu'au :</strong> ${data.expiryDateStr}</p>
            `;
            // Drapeau (par défaut on met un drapeau générique)
            document.getElementById('flagImg').src = `https://flagcdn.com/64x48/${data.countryCode || 'bj'}.png`;
            // Pour l'instant, les signatures organisateur et président sont vides ; elles seront ajoutées après validation admin
            // On pourrait laisser des placeholders
            document.getElementById('organizerSignImg').src = '';
            document.getElementById('presidentSignImg').src = '';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Impression / PDF
        document.getElementById('printCardBtn').addEventListener('click', () => {
            const element = document.getElementById('cardPreview');
            html2pdf().from(element).set({
                margin: 0.5,
                filename: `carte_${document.getElementById('fullName').value.trim().replace(/\s/g, '_')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
            }).save();
        });

        // Réinitialisation du formulaire
        document.getElementById('resetFormBtn').addEventListener('click', () => {
            document.getElementById('carteForm').reset();
            ownerSignatureData = null;
            ownerPreview.innerHTML = '<i class="fas fa-pen"></i> Cliquez pour signer';
            ownerSignImg.src = '';
            document.getElementById('cardPreviewSection').style.display = 'none';
            document.querySelector('.form-section').style.display = 'block';
        });

        // Édition après génération
        document.getElementById('editCardBtn').addEventListener('click', () => {
            document.getElementById('cardPreviewSection').style.display = 'none';
            document.querySelector('.form-section').style.display = 'block';
        });

        // Gestionnaire du bouton principal
        document.getElementById('generateCardBtn').addEventListener('click', generateCard);
    </script>
</body>
</html>
