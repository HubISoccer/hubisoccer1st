<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Live Stream | HubISoccer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/hubismanagtournoi.css">
    <link rel="stylesheet" href="css/live-stream.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="live-container">
        <div class="page-header">
            <button class="btn-back" id="backBtn">
                <i class="fas fa-arrow-left"></i>
                Retour
            </button>
            <h1>
                <i class="fas fa-video"></i>
                Live Stream
            </h1>
        </div>

        <div class="match-selector">
            <label><i class="fas fa-calendar-alt"></i> Sélectionner un match</label>
            <select id="matchSelect">
                <option value="">Chargement...</option>
            </select>
        </div>

        <div class="stream-container">
            <div id="playerContainer" class="player-container">
                <div class="player-placeholder">
                    <i class="fas fa-play-circle"></i>
                    <p>Sélectionnez un match pour voir le flux</p>
                </div>
            </div>
        </div>

        <div class="live-stats">
            <div class="score-board">
                <div class="team home">
                    <span id="homeTeamName">-</span>
                    <span id="homeScore" class="score">0</span>
                </div>
                <div class="vs">
                    <span>VS</span>
                </div>
                <div class="team away">
                    <span id="awayScore" class="score">0</span>
                    <span id="awayTeamName">-</span>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Possession</h3>
                    <div class="possession-bar">
                        <div class="possession-home" style="width: 50%;">50%</div>
                        <div class="possession-away" style="width: 50%;">50%</div>
                    </div>
                </div>
                <div class="stat-card">
                    <h3>Tirs</h3>
                    <div class="shots">
                        <span id="shotsHome">0</span> - <span id="shotsAway">0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <h3>Tirs cadrés</h3>
                    <div class="shots-on-target">
                        <span id="shotsOnTargetHome">0</span> - <span id="shotsOnTargetAway">0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <h3>Fautes</h3>
                    <div class="fouls">
                        <span id="foulsHome">0</span> - <span id="foulsAway">0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <h3>Corners</h3>
                    <div class="corners">
                        <span id="cornersHome">0</span> - <span id="cornersAway">0</span>
                    </div>
                </div>
            </div>

            <div class="events-feed">
                <h3><i class="fas fa-list"></i> Événements du match</h3>
                <div id="eventsList" class="events-list">
                    <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Chargement...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/supabase-client.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/live-stream.js"></script>
</body>
</html>
