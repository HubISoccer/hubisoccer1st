<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Saisir rapport de match | HubISoccer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/hubismanagtournoi.css">
    <link rel="stylesheet" href="css/match-report.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="report-container">
        <div class="page-header">
            <button class="btn-back" id="backBtn">
                <i class="fas fa-arrow-left"></i>
                Retour
            </button>
            <h1>
                <i class="fas fa-file-alt"></i>
                Saisir rapport de match
            </h1>
        </div>

        <div class="report-card">
            <div id="matchInfo" class="match-info">
                <div class="match-teams" id="matchTeams">Chargement...</div>
                <div class="match-date" id="matchDate">-</div>
                <div class="match-location" id="matchLocation">-</div>
            </div>

            <div class="form-group">
                <label>Type de rapport *</label>
                <select id="reportType" required>
                    <option value="">Sélectionnez</option>
                    <option value="referee">Rapport arbitre</option>
                    <option value="commissioner">Rapport commissaire</option>
                    <option value="medical">Rapport staff médical</option>
                </select>
            </div>

            <!-- Contenu dynamique selon le type -->
            <div id="refereeForm" class="report-form" style="display: none;">
                <h3>Rapport arbitre</h3>
                <div class="form-group">
                    <label>Score final</label>
                    <div class="score-input">
                        <input type="number" id="homeScore" placeholder="Domicile" min="0">
                        <span>-</span>
                        <input type="number" id="awayScore" placeholder="Extérieur" min="0">
                    </div>
                </div>
                <div class="form-group">
                    <label>Cartons jaunes (équipe domicile)</label>
                    <input type="text" id="yellowHome" placeholder="Ex: Dupont (15'), Martin (32')">
                </div>
                <div class="form-group">
                    <label>Cartons jaunes (équipe extérieur)</label>
                    <input type="text" id="yellowAway" placeholder="Ex: Diallo (45+1')">
                </div>
                <div class="form-group">
                    <label>Cartons rouges</label>
                    <input type="text" id="redCards" placeholder="Ex: Keita (78')">
                </div>
                <div class="form-group">
                    <label>Remarques / incidents</label>
                    <textarea id="refereeRemarks" rows="4"></textarea>
                </div>
            </div>

            <div id="commissionerForm" class="report-form" style="display: none;">
                <h3>Rapport commissaire</h3>
                <div class="form-group">
                    <label>Affluence estimée</label>
                    <input type="number" id="attendance" placeholder="Nombre de spectateurs">
                </div>
                <div class="form-group">
                    <label>Évaluation de l'organisation (1-5)</label>
                    <select id="orgRating">
                        <option value="1">1 - Insuffisant</option>
                        <option value="2">2 - Moyen</option>
                        <option value="3">3 - Bien</option>
                        <option value="4">4 - Très bien</option>
                        <option value="5">5 - Excellent</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Observations générales</label>
                    <textarea id="commissionerRemarks" rows="4"></textarea>
                </div>
            </div>

            <div id="medicalForm" class="report-form" style="display: none;">
                <h3>Rapport staff médical</h3>
                <div class="form-group">
                    <label>Blessures signalées (équipe domicile)</label>
                    <input type="text" id="injuriesHome" placeholder="Ex: Koné (coup au genou, 30')">
                </div>
                <div class="form-group">
                    <label>Blessures signalées (équipe extérieur)</label>
                    <input type="text" id="injuriesAway" placeholder="Ex: Traoré (entorse cheville, 67')">
                </div>
                <div class="form-group">
                    <label>Interventions médicales sur le terrain</label>
                    <input type="text" id="medicalInterventions" placeholder="Ex: 3 interventions">
                </div>
                <div class="form-group">
                    <label>Recommandations post-match</label>
                    <textarea id="medicalAdvice" rows="4"></textarea>
                </div>
            </div>

            <div class="form-group">
                <label>Pièce jointe (optionnel)</label>
                <input type="file" id="reportFile" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">
                <small>Formats acceptés : PDF, images, Word</small>
            </div>

            <div class="form-actions">
                <button type="button" id="submitReport" class="btn-primary">Enregistrer le rapport</button>
                <button type="button" id="cancelBtn" class="btn-secondary">Annuler</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/supabase-client.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/match-report.js"></script>
</body>
</html>
