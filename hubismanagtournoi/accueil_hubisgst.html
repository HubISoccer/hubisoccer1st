<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HubISoccer – Gestion des tournois</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/hubismanagtournoi.css">
    <link rel="stylesheet" href="css/tournament-card.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="tournoi-container">
        <header class="tournoi-header">
            <div class="header-content">
                <h1><i class="fas fa-trophy"></i> Gestion des tournois</h1>
                <button id="createTournamentBtn" class="btn-primary"><i class="fas fa-plus"></i> Créer un tournoi</button>
            </div>
            <p class="subtitle">Participez, organisez et suivez vos compétitions sportives</p>
        </header>

        <div class="filters-bar">
            <div class="filter-group">
                <label><i class="fas fa-filter"></i> Sport</label>
                <select id="sportFilter"><option value="all">Tous les sports</option></select>
            </div>
            <div class="filter-group">
                <label><i class="fas fa-calendar-alt"></i> Période</label>
                <select id="periodFilter">
                    <option value="all">Tous</option>
                    <option value="upcoming">À venir</option>
                    <option value="ongoing">En cours</option>
                    <option value="past">Terminés</option>
                </select>
            </div>
            <div class="filter-group">
                <label><i class="fas fa-tag"></i> Type</label>
                <select id="typeFilter"><option value="all">Tous</option></select>
            </div>
        </div>

        <div class="tournaments-grid" id="tournamentsGrid">
            <div class="loader" id="loader"><i class="fas fa-spinner fa-pulse"></i> Chargement...</div>
        </div>
    </div>

    <script src="js/supabase-client.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/tournaments.js"></script>
    <script>
        // Utilisation directe de supabaseGestionTournoi (défini dans supabase-client.js)
        // Pas de redéclaration de supabase.

        let allTournaments = [];
        let sportsMap = {};
        let typesMap = {};

        async function loadFilters() {
            try {
                const sports = await loadSportsList();
                const types = await loadTournamentTypes();

                const sportSelect = document.getElementById('sportFilter');
                sports.forEach(sport => {
                    sportsMap[sport.id] = sport.name;
                    const opt = document.createElement('option');
                    opt.value = sport.name;
                    opt.textContent = sport.name;
                    sportSelect.appendChild(opt);
                });

                const typeSelect = document.getElementById('typeFilter');
                types.forEach(type => {
                    typesMap[type.name] = type.label;
                    const opt = document.createElement('option');
                    opt.value = type.name;
                    opt.textContent = type.label;
                    typeSelect.appendChild(opt);
                });
            } catch (err) {
                console.error('Erreur chargement filtres', err);
            }
        }

        async function loadAndDisplayTournaments() {
            try {
                const tournaments = await loadTournamentsList(); // fonction de tournaments.js
                allTournaments = tournaments;
                applyFilters();
            } catch (err) {
                console.error('Erreur chargement tournois', err);
                document.getElementById('loader').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Erreur de chargement</p></div>';
            }
        }

        function applyFilters() {
            const sport = document.getElementById('sportFilter').value;
            const period = document.getElementById('periodFilter').value;
            const type = document.getElementById('typeFilter').value;
            const now = new Date();
            let filtered = allTournaments.filter(t => {
                if (sport !== 'all' && t.sport !== sport) return false;
                if (type !== 'all' && t.type !== type) return false;
                const start = new Date(t.start_date);
                const end = new Date(t.end_date);
                if (period === 'upcoming') return start > now;
                if (period === 'ongoing') return start <= now && end >= now;
                if (period === 'past') return end < now;
                return true;
            });
            renderTournaments(filtered);
        }

        function renderTournaments(tournaments) {
            const grid = document.getElementById('tournamentsGrid');
            grid.innerHTML = '';
            if (!tournaments.length) {
                grid.innerHTML = '<div class="empty-state"><i class="fas fa-calendar-times"></i><p>Aucun tournoi correspondant</p></div>';
                return;
            }
            tournaments.forEach(t => {
                const card = document.createElement('div');
                card.className = 'tournament-card';
                const start = new Date(t.start_date).toLocaleDateString('fr-FR');
                const end = new Date(t.end_date).toLocaleDateString('fr-FR');
                let badgeClass = '';
                if (t.type === 'public_show') badgeClass = 'badge-show';
                else if (t.type === 'public_detection') badgeClass = 'badge-detection';
                else if (t.type === 'private_hubisoccer') badgeClass = 'badge-private';
                else if (t.type === 'private_simple') badgeClass = 'badge-simple';
                card.innerHTML = `
                    <div class="card-badge ${badgeClass}">${t.typeLabel}</div>
                    <div class="card-sport"><i class="fas fa-futbol"></i> ${t.sport}</div>
                    <h3 class="card-title">${escapeHtml(t.name)}</h3>
                    <div class="card-date"><i class="fas fa-calendar-alt"></i> ${start} - ${end}</div>
                    <div class="card-location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(t.location)}</div>
                    ${t.prize_pool ? `<div class="card-prize"><i class="fas fa-trophy"></i> ${t.prize_pool.toLocaleString()} FCFA</div>` : ''}
                    <button class="btn-details" data-id="${t.id}">Voir les détails</button>
                `;
                grid.appendChild(card);
            });
            document.querySelectorAll('.btn-details').forEach(btn => {
                btn.addEventListener('click', () => {
                    window.location.href = `tournament-details.html?id=${btn.dataset.id}`;
                });
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadFilters();
            await loadAndDisplayTournaments();

            document.getElementById('sportFilter').addEventListener('change', applyFilters);
            document.getElementById('periodFilter').addEventListener('change', applyFilters);
            document.getElementById('typeFilter').addEventListener('change', applyFilters);
            document.getElementById('createTournamentBtn').addEventListener('click', () => {
                window.location.href = 'create-tournament.html';
            });
        });
    </script>
</body>
</html>
