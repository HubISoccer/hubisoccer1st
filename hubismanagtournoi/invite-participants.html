<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Inviter des participants | HubISoccer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/hubismanagtournoi.css">
    <link rel="stylesheet" href="css/invite-participants.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="invite-container">
        <div class="page-header">
            <button class="btn-back" id="backBtn">
                <i class="fas fa-arrow-left"></i>
                Retour
            </button>
            <h1>
                <i class="fas fa-envelope-open-text"></i>
                Inviter des participants
            </h1>
        </div>

        <div id="tournamentInfo" class="tournament-info">
            <h2 id="tournamentName">Chargement...</h2>
            <p id="tournamentDetails">-</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="teams">Équipes</button>
            <button class="tab-btn" data-tab="players">Joueurs</button>
            <button class="tab-btn" data-tab="invitations">Invitations envoyées</button>
        </div>

        <!-- Onglet Équipes -->
        <div id="teamsTab" class="tab-content active">
            <div class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="teamSearch" placeholder="Rechercher une équipe...">
                </div>
                <button id="createTeamBtn" class="btn-secondary">
                    <i class="fas fa-plus"></i> Créer une équipe
                </button>
            </div>
            <div id="teamsList" class="items-list">
                <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Chargement...</div>
            </div>
        </div>

        <!-- Onglet Joueurs -->
        <div id="playersTab" class="tab-content">
            <div class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="playerSearch" placeholder="Rechercher un joueur...">
                </div>
            </div>
            <div id="playersList" class="items-list">
                <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Chargement...</div>
            </div>
        </div>

        <!-- Onglet Invitations -->
        <div id="invitationsTab" class="tab-content">
            <div id="invitationsList" class="invitations-list">
                <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Chargement...</div>
            </div>
        </div>
    </div>

    <!-- Modale Créer une équipe -->
    <div id="createTeamModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Créer une nouvelle équipe</h2>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <form id="createTeamForm">
                    <div class="form-group">
                        <label>Nom de l'équipe *</label>
                        <input type="text" id="teamName" required>
                    </div>
                    <div class="form-group">
                        <label>Catégorie d'âge (optionnel)</label>
                        <input type="text" id="teamAgeCategory">
                    </div>
                    <div class="form-group">
                        <label>Logo (URL)</label>
                        <input type="url" id="teamLogo">
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-cancel">Annuler</button>
                        <button type="submit" class="btn-confirm">Créer et inviter</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/supabase-client.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/invite-participants.js"></script>
</body>
</html>
