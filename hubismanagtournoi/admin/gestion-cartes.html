<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Administration – Cartes de tournoi | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f5f7fa; padding: 40px 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #551B8C; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .cards-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card-item { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #e9ecef; cursor: pointer; transition: all 0.2s; }
        .card-item:hover { transform: translateY(-3px); border-color: #551B8C; }
        .card-item h3 { font-size: 1.2rem; margin-bottom: 5px; }
        .card-item p { color: #6c757d; font-size: 0.9rem; margin: 5px 0; }
        .badge-pending { background: #ffc107; color: black; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; display: inline-block; }
        .badge-approved { background: #28a745; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 32px; width: 95%; max-width: 1100px; max-height: 90vh; overflow-y: auto; padding: 30px; position: relative; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-modal { font-size: 28px; cursor: pointer; }
        .card-preview { display: flex; flex-wrap: wrap; gap: 30px; margin: 20px 0; }
        .card-face { flex: 1; min-width: 300px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card-front { background: #f3e8ff; border: 1px solid #551B8C; }
        .card-back { background: linear-gradient(135deg, #fff3bf, #cce7ff); border: 1px solid #ffcc00; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-header img { height: 50px; object-fit: contain; }
        .card-info p { margin: 8px 0; }
        .signature-area { margin-top: 20px; border-top: 1px solid #ddd; padding-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        .signature-area img { max-height: 50px; max-width: 150px; }
        .qr-code { text-align: center; margin: 15px 0; }
        .admin-signatures { margin-top: 30px; padding-top: 20px; border-top: 2px solid #e9ecef; display: flex; gap: 30px; flex-wrap: wrap; }
        .signature-box { flex: 1; text-align: center; }
        .signature-preview { border: 2px dashed #551B8C; border-radius: 12px; padding: 10px; cursor: pointer; background: #f9f9ff; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .btn { padding: 8px 20px; border-radius: 30px; border: none; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #551B8C; color: white; }
        .btn-primary:hover { background: #3d1266; }
        .btn-success { background: #28a745; color: white; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 15px; margin-top: 30px; }
        .signature-canvas { border: 1px solid #ccc; border-radius: 8px; width: 100%; height: 200px; touch-action: none; }
        .photo-titulaire img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-id-card"></i> Gestion des cartes de tournoi</h1>
        <div class="cards-list" id="cardsList"></div>
    </div>

    <div id="cardModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Détail de la demande</h2>
                <span class="close-modal" onclick="closeCardModal()">&times;</span>
            </div>
            <div id="cardDetail"></div>
            <div class="admin-signatures" id="adminSignaturesArea">
                <div class="signature-box">
                    <h4>Signature de l'organisateur du tournoi</h4>
                    <div id="organizerSignPreview" class="signature-preview" onclick="openAdminSignatureModal('organizer')">
                        <i class="fas fa-pen"></i> Cliquez pour signer
                    </div>
                </div>
                <div class="signature-box">
                    <h4>Signature du président HubISoccer</h4>
                    <div id="presidentSignPreview" class="signature-preview" onclick="openAdminSignatureModal('president')">
                        <i class="fas fa-pen"></i> Cliquez pour signer
                    </div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="validateCardBtn">Valider la carte</button>
                <button class="btn" onclick="closeCardModal()">Fermer</button>
            </div>
        </div>
    </div>

    <div id="adminSignatureModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h3 id="adminSignTitle">Signature</h3>
                <span class="close-modal" onclick="closeAdminSignatureModal()">&times;</span>
            </div>
            <div class="modal-body">
                <canvas id="adminSignCanvas" class="signature-canvas" width="400" height="200" style="width:100%; height:200px;"></canvas>
                <div class="signature-actions" style="margin-top: 10px; display: flex; gap: 10px;">
                    <button class="btn" id="clearAdminSignBtn">Effacer</button>
                    <button class="btn btn-primary" id="saveAdminSignBtn">Valider</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let pendingCards = [];
        let currentCardId = null;
        let adminSignaturePad = null;
        let currentAdminSignType = null;
        let organizerSignature = null;
        let presidentSignature = null;

        function loadCards() {
            pendingCards = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('pendingCard_')) {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        data.key = key;
                        data.trackingCode = key.replace('pendingCard_', '');
                        pendingCards.push(data);
                    } catch(e) {}
                }
            }
            renderCardsList();
        }

        function renderCardsList() {
            const container = document.getElementById('cardsList');
            if (pendingCards.length === 0) {
                container.innerHTML = '<p>Aucune demande de carte en attente.</p>';
                return;
            }
            container.innerHTML = pendingCards.map(card => `
                <div class="card-item" onclick="openCardModal('${card.trackingCode}')">
                    <h3>${escapeHtml(card.fullName)}</h3>
                    <p>Code : ${card.trackingCode}</p>
                    <p>Catégorie : ${card.categoryLabel}</p>
                    <p>Date demande : ${card.issueDate}</p>
                    <span class="badge-pending">En attente de validation</span>
                </div>
            `).join('');
        }

        function openCardModal(trackingCode) {
            const cardData = pendingCards.find(c => c.trackingCode === trackingCode);
            if (!cardData) return;
            currentCardId = trackingCode;
            const detailDiv = document.getElementById('cardDetail');
            const photoHtml = cardData.photo ? `<div class="photo-titulaire"><img src="${cardData.photo}" style="width:80px; height:80px; border-radius:50%; object-fit:cover; margin-top:10px;"></div>` : '';
            detailDiv.innerHTML = `
                <div class="card-preview">
                    <div class="card-face card-front">
                        <div class="card-header">
                            <img src="img/default-organizer.png" alt="Logo organisateur">
                            <img src="${cardData.clubLogo || 'img/default-club.png'}" alt="Logo club" onerror="this.src='img/default-club.png'">
                        </div>
                        <div class="card-info">
                            <p><strong>N° Carte :</strong> ${cardData.trackingCode}</p>
                            <p><strong>Nom :</strong> ${escapeHtml(cardData.fullName)}</p>
                            <p><strong>Date naissance :</strong> ${cardData.birthDate}</p>
                            <p><strong>Nationalité :</strong> ${escapeHtml(cardData.nationality)}</p>
                            <p><strong>Pays :</strong> ${escapeHtml(cardData.country)}</p>
                            <p><strong>Club :</strong> ${escapeHtml(cardData.club) || '-'}</p>
                            <p><strong>Catégorie :</strong> ${cardData.categoryLabel}</p>
                            <p><strong>Tournoi :</strong> ${escapeHtml(cardData.tournamentName) || '-'}</p>
                            ${photoHtml}
                        </div>
                        <div class="signature-area">
                            <div><strong>Signature propriétaire</strong><br><img src="${cardData.ownerSignature}" style="max-height:50px;"></div>
                            <div><strong>Signature organisateur</strong><br><img id="adminOrganizerSign" style="max-height:50px;"></div>
                        </div>
                        <div class="qr-code" id="qrDetail"></div>
                    </div>
                    <div class="card-face card-back">
                        <div class="card-header">
                            <img src="https://flagcdn.com/64x48/${cardData.countryCode || 'bj'}.png" alt="Drapeau">
                            <img src="img/hubisoccer-logo.png" alt="HubISoccer">
                        </div>
                        <div class="card-info">
                            <p><strong>Délivré par :</strong> HubISoccer</p>
                            <p><strong>Lieu de délivrance :</strong> ${cardData.deliveryPlace}</p>
                            <p><strong>Date de délivrance :</strong> ${cardData.issueDate}</p>
                            <p><strong>Valable jusqu'au :</strong> ${cardData.expiryDateStr}</p>
                        </div>
                        <div class="signature-area">
                            <div><strong>Signature du président</strong><br><img id="adminPresidentSign" style="max-height:50px;"></div>
                        </div>
                    </div>
                </div>
            `;
            const qrDiv = document.getElementById('qrDetail');
            qrDiv.innerHTML = '';
            new QRCode(qrDiv, { text: `https://hubisoccer.com/verify-card?code=${cardData.trackingCode}`, width: 100, height: 100 });
            organizerSignature = null;
            presidentSignature = null;
            document.getElementById('organizerSignPreview').innerHTML = '<i class="fas fa-pen"></i> Cliquez pour signer';
            document.getElementById('presidentSignPreview').innerHTML = '<i class="fas fa-pen"></i> Cliquez pour signer';
            document.getElementById('adminOrganizerSign').src = '';
            document.getElementById('adminPresidentSign').src = '';
            document.getElementById('cardModal').style.display = 'flex';
        }

        function closeCardModal() { document.getElementById('cardModal').style.display = 'none'; currentCardId = null; }
        function openAdminSignatureModal(type) {
            currentAdminSignType = type;
            const title = type === 'organizer' ? 'Signature de l\'organisateur' : 'Signature du président HubISoccer';
            document.getElementById('adminSignTitle').innerText = title;
            const canvas = document.getElementById('adminSignCanvas');
            canvas.width = canvas.offsetWidth || 400;
            canvas.height = canvas.offsetHeight || 200;
            if (adminSignaturePad) adminSignaturePad.clear();
            else adminSignaturePad = new SignaturePad(canvas, { backgroundColor: 'white', penColor: '#551B8C' });
            document.getElementById('adminSignatureModal').style.display = 'flex';
        }
        function closeAdminSignatureModal() { document.getElementById('adminSignatureModal').style.display = 'none'; }
        document.getElementById('clearAdminSignBtn').addEventListener('click', () => { if (adminSignaturePad) adminSignaturePad.clear(); });
        document.getElementById('saveAdminSignBtn').addEventListener('click', () => {
            if (adminSignaturePad && !adminSignaturePad.isEmpty()) {
                const dataURL = adminSignaturePad.toDataURL();
                if (currentAdminSignType === 'organizer') {
                    organizerSignature = dataURL;
                    document.getElementById('organizerSignPreview').innerHTML = `<img src="${dataURL}" style="max-height:60px;">`;
                    document.getElementById('adminOrganizerSign').src = dataURL;
                } else {
                    presidentSignature = dataURL;
                    document.getElementById('presidentSignPreview').innerHTML = `<img src="${dataURL}" style="max-height:60px;">`;
                    document.getElementById('adminPresidentSign').src = dataURL;
                }
                closeAdminSignatureModal();
            } else alert('Veuillez signer.');
        });

        async function validateCard() {
            if (!organizerSignature || !presidentSignature) {
                alert('Veuillez apposer les deux signatures avant validation.');
                return;
            }
            const cardData = pendingCards.find(c => c.trackingCode === currentCardId);
            if (!cardData) return;
            cardData.organizerSignature = organizerSignature;
            cardData.presidentSignature = presidentSignature;
            cardData.status = 'approved';
            localStorage.setItem(`pendingCard_${currentCardId}`, JSON.stringify(cardData));
            loadCards();
            closeCardModal();
            alert('Carte validée avec succès.');
        }
        document.getElementById('validateCardBtn').addEventListener('click', validateCard);
        window.openCardModal = openCardModal;
        window.closeCardModal = closeCardModal;
        window.openAdminSignatureModal = openAdminSignatureModal;
        window.closeAdminSignatureModal = closeAdminSignatureModal;
        loadCards();

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    </script>
</body>
</html>
