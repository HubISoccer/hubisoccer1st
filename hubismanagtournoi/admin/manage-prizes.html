<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gestion des primes – HubISoccer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/hubismanagtournoi.css">
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }
        .admin-header h1 {
            font-size: 2rem;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .filters select, .filters input {
            padding: 8px 15px;
            border: 1px solid var(--light-gray);
            border-radius: 30px;
            font-family: 'Poppins', sans-serif;
        }
        .prizes-table {
            background: white;
            border-radius: 20px;
            overflow-x: auto;
            box-shadow: var(--shadow);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--light-gray);
        }
        th {
            background: var(--bg-light);
            font-weight: 600;
            color: var(--primary);
        }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .status-paid {
            background: var(--success);
            color: white;
        }
        .status-pending {
            background: var(--warning);
            color: black;
        }
        .btn-pay {
            background: var(--primary);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-pay:hover {
            background: var(--primary-dark);
        }
        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--light-gray);
            border-radius: 8px;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-trophy"></i> Gestion des primes</h1>
            <button class="btn-add" id="addPrizeBtn"><i class="fas fa-plus"></i> Ajouter une prime</button>
        </div>
        <div class="filters">
            <select id="tournamentFilter">
                <option value="all">Tous les tournois</option>
            </select>
            <select id="statusFilter">
                <option value="all">Tous statuts</option>
                <option value="paid">Payé</option>
                <option value="pending">En attente</option>
            </select>
        </div>
        <div class="prizes-table">
            <table>
                <thead>
                    <tr>
                        <th>Tournoi</th>
                        <th>Bénéficiaire</th>
                        <th>Montant</th>
                        <th>Raison</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="prizesTableBody">
                    <tr><td colspan="6" class="loader">Chargement...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Ajouter une prime -->
    <div id="prizeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Ajouter une prime</h2>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <form id="prizeForm">
                <div class="form-group">
                    <label>Tournoi *</label>
                    <select id="prizeTournament" required></select>
                </div>
                <div class="form-group">
                    <label>Bénéficiaire (équipe ou joueur)</label>
                    <select id="prizeRecipientType">
                        <option value="team">Équipe</option>
                        <option value="player">Joueur</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ID du bénéficiaire *</label>
                    <input type="number" id="prizeRecipientId" placeholder="ID de l'équipe ou du joueur" required>
                </div>
                <div class="form-group">
                    <label>Montant (FCFA) *</label>
                    <input type="number" id="prizeAmount" step="100" required>
                </div>
                <div class="form-group">
                    <label>Raison</label>
                    <input type="text" id="prizeReason" placeholder="Ex: Vainqueur, Meilleur buteur...">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn-save">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/supabase-client.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        const supabase = supabaseGestionTournoi;
        let tournamentsMap = {};

        async function loadTournamentsForFilter() {
            const { data, error } = await supabase
                .from('gestionnairetournoi_tournaments')
                .select('id, name')
                .order('start_date', { ascending: false });
            if (error) return;
            const filterSelect = document.getElementById('tournamentFilter');
            const prizeSelect = document.getElementById('prizeTournament');
            filterSelect.innerHTML = '<option value="all">Tous les tournois</option>';
            prizeSelect.innerHTML = '';
            data.forEach(t => {
                tournamentsMap[t.id] = t.name;
                const option = document.createElement('option');
                option.value = t.id;
                option.textContent = t.name;
                filterSelect.appendChild(option.cloneNode(true));
                prizeSelect.appendChild(option.cloneNode(true));
            });
        }

        async function loadPrizes() {
            const tournamentId = document.getElementById('tournamentFilter').value;
            const status = document.getElementById('statusFilter').value;
            let query = supabase
                .from('gestionnairetournoi_prizes')
                .select(`
                    id,
                    amount,
                    reason,
                    paid,
                    paid_at,
                    tournament_id,
                    team_id,
                    player_id,
                    tournament:gestionnairetournoi_tournaments(name)
                `);
            if (tournamentId !== 'all') query = query.eq('tournament_id', tournamentId);
            if (status !== 'all') query = query.eq('paid', status === 'paid');
            const { data, error } = await query.order('created_at', { ascending: false });
            const tbody = document.getElementById('prizesTableBody');
            if (error) {
                tbody.innerHTML = '<tr><td colspan="6">Erreur de chargement</td></tr>';
                return;
            }
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="6">Aucune prime enregistrée</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(prize => {
                let beneficiary = '';
                if (prize.team_id) beneficiary = `Équipe #${prize.team_id}`;
                else if (prize.player_id) beneficiary = `Joueur #${prize.player_id}`;
                else beneficiary = '-';
                const statusHtml = prize.paid ?
                    '<span class="status-badge status-paid">Payé</span>' :
                    '<span class="status-badge status-pending">En attente</span>';
                return `
                    <tr>
                        <td>${escapeHtml(prize.tournament?.name || 'Tournoi inconnu')}</td>
                        <td>${escapeHtml(beneficiary)}</td>
                        <td>${prize.amount.toLocaleString()} FCFA</td>
                        <td>${escapeHtml(prize.reason || '-')}</td>
                        <td>${statusHtml}</td>
                        <td>
                            ${!prize.paid ? `<button class="btn-pay" onclick="markPaid(${prize.id})">Marquer payé</button>` : ''}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function markPaid(prizeId) {
            const { error } = await supabase
                .from('gestionnairetournoi_prizes')
                .update({ paid: true, paid_at: new Date().toISOString() })
                .eq('id', prizeId);
            if (error) showToast('Erreur : ' + error.message, 'error');
            else {
                showToast('Prime marquée comme payée', 'success');
                loadPrizes();
            }
        }

        function openAddModal() {
            document.getElementById('prizeModal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('prizeModal').style.display = 'none';
        }

        document.getElementById('prizeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const tournament_id = document.getElementById('prizeTournament').value;
            const recipientType = document.getElementById('prizeRecipientType').value;
            const recipientId = parseInt(document.getElementById('prizeRecipientId').value);
            const amount = parseFloat(document.getElementById('prizeAmount').value);
            const reason = document.getElementById('prizeReason').value.trim();
            if (!tournament_id || !recipientId || isNaN(amount)) {
                showToast('Veuillez remplir tous les champs obligatoires', 'warning');
                return;
            }
            const data = {
                tournament_id: parseInt(tournament_id),
                amount: amount,
                reason: reason || null,
                paid: false
            };
            if (recipientType === 'team') data.team_id = recipientId;
            else data.player_id = recipientId;
            const { error } = await supabase
                .from('gestionnairetournoi_prizes')
                .insert(data);
            if (error) {
                showToast('Erreur : ' + error.message, 'error');
            } else {
                showToast('Prime ajoutée', 'success');
                closeModal();
                loadPrizes();
                document.getElementById('prizeForm').reset();
            }
        });

        document.getElementById('addPrizeBtn').addEventListener('click', openAddModal);
        document.getElementById('tournamentFilter').addEventListener('change', loadPrizes);
        document.getElementById('statusFilter').addEventListener('change', loadPrizes);
        window.closeModal = closeModal;
        window.markPaid = markPaid;
        loadTournamentsForFilter().then(() => loadPrizes());
    </script>
</body>
</html>
