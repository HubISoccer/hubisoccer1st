<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Parrain | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../../public/css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #551B8C 0%, #7e3db0 100%);
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h1 {
            color: #551B8C;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .auth-header p {
            color: #6c757d;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }
        .form-group input:focus {
            border-color: #551B8C;
            outline: none;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #551B8C;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-submit:hover {
            background: #7e3db0;
            transform: translateY(-2px);
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
        }
        .auth-footer a {
            color: #551B8C;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Inscription Parrain</h1>
                <p>Rejoignez la communauté des parrains</p>
            </div>
            <form id="signupForm">
                <div class="form-group">
                    <label>Prénom</label>
                    <input type="text" id="firstName" required>
                </div>
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" id="lastName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label>Confirmer le mot de passe</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                <button type="submit" class="btn-submit">S'inscrire</button>
            </form>
            <div class="auth-footer">
                <p>Déjà inscrit ? <a href="login.html">Connectez-vous</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://wxlpcflanihqwumjwpjs.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4bHBjZmxhbmlocXd1bWp3cGpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzcwNzAsImV4cCI6MjA4Nzg1MzA3MH0.i1ZW-9MzSaeOKizKjaaq6mhtl7X23LsVpkkohc_p6Fw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                alert('Les mots de passe ne correspondent pas');
                return;
            }

            try {
                // 1. Créer l'utilisateur dans Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email,
                    password
                });
                if (authError) throw authError;

                // 2. Créer le profil dans parrain_profiles
                const { error: profileError } = await supabase
                    .from('parrain_profiles')
                    .insert([{
                        user_id: authData.user.id,
                        first_name: firstName,
                        last_name: lastName,
                        email: email,
                        phone: phone,
                        date_adhesion: new Date(),
                        total_dons: 0,
                        nb_joueurs_soutenus: 0
                    }]);
                if (profileError) throw profileError;

                alert('Inscription réussie ! Vous pouvez maintenant vous connecter.');
                window.location.href = 'login.html';
            } catch (err) {
                alert('Erreur inscription : ' + err.message);
            }
        });
    </script>
</body>
</html>
