<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Épreuve de qualification | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="public/css/style.css">
    <link rel="stylesheet" href="public/css/epreuve.css">
    <style>
        /* Styles pour l'overlay de déverrouillage */
        .unlock-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .unlock-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .unlock-card h2 {
            color: var(--primary);
            margin-bottom: 20px;
        }
        .unlock-card p {
            color: var(--gray);
            margin-bottom: 30px;
        }
        .unlock-card input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--light-gray);
            border-radius: 10px;
            font-size: 1rem;
            margin-bottom: 20px;
        }
        .unlock-card button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .unlock-card button:hover {
            background: var(--primary-light);
        }
        .blurred {
            filter: blur(5px);
            pointer-events: none;
            user-select: none;
        }
    </style>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Overlay de déverrouillage -->
    <div id="unlockOverlay" class="unlock-overlay">
        <div class="unlock-card">
            <h2><i class="fas fa-lock"></i> Épreuve verrouillée</h2>
            <p>Veuillez saisir votre ID de suivi (reçu après examen.html) pour accéder à l'épreuve.</p>
            <input type="text" id="unlockId" placeholder="Ex: 1772050361699">
            <button id="unlockBtn">Déverrouiller</button>
            <p style="margin-top:15px; font-size:0.8rem;">Cet ID est unique et vous a été communiqué.</p>
        </div>
    </div>

    <!-- Contenu principal (flouté tant que non déverrouillé) -->
    <div id="mainContent" class="blurred">
        <!-- Navigation et reste de la page -->
        <nav>
            <a href="index.html" class="logo-link">
                <img src="public/img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
            </a>
            <div class="nav-right">
                <!-- ... (garde ta navigation existante) ... -->
            </div>
        </nav>

        <main class="epreuve-container">
            <div class="epreuve-card">
                <h1>Épreuve de qualification</h1>
                <p class="subtitle">Répondez aux 10 questions (tirées du guide).</p>
                <form id="quizForm">
                    <!-- Tes questions (garde-les telles quelles) -->
                    <!-- ... -->
                    <button type="submit" class="btn-submit">Soumettre mon épreuve</button>
                </form>
            </div>
        </main>

        <footer>
            <!-- Ton footer -->
        </footer>
    </div>

    <script src="public/js/main.js"></script>
    <script src="public/js/epreuve.js"></script>
</body>
</html>
