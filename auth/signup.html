<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #1a1a2e;
            overflow-x: hidden;
        }
        /* fond abstrait */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .bg-shapes .shape {
            position: absolute;
            background: rgba(107, 59, 164, 0.03);
            border-radius: 50%;
            filter: blur(80px);
        }
        .shape-1 { width: 500px; height: 500px; top: -200px; left: -200px; }
        .shape-2 { width: 600px; height: 600px; bottom: -200px; right: -200px; background: rgba(107, 59, 164, 0.05); }
        .shape-3 { width: 300px; height: 300px; top: 40%; left: 10%; background: rgba(0, 200, 150, 0.02); }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(107,59,164,0.1);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo img { height: 42px; }
        .logo span { font-size: 1.4rem; font-weight: 700; color: #6b3ba4; }
        .nav-btn-outline {
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid #6b3ba4;
            color: #6b3ba4;
            background: transparent;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        .nav-btn-outline:hover { background: #6b3ba4; color: white; transform: translateY(-2px); }
        .container {
            min-height: calc(100vh - 90px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }
        .signup-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 48px 56px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05), 0 0 0 1px rgba(107,59,164,0.05);
            transition: transform 0.3s ease;
            border: 1px solid rgba(107,59,164,0.15);
        }
        .signup-card:hover { transform: translateY(-5px); box-shadow: 0 40px 70px rgba(107,59,164,0.1); }
        .signup-header { text-align: center; margin-bottom: 32px; }
        .signup-header h2 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6b3ba4, #9b6bcd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .signup-header p { color: #5a5a72; font-size: 0.95rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 8px; color: #2d2d3a; font-size: 0.9rem; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper input, .input-wrapper select {
            width: 100%;
            padding: 12px 48px 12px 18px;
            font-size: 1rem;
            border: 1px solid #e2e2f0;
            border-radius: 28px;
            background: #fbfbff;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .input-wrapper select { appearance: none; background: #fbfbff; }
        .input-wrapper input:focus, .input-wrapper select:focus {
            outline: none;
            border-color: #6b3ba4;
            box-shadow: 0 0 0 3px rgba(107,59,164,0.1);
        }
        .input-wrapper .toggle-password {
            position: absolute;
            right: 16px;
            cursor: pointer;
            color: #aaa;
            transition: color 0.2s;
        }
        .input-wrapper .toggle-password:hover { color: #6b3ba4; }
        .inline-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .btn-signup {
            width: 100%;
            padding: 14px;
            background: #6b3ba4;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
            font-family: 'Inter', sans-serif;
        }
        .btn-signup:hover { background: #552e84; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(107,59,164,0.3); }
        .login-link { text-align: center; margin-top: 24px; font-size: 0.9rem; color: #5a5a72; }
        .login-link a { color: #6b3ba4; text-decoration: none; font-weight: 600; }
        .login-link a:hover { text-decoration: underline; }
        .footer { text-align: center; padding: 24px; font-size: 0.8rem; color: #aaa; border-top: 1px solid #eee; }
        .role-badge {
            background: #f0eaff;
            color: #6b3ba4;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 16px;
        }
        .error-text {
            color: #e53e3e;
            font-size: 0.75rem;
            margin-top: 5px;
            margin-left: 18px;
        }
        @media (max-width: 640px) {
            .navbar { padding: 16px 24px; }
            .signup-card { padding: 32px 24px; margin: 0 16px; }
            .signup-header h2 { font-size: 1.8rem; }
            .inline-group { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='../index.html'">
            <img src="../public/img/logo-navbar.png" alt="HubISoccer">
            <span>HubISoccer</span>
        </div>
        <div class="nav-buttons">
            <a href="../index.html" class="nav-btn-outline">Accueil</a>
        </div>
    </nav>

    <div class="container">
        <div class="signup-card">
            <div class="signup-header">
                <h2>Créer un compte</h2>
                <p>Remplissez les informations ci-dessous</p>
            </div>

            <form id="signupForm">
                <!-- Rôle affiché (readonly) -->
                <div class="form-group">
                    <label>Espace</label>
                    <div class="input-wrapper">
                        <input type="text" id="roleDisplay" readonly style="background:#f0f0f5; cursor:default;">
                    </div>
                </div>

                <!-- Champ obligatoire ID HubISoccer -->
                <div class="form-group">
                    <label>ID HubISoccer *</label>
                    <div class="input-wrapper">
                        <input type="text" id="hubisoccerId" required placeholder="ex: 865HU018BJBI004200326">
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label>Email *</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" required placeholder="votre@email.com">
                    </div>
                </div>

                <!-- Mot de passe et confirmation -->
                <div class="inline-group">
                    <div class="form-group">
                        <label>Mot de passe *</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" required placeholder="8 caractères min.">
                            <i class="fas fa-eye toggle-password" data-target="password"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Confirmer mot de passe *</label>
                        <div class="input-wrapper">
                            <input type="password" id="confirmPassword" required>
                            <i class="fas fa-eye toggle-password" data-target="confirmPassword"></i>
                        </div>
                    </div>
                </div>

                <!-- Nom complet -->
                <div class="form-group">
                    <label>Nom complet (comme sur pièce d'identité) *</label>
                    <div class="input-wrapper">
                        <input type="text" id="fullName" required placeholder="Jean Dupont">
                    </div>
                </div>

                <!-- Pays (sélecteur) -->
                <div class="form-group">
                    <label>Pays *</label>
                    <div class="input-wrapper">
                        <select id="country" required></select>
                    </div>
                </div>

                <!-- Téléphone -->
                <div class="form-group">
                    <label>Téléphone (WhatsApp/Telegram) *</label>
                    <div class="input-wrapper">
                        <input type="tel" id="phone" required placeholder="+229 XX XX XX XX">
                    </div>
                </div>

                <!-- Champs spécifiques au rôle (conteneur dynamique) -->
                <div id="roleSpecificFields"></div>

                <button type="submit" class="btn-signup">S'inscrire</button>
            </form>

            <div class="login-link">
                Déjà un compte ? <a href="login.html">Se connecter</a>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 HubISoccer - The Hub of Inspiration of Soccer</p>
    </div>

    <script src="auth.js"></script>
    <script>
        // Récupérer le rôle depuis l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role');
        if (!role) {
            window.location.href = 'role-select.html?action=signup';
        }

        // Affichage du rôle
        const roleDisplay = document.getElementById('roleDisplay');
        const roleNames = {
            joueur: 'Joueur',
            agent: 'Agent FIFA',
            coach: 'Coach',
            academie: 'Académie',
            parrain: 'Parrain',
            arbitre: 'Corps arbitral',
            staff: 'Staff médical',
            tournoi: 'Gestionnaire de tournoi'
        };
        roleDisplay.value = roleNames[role] || role;

        // Liste des pays (tous les pays du monde)
        const countries = [
            "Afghanistan", "Afrique du Sud", "Albanie", "Algérie", "Allemagne", "Andorre", "Angola", "Antigua-et-Barbuda", "Arabie saoudite", "Argentine",
            "Arménie", "Australie", "Autriche", "Azerbaïdjan", "Bahamas", "Bahreïn", "Bangladesh", "Barbade", "Belgique", "Belize", "Bénin", "Bhoutan",
            "Biélorussie", "Birmanie", "Bolivie", "Bosnie-Herzégovine", "Botswana", "Brésil", "Brunei", "Bulgarie", "Burkina Faso", "Burundi", "Cambodge",
            "Cameroun", "Canada", "Cap-Vert", "Chili", "Chine", "Chypre", "Colombie", "Comores", "Congo", "Corée du Nord", "Corée du Sud", "Costa Rica",
            "Côte d'Ivoire", "Croatie", "Cuba", "Danemark", "Djibouti", "Dominique", "Égypte", "Émirats arabes unis", "Équateur", "Érythrée", "Espagne",
            "Estonie", "Eswatini", "États-Unis", "Éthiopie", "Fidji", "Finlande", "France", "Gabon", "Gambie", "Géorgie", "Ghana", "Grèce", "Grenade",
            "Guatemala", "Guinée", "Guinée équatoriale", "Guinée-Bissau", "Guyana", "Haïti", "Honduras", "Hongrie", "Inde", "Indonésie", "Irak", "Iran",
            "Irlande", "Islande", "Israël", "Italie", "Jamaïque", "Japon", "Jordanie", "Kazakhstan", "Kenya", "Kirghizistan", "Kiribati", "Koweït", "Laos",
            "Lesotho", "Lettonie", "Liban", "Libéria", "Libye", "Liechtenstein", "Lituanie", "Luxembourg", "Macédoine du Nord", "Madagascar", "Malaisie",
            "Malawi", "Maldives", "Mali", "Malte", "Maroc", "Marshall", "Maurice", "Mauritanie", "Mexique", "Micronésie", "Moldavie", "Monaco", "Mongolie",
            "Monténégro", "Mozambique", "Namibie", "Nauru", "Népal", "Nicaragua", "Niger", "Nigéria", "Norvège", "Nouvelle-Zélande", "Oman", "Ouganda",
            "Ouzbékistan", "Pakistan", "Palaos", "Panama", "Papouasie-Nouvelle-Guinée", "Paraguay", "Pays-Bas", "Pérou", "Philippines", "Pologne", "Portugal",
            "Qatar", "République centrafricaine", "République démocratique du Congo", "République dominicaine", "République tchèque", "Roumanie", "Royaume-Uni",
            "Russie", "Rwanda", "Saint-Christophe-et-Niévès", "Sainte-Lucie", "Saint-Vincent-et-les-Grenadines", "Salomon", "Salvador", "Samoa", "Saint-Marin",
            "Sao Tomé-et-Principe", "Sénégal", "Serbie", "Seychelles", "Sierra Leone", "Singapour", "Slovaquie", "Slovénie", "Somalie", "Soudan", "Soudan du Sud",
            "Sri Lanka", "Suède", "Suisse", "Suriname", "Syrie", "Tadjikistan", "Taïwan", "Tanzanie", "Tchad", "Thaïlande", "Timor oriental", "Togo", "Tonga",
            "Trinité-et-Tobago", "Tunisie", "Turkménistan", "Turquie", "Tuvalu", "Ukraine", "Uruguay", "Vanuatu", "Vatican", "Venezuela", "Viêt Nam", "Yémen",
            "Zambie", "Zimbabwe"
        ];
        const countrySelect = document.getElementById('country');
        countries.forEach(c => {
            const option = document.createElement('option');
            option.value = c;
            option.textContent = c;
            countrySelect.appendChild(option);
        });

        // Définition des champs spécifiques par rôle
        const roleFields = {
            joueur: [
                { name: 'pseudo', label: 'Pseudo *', type: 'text', required: true },
                { name: 'date_naissance', label: 'Date de naissance *', type: 'date', required: true }
            ],
            agent: [
                { name: 'agence_nom', label: 'Nom de l\'agence *', type: 'text', required: true },
                { name: 'license_number', label: 'Numéro de licence FIFA *', type: 'text', required: true }
            ],
            coach: [
                { name: 'diplome_principal', label: 'Diplôme principal *', type: 'text', required: true }
            ],
            academie: [
                { name: 'nom_officiel', label: 'Nom officiel de l\'académie *', type: 'text', required: true },
                { name: 'responsable_nom', label: 'Responsable (nom complet) *', type: 'text', required: true }
            ],
            parrain: [], // aucun champ supplémentaire
            arbitre: [
                { name: 'license_number', label: 'Numéro de licence d\'arbitre *', type: 'text', required: true }
            ],
            staff: [
                { name: 'specialite', label: 'Spécialité médicale *', type: 'text', required: true },
                { name: 'numero_ordre', label: 'Numéro d\'ordre *', type: 'text', required: true }
            ],
            tournoi: [
                { name: 'organisation', label: 'Organisation rattachée *', type: 'text', required: true }
            ]
        };

        const container = document.getElementById('roleSpecificFields');
        function buildRoleFields() {
            container.innerHTML = '';
            const fields = roleFields[role] || [];
            fields.forEach(field => {
                const group = document.createElement('div');
                group.className = 'form-group';
                group.innerHTML = `
                    <label>${field.label}</label>
                    <div class="input-wrapper">
                        <input type="${field.type}" id="${field.name}" ${field.required ? 'required' : ''}>
                    </div>
                `;
                container.appendChild(group);
            });
        }
        buildRoleFields();

        // Validation mot de passe
        function validatePassword(pw) {
            const minLength = 8;
            const hasUpper = /[A-Z]/.test(pw);
            const hasLower = /[a-z]/.test(pw);
            const hasDigit = /\d/.test(pw);
            const hasSymbol = /[!@#$%^&*(),.?":{}|<>]/.test(pw);
            return pw.length >= minLength && hasUpper && hasLower && hasDigit && hasSymbol;
        }

        // Afficher/masquer mot de passe
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (input) {
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    this.classList.toggle('fa-eye-slash');
                }
            });
        });

        // Soumission
        const form = document.getElementById('signupForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const hubId = document.getElementById('hubisoccerId').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const fullName = document.getElementById('fullName').value.trim();
            const country = document.getElementById('country').value;
            const phone = document.getElementById('phone').value.trim();

            if (!hubId || !email || !password || !confirm || !fullName || !country || !phone) {
                window.showToast('Tous les champs obligatoires doivent être remplis', 'error');
                return;
            }

            if (password !== confirm) {
                window.showToast('Les mots de passe ne correspondent pas', 'error');
                return;
            }

            if (!validatePassword(password)) {
                window.showToast('Le mot de passe doit comporter au moins 8 caractères, incluant majuscule, minuscule, chiffre et symbole', 'error');
                return;
            }

            // Collecte des champs spécifiques
            let roleData = {};
            const fields = roleFields[role] || [];
            for (let field of fields) {
                const val = document.getElementById(field.name).value.trim();
                if (field.required && !val) {
                    window.showToast(`Le champ ${field.label} est obligatoire`, 'error');
                    return;
                }
                roleData[field.name] = val;
            }

            try {
                // 1. Inscription via Supabase Auth
                const { data: signUpData, error: signUpError } = await window.supabaseAuthPrive.auth.signUp({
                    email,
                    password,
                });

                if (signUpError) throw signUpError;

                const userId = signUpData.user.id;

                // 2. Insertion dans la table profiles
                const profileData = {
                    id: userId,
                    email: email,
                    full_name: fullName,
                    pseudo: role === 'joueur' ? roleData.pseudo : null,
                    phone: phone,
                    country: country,
                    role: role,
                    hubisoccer_id: hubId,
                    created_at: new Date().toISOString()
                };
                // Ajout de date_naissance pour joueur
                if (role === 'joueur' && roleData.date_naissance) {
                    profileData.date_of_birth = roleData.date_naissance;
                }

                const { error: profileError } = await window.supabaseAuthPrive
                    .from('profiles')
                    .insert([profileData]);

                if (profileError) {
                    // Si échec insertion, on peut supprimer l'utilisateur (optionnel)
                    console.error('Erreur insertion profile', profileError);
                    throw new Error('Erreur lors de la création du profil');
                }

                // 3. Insertion dans les tables spécifiques si nécessaire (optionnel)
                // Pour simplifier, on ne crée pas de tables spécifiques ici. L'utilisateur pourra compléter plus tard via son espace.

                window.showToast('Inscription réussie ! Vérifiez votre email pour confirmer votre compte', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            } catch (err) {
                console.error(err);
                window.showToast(err.message || 'Erreur lors de l\'inscription', 'error');
            }
        });
    </script>
</body>
</html>
