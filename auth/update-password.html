<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* mêmes styles que précédemment (conserve-les) */
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='../index.html'">
            <img src="../public/img/logo-navbar.png" alt="HubISoccer">
            <span>HubISoccer</span>
        </div>
        <div class="nav-buttons">
            <a href="../index.html" class="nav-btn-outline">Accueil</a>
        </div>
    </nav>

    <div class="container">
        <div class="update-card">
            <div class="update-header">
                <h2>Nouveau mot de passe</h2>
                <p>Choisissez un mot de passe sécurisé</p>
            </div>

            <form id="updateForm">
                <div class="form-group">
                    <label>Nouveau mot de passe</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" required placeholder="8 caractères min.">
                        <i class="fas fa-eye toggle-password" data-target="password"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirmer le mot de passe</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" required>
                        <i class="fas fa-eye toggle-password" data-target="confirmPassword"></i>
                    </div>
                </div>
                <button type="submit" class="btn-update">Mettre à jour</button>
            </form>
            <div class="back-link">
                <a href="login.html">← Retour à la connexion</a>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 HubISoccer - The Hub of Inspiration of Soccer</p>
    </div>

    <script src="auth.js"></script>
    <script>
        // Récupérer le token depuis l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const type = urlParams.get('type'); // 'recovery'

        if (!token || type !== 'recovery') {
            window.showToast('Lien invalide ou expiré', 'error');
            setTimeout(() => window.location.href = 'login.html', 2000);
        }

        // Échanger le token pour établir une session
        (async () => {
            try {
                const { error } = await window.supabaseAuthPrive.auth.verifyOtp({
                    token_hash: token,
                    type: 'recovery'
                });
                if (error) throw error;
            } catch (err) {
                window.showToast('Lien invalide ou expiré', 'error');
                setTimeout(() => window.location.href = 'login.html', 2000);
            }
        })();

        // Validation mot de passe
        function validatePassword(pw) {
            const minLength = 8;
            const hasUpper = /[A-Z]/.test(pw);
            const hasLower = /[a-z]/.test(pw);
            const hasDigit = /\d/.test(pw);
            const hasSymbol = /[!@#$%^&*(),.?":{}|<>]/.test(pw);
            return pw.length >= minLength && hasUpper && hasLower && hasDigit && hasSymbol;
        }

        // Toggle password visibility
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (input) {
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    this.classList.toggle('fa-eye-slash');
                }
            });
        });

        const form = document.getElementById('updateForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                window.showToast('Les mots de passe ne correspondent pas', 'error');
                return;
            }
            if (!validatePassword(password)) {
                window.showToast('Le mot de passe doit comporter au moins 8 caractères, incluant majuscule, minuscule, chiffre et symbole', 'error');
                return;
            }

            try {
                const { error } = await window.supabaseAuthPrive.auth.updateUser({ password });
                if (error) throw error;
                window.showToast('Mot de passe mis à jour avec succès', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (err) {
                window.showToast(err.message || 'Erreur lors de la mise à jour', 'error');
            }
        });
    </script>
</body>
</html>
