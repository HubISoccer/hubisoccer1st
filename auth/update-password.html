<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #1a1a2e;
            overflow-x: hidden;
        }
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .bg-shapes .shape {
            position: absolute;
            background: rgba(107, 59, 164, 0.03);
            border-radius: 50%;
            filter: blur(80px);
        }
        .shape-1 { width: 500px; height: 500px; top: -200px; left: -200px; }
        .shape-2 { width: 600px; height: 600px; bottom: -200px; right: -200px; background: rgba(107, 59, 164, 0.05); }
        .shape-3 { width: 300px; height: 300px; top: 40%; left: 10%; background: rgba(0, 200, 150, 0.02); }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(107,59,164,0.1);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo img { height: 42px; }
        .logo span { font-size: 1.4rem; font-weight: 700; color: #6b3ba4; }
        .nav-btn-outline {
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid #6b3ba4;
            color: #6b3ba4;
            background: transparent;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        .nav-btn-outline:hover { background: #6b3ba4; color: white; transform: translateY(-2px); }
        .container {
            min-height: calc(100vh - 90px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }
        .update-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 48px 56px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05), 0 0 0 1px rgba(107,59,164,0.05);
            transition: transform 0.3s ease;
            border: 1px solid rgba(107,59,164,0.15);
        }
        .update-card:hover { transform: translateY(-5px); box-shadow: 0 40px 70px rgba(107,59,164,0.1); }
        .update-header { text-align: center; margin-bottom: 32px; }
        .update-header h2 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6b3ba4, #9b6bcd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .update-header p { color: #5a5a72; font-size: 0.9rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 8px; color: #2d2d3a; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper input {
            width: 100%;
            padding: 14px 48px 14px 18px;
            font-size: 1rem;
            border: 1px solid #e2e2f0;
            border-radius: 28px;
            background: #fbfbff;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: #6b3ba4;
            box-shadow: 0 0 0 3px rgba(107,59,164,0.1);
        }
        .input-wrapper .toggle-password {
            position: absolute;
            right: 16px;
            cursor: pointer;
            color: #aaa;
        }
        .input-wrapper .toggle-password:hover { color: #6b3ba4; }
        .btn-update {
            width: 100%;
            padding: 14px;
            background: #6b3ba4;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
        }
        .btn-update:hover { background: #552e84; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(107,59,164,0.3); }
        .back-link { text-align: center; margin-top: 24px; }
        .back-link a { color: #6b3ba4; text-decoration: none; font-size: 0.9rem; font-weight: 500; }
        .back-link a:hover { text-decoration: underline; }
        .footer { text-align: center; padding: 24px; font-size: 0.8rem; color: #aaa; border-top: 1px solid #eee; }
        @media (max-width: 640px) {
            .navbar { padding: 16px 24px; }
            .update-card { padding: 32px 24px; margin: 0 16px; }
            .update-header h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='../index.html'">
            <img src="../public/img/logo-navbar.png" alt="HubISoccer">
            <span>HubISoccer</span>
        </div>
        <div class="nav-buttons">
            <a href="../index.html" class="nav-btn-outline">Accueil</a>
        </div>
    </nav>

    <div class="container">
        <div class="update-card">
            <div class="update-header">
                <h2>Nouveau mot de passe</h2>
                <p>Choisissez un mot de passe sécurisé</p>
            </div>

            <form id="updateForm">
                <div class="form-group">
                    <label>Nouveau mot de passe</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" required placeholder="8 caractères min.">
                        <i class="fas fa-eye toggle-password" data-target="password"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirmer le mot de passe</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" required>
                        <i class="fas fa-eye toggle-password" data-target="confirmPassword"></i>
                    </div>
                </div>
                <button type="submit" class="btn-update">Mettre à jour</button>
            </form>
            <div class="back-link">
                <a href="login.html">← Retour à la connexion</a>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 HubISoccer - The Hub of Inspiration of Soccer</p>
    </div>

    <script src="auth.js"></script>
    <script>
        // Validation mot de passe
        function validatePassword(pw) {
            const minLength = 8;
            const hasUpper = /[A-Z]/.test(pw);
            const hasLower = /[a-z]/.test(pw);
            const hasDigit = /\d/.test(pw);
            const hasSymbol = /[!@#$%^&*(),.?":{}|<>]/.test(pw);
            return pw.length >= minLength && hasUpper && hasLower && hasDigit && hasSymbol;
        }

        // Toggle password visibility
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (input) {
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    this.classList.toggle('fa-eye-slash');
                }
            });
        });

        const form = document.getElementById('updateForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                window.showToast('Les mots de passe ne correspondent pas', 'error');
                return;
            }
            if (!validatePassword(password)) {
                window.showToast('Le mot de passe doit comporter au moins 8 caractères, incluant majuscule, minuscule, chiffre et symbole', 'error');
                return;
            }

            try {
                const { error } = await window.supabaseAuthPrive.auth.updateUser({ password });
                if (error) throw error;
                window.showToast('Mot de passe mis à jour avec succès', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (err) {
                window.showToast(err.message || 'Erreur lors de la mise à jour', 'error');
            }
        });
    </script>
</body>
</html>
