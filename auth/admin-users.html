<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des utilisateurs | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #1a1a2e;
            overflow-x: hidden;
        }
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .bg-shapes .shape {
            position: absolute;
            background: rgba(107, 59, 164, 0.05);
            border-radius: 50%;
            filter: blur(80px);
        }
        .shape-1 { width: 500px; height: 500px; top: -200px; left: -200px; }
        .shape-2 { width: 600px; height: 600px; bottom: -200px; right: -200px; background: rgba(107, 59, 164, 0.08); }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(107,59,164,0.1);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo img { height: 42px; }
        .logo span { font-size: 1.4rem; font-weight: 700; color: #6b3ba4; }
        .nav-buttons {
            display: flex;
            gap: 16px;
        }
        .nav-btn-outline {
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid #6b3ba4;
            color: #6b3ba4;
            background: transparent;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        .nav-btn-outline:hover { background: #6b3ba4; color: white; transform: translateY(-2px); }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6b3ba4, #9b6bcd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .back-link {
            color: #6b3ba4;
            text-decoration: none;
            font-weight: 500;
        }
        .card {
            background: #fbfbff;
            border-radius: 32px;
            padding: 32px;
            margin-bottom: 40px;
            border: 1px solid #e9e9f0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
        }
        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid #e9e9f0;
            margin-bottom: 24px;
        }
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 40px 40px 0 0;
            font-weight: 500;
            color: #5a5a72;
            transition: all 0.2s;
        }
        .tab.active {
            background: #6b3ba4;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid #e9e9f0;
        }
        th {
            font-weight: 600;
            color: #1a1a2e;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .status-active { background: #e0f2fe; color: #0369a1; }
        .status-banned { background: #fee2e2; color: #b91c1c; }
        .action-icon {
            cursor: pointer;
            margin-right: 12px;
            font-size: 1.2rem;
        }
        .action-icon:hover { opacity: 0.7; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
        }
        .modal-content h3 {
            margin-bottom: 16px;
        }
        .modal-content .form-group {
            margin-bottom: 16px;
        }
        .modal-content label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e2f0;
            border-radius: 28px;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        .btn-primary {
            background: #6b3ba4;
            color: white;
        }
        .btn-secondary {
            background: #e2e2f0;
            color: #1a1a2e;
        }
        .btn-danger {
            background: #e53e3e;
            color: white;
        }
        .footer {
            text-align: center;
            padding: 32px;
            font-size: 0.8rem;
            color: #aaa;
            border-top: 1px solid #eee;
            margin-top: 60px;
        }
        @media (max-width: 768px) {
            .navbar { padding: 16px 24px; }
            .container { padding: 24px 16px; }
            .card { padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='../index.html'">
            <img src="../public/img/logo-navbar.png" alt="HubISoccer">
            <span>HubISoccer</span>
        </div>
        <div class="nav-buttons">
            <a href="../index.html" class="nav-btn-outline">Accueil</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Gestion des utilisateurs</h1>
            <a href="admin-dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour au tableau de bord</a>
        </div>

        <div class="card">
            <div class="tabs">
                <div class="tab active" data-tab="active">Utilisateurs actifs</div>
                <div class="tab" data-tab="banned">Bannis</div>
            </div>
            <div id="activeTab" class="tab-content active">
                <table>
                    <thead>
                        <tr><th>Email</th><th>Nom</th><th>Rôle</th><th>Statut</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="activeTable"></tbody>
                </table>
            </div>
            <div id="bannedTab" class="tab-content">
                <table>
                    <thead>
                        <tr><th>Email</th><th>Nom</th><th>Raison</th><th>Expire le</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="bannedTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="banModal" class="modal">
        <div class="modal-content">
            <h3>Bannir l'utilisateur</h3>
            <form id="banForm">
                <input type="hidden" id="banUserId">
                <div class="form-group">
                    <label>Raison (obligatoire)</label>
                    <textarea id="banReason" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Durée</label>
                    <select id="banDuration">
                        <option value="temporary">Temporaire (minutes)</option>
                        <option value="permanent">Permanent</option>
                    </select>
                </div>
                <div class="form-group" id="minutesGroup">
                    <label>Minutes</label>
                    <input type="number" id="banMinutes" value="5" min="1">
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn btn-secondary" id="closeModalBtn">Annuler</button>
                    <button type="submit" class="btn btn-danger">Bannir</button>
                </div>
            </form>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 HubISoccer - Administration sécurisée</p>
    </div>

    <script src="auth.js"></script>
    <script src="admin-auth.js"></script>
    <script>
        // Charger les utilisateurs et bans
        async function loadUsers() {
            // Récupérer tous les utilisateurs de profiles
            const { data: profiles, error } = await window.supabaseAuthPrive
                .from('profiles')
                .select('id, email, full_name, role');
            if (error) {
                console.error(error);
                return;
            }

            // Récupérer les bans actifs (non expirés ou permanents)
            const { data: bans, error: bansError } = await window.supabaseAuthPrive
                .from('bans')
                .select('*')
                .or('expires_at.is.null,expires_at.gt.now()');
            if (bansError) console.error(bansError);

            const bannedIds = bans ? bans.map(b => b.user_id) : [];

            // Séparer actifs et bannis
            const activeUsers = profiles.filter(p => !bannedIds.includes(p.id));
            const bannedUsers = bans.map(ban => {
                const user = profiles.find(p => p.id === ban.user_id);
                return { ...user, ban_reason: ban.reason, expires_at: ban.expires_at };
            }).filter(u => u);

            renderActive(activeUsers);
            renderBanned(bannedUsers);
        }

        function renderActive(users) {
            const tbody = document.getElementById('activeTable');
            if (!users.length) {
                tbody.innerHTML = '<tr><td colspan="5">Aucun utilisateur actif</td></tr>';
                return;
            }
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.email}</td>
                    <td>${user.full_name || '-'}</td>
                    <td>${user.role}</td>
                    <td><span class="status-badge status-active">Actif</span></td>
                    <td>
                        <i class="fas fa-ban action-icon" style="color:#e53e3e;" data-id="${user.id}" data-email="${user.email}" data-name="${user.full_name}" data-action="ban"></i>
                    </td>
                </tr>
            `).join('');
            // Attacher événements
            document.querySelectorAll('[data-action="ban"]').forEach(el => {
                el.addEventListener('click', () => openBanModal(el.dataset.id, el.dataset.email, el.dataset.name));
            });
        }

        function renderBanned(users) {
            const tbody = document.getElementById('bannedTable');
            if (!users.length) {
                tbody.innerHTML = '<tr><td colspan="5">Aucun utilisateur banni</td></tr>';
                return;
            }
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.email}</td>
                    <td>${user.full_name || '-'}</td>
                    <td>${user.ban_reason || '-'}</td>
                    <td>${user.expires_at ? new Date(user.expires_at).toLocaleString() : 'Permanent'}</td>
                    <td>
                        <i class="fas fa-check-circle action-icon" style="color:#10b981;" data-id="${user.id}" data-action="unban"></i>
                    </td>
                </tr>
            `).join('');
            // Attacher événements
            document.querySelectorAll('[data-action="unban"]').forEach(el => {
                el.addEventListener('click', async () => {
                    const userId = el.dataset.id;
                    if (confirm('Débannir cet utilisateur ?')) {
                        const { error } = await window.supabaseAuthPrive
                            .from('bans')
                            .delete()
                            .eq('user_id', userId);
                        if (error) window.showToast('Erreur : ' + error.message, 'error');
                        else {
                            window.showToast('Utilisateur débanni', 'success');
                            loadUsers();
                        }
                    }
                });
            });
        }

        let currentBanUserId = null;
        function openBanModal(userId, email, name) {
            currentBanUserId = userId;
            document.getElementById('banUserId').value = userId;
            document.getElementById('banReason').value = '';
            document.getElementById('banDuration').value = 'temporary';
            document.getElementById('minutesGroup').style.display = 'block';
            document.getElementById('banModal').style.display = 'flex';
        }

        document.getElementById('banDuration').addEventListener('change', (e) => {
            const minutesGroup = document.getElementById('minutesGroup');
            if (e.target.value === 'temporary') minutesGroup.style.display = 'block';
            else minutesGroup.style.display = 'none';
        });

        document.getElementById('closeModalBtn').addEventListener('click', () => {
            document.getElementById('banModal').style.display = 'none';
        });

        document.getElementById('banForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = currentBanUserId;
            const reason = document.getElementById('banReason').value.trim();
            const duration = document.getElementById('banDuration').value;
            let expires_at = null;
            if (duration === 'temporary') {
                const minutes = parseInt(document.getElementById('banMinutes').value, 10);
                expires_at = new Date(Date.now() + minutes * 60 * 1000).toISOString();
            }
            const { error } = await window.supabaseAuthPrive
                .from('bans')
                .insert([{ user_id: userId, reason, expires_at, created_by: window.adminUser?.id || null }]);
            if (error) window.showToast('Erreur : ' + error.message, 'error');
            else {
                window.showToast('Utilisateur banni', 'success');
                document.getElementById('banModal').style.display = 'none';
                loadUsers();
            }
        });

        // Gestion des onglets
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const target = tab.getAttribute('data-tab');
                document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                document.getElementById(`${target}Tab`).classList.add('active');
            });
        });

        loadUsers();
    </script>
</body>
</html>
