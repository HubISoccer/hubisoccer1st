<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation d'email | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #fbfbff;
            border-radius: 32px;
            padding: 48px 56px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
            border: 1px solid rgba(107,59,164,0.15);
        }
        .icon { font-size: 64px; color: #6b3ba4; margin-bottom: 24px; }
        h2 { font-size: 1.8rem; margin-bottom: 16px; color: #1e1e2a; }
        p { color: #5a5a72; margin-bottom: 24px; }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: #6b3ba4;
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-weight: 500;
            transition: all 0.3s;
            margin-top: 16px;
        }
        .btn:hover { background: #552e84; transform: translateY(-2px); }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6b3ba4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-details {
            font-size: 0.8rem;
            color: #e53e3e;
            background: #fff5f5;
            padding: 12px;
            border-radius: 16px;
            margin-top: 20px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="card" id="confirmCard">
        <div class="icon"><i class="fas fa-envelope-open-text"></i></div>
        <h2>Confirmation en cours</h2>
        <p>Nous vérifions votre adresse email...</p>
        <div class="loader"></div>
        <div id="message"></div>
        <div id="linkContainer" style="display: none;">
            <a href="login.html" class="btn">Se connecter</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://wxlpcflanihqwumjwpjs.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4bHBjZmxhbmlocXd1bWp3cGpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzcwNzAsImV4cCI6MjA4Nzg1MzA3MH0.i1ZW-9MzSaeOKizKjaaq6mhtl7X23LsVpkkohc_p6Fw';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function confirmEmail() {
            // Récupérer le token depuis l'URL (hash ou query)
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            let token = hashParams.get('access_token');
            let type = hashParams.get('type');

            if (!token) {
                const queryParams = new URLSearchParams(window.location.search);
                token = queryParams.get('token');
                type = queryParams.get('type');
            }

            // Debug : afficher ce qu'on a trouvé
            console.log('Token trouvé :', token);
            console.log('Type trouvé :', type);
            console.log('URL complète :', window.location.href);

            if (!token) {
                showError('Lien de confirmation invalide : aucun token détecté.');
                return;
            }

            // Timeout de 15 secondes pour éviter le blocage
            const timeoutPromise = new Promise((_, reject) => {
                setTimeout(() => reject(new Error('Délai dépassé (15s)')), 15000);
            });

            try {
                const verificationPromise = supabase.auth.verifyOtp({
                    token_hash: token,
                    type: type === 'recovery' ? 'recovery' : 'signup'
                });
                const { error } = await Promise.race([verificationPromise, timeoutPromise]);
                if (error) throw error;
                showSuccess();
            } catch (err) {
                console.error('Erreur confirmation :', err);
                showError(err.message || 'Erreur inconnue lors de la confirmation');
            }
        }

        function showSuccess() {
            document.querySelector('.loader').style.display = 'none';
            document.querySelector('.icon').innerHTML = '<i class="fas fa-check-circle" style="color: #6b3ba4;"></i>';
            document.querySelector('h2').innerText = 'Email confirmé !';
            document.querySelector('p').innerText = 'Votre adresse email a été validée avec succès.';
            document.getElementById('linkContainer').style.display = 'block';
        }

        function showError(msg) {
            document.querySelector('.loader').style.display = 'none';
            document.querySelector('.icon').innerHTML = '<i class="fas fa-times-circle" style="color: #e53e3e;"></i>';
            document.querySelector('h2').innerText = 'Erreur de confirmation';
            document.querySelector('p').innerText = msg || 'Une erreur est survenue.';
            // Ajoute des détails techniques si disponible
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-details';
            errorDiv.innerText = `Détail technique : ${msg}`;
            document.getElementById('message').appendChild(errorDiv);
            document.getElementById('linkContainer').style.display = 'block';
        }

        confirmEmail();
    </script>
</body>
</html>
