<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation d'email | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #1a1a2e;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .bg-shapes .shape {
            position: absolute;
            background: rgba(107, 59, 164, 0.03);
            border-radius: 50%;
            filter: blur(80px);
        }
        .shape-1 { width: 500px; height: 500px; top: -200px; left: -200px; }
        .shape-2 { width: 600px; height: 600px; bottom: -200px; right: -200px; background: rgba(107, 59, 164, 0.05); }
        .shape-3 { width: 300px; height: 300px; top: 40%; left: 10%; background: rgba(0, 200, 150, 0.02); }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(107,59,164,0.1);
        }
        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo img { height: 42px; }
        .logo span { font-size: 1.4rem; font-weight: 700; color: #6b3ba4; }
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 24px;
        }
        .confirm-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 48px 56px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05), 0 0 0 1px rgba(107,59,164,0.05);
            border: 1px solid rgba(107,59,164,0.15);
        }
        .confirm-icon {
            font-size: 64px;
            color: #6b3ba4;
            margin-bottom: 24px;
        }
        .confirm-card h2 {
            font-size: 1.8rem;
            margin-bottom: 16px;
            color: #1e1e2a;
        }
        .confirm-card p {
            color: #5a5a72;
            margin-bottom: 24px;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6b3ba4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: #6b3ba4;
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-weight: 500;
            transition: all 0.3s;
            margin-top: 16px;
        }
        .btn:hover {
            background: #552e84;
            transform: translateY(-2px);
        }
        .footer {
            text-align: center;
            padding: 24px;
            font-size: 0.8rem;
            color: #aaa;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='../index.html'">
            <img src="../public/img/logo-navbar.png" alt="HubISoccer">
            <span>HubISoccer</span>
        </div>
    </nav>

    <div class="container">
        <div class="confirm-card">
            <div class="confirm-icon">
                <i class="fas fa-envelope-open-text"></i>
            </div>
            <h2>Confirmation en cours</h2>
            <p>Nous vérifions votre email...</p>
            <div class="loader"></div>
            <div id="message" style="margin-top: 20px;"></div>
            <div id="linkContainer" style="display: none;">
                <a href="login.html" class="btn">Se connecter</a>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 HubISoccer - The Hub of Inspiration of Soccer</p>
    </div>

    <script src="auth.js"></script>
    <script>
        // Récupérer le token depuis l'URL (Supabase utilise généralement `access_token`)
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = hashParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token');
        const type = hashParams.get('type'); // 'signup' ou 'recovery'

        async function confirmEmail() {
            if (!accessToken) {
                // Essayer de récupérer depuis les query params (fallback)
                const queryParams = new URLSearchParams(window.location.search);
                const token = queryParams.get('token');
                if (token) {
                    // Si c'est un token dans query, utiliser verifyOtp
                    try {
                        const { error } = await window.supabaseAuthPrive.auth.verifyOtp({
                            email: null,
                            token: token,
                            type: 'signup'
                        });
                        if (error) throw error;
                        showSuccess();
                    } catch (err) {
                        showError(err.message);
                    }
                } else {
                    showError("Lien de confirmation invalide ou expiré.");
                }
                return;
            }

            // Utiliser setSession avec access_token et refresh_token
            try {
                const { error } = await window.supabaseAuthPrive.auth.setSession({
                    access_token: accessToken,
                    refresh_token: refreshToken
                });
                if (error) throw error;
                showSuccess();
            } catch (err) {
                showError(err.message);
            }
        }

        function showSuccess() {
            document.querySelector('.loader').style.display = 'none';
            document.querySelector('.confirm-icon').innerHTML = '<i class="fas fa-check-circle"></i>';
            document.getElementById('message').innerHTML = '<p style="color: green;">Votre email a été confirmé avec succès !</p>';
            document.getElementById('linkContainer').style.display = 'block';
        }

        function showError(msg) {
            document.querySelector('.loader').style.display = 'none';
            document.querySelector('.confirm-icon').innerHTML = '<i class="fas fa-times-circle" style="color: #e53e3e;"></i>';
            document.getElementById('message').innerHTML = `<p style="color: #e53e3e;">${msg || 'Erreur lors de la confirmation. Veuillez contacter l\'administrateur.'}</p>`;
            document.getElementById('linkContainer').style.display = 'block';
        }

        confirmEmail();
    </script>
</body>
</html>
