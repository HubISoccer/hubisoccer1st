<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation d'email | HubISoccer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Inter', sans-serif;
            background: #f9f9ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 32px 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid #e9e9f0;
        }
        .icon { font-size: 64px; color: #6b3ba4; margin-bottom: 20px; }
        h2 { font-size: 1.6rem; margin-bottom: 12px; color: #1e1e2a; }
        p { color: #5a5a72; margin-bottom: 20px; }
        .loader {
            border: 3px solid #e9e9f0;
            border-top: 3px solid #6b3ba4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: #6b3ba4;
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-weight: 500;
            margin-top: 16px;
        }
        .error-details {
            background: #fff0f0;
            color: #c00;
            padding: 12px;
            border-radius: 16px;
            font-size: 0.85rem;
            margin-top: 20px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon"><i class="fas fa-envelope-open-text"></i></div>
        <h2>Confirmation en cours</h2>
        <p>Nous vérifions votre adresse email...</p>
        <div class="loader"></div>
        <div id="result"></div>
        <div id="link" style="display: none;"><a href="login.html" class="btn">Se connecter</a></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Utilisation directe de Supabase (sans dépendre de auth.js)
        const supabaseUrl = 'https://wxlpcflanihqwumjwpjs.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4bHBjZmxhbmlocXd1bWp3cGpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzcwNzAsImV4cCI6MjA4Nzg1MzA3MH0.i1ZW-9MzSaeOKizKjaaq6mhtl7X23LsVpkkohc_p6Fw';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function confirm() {
            const hash = new URLSearchParams(window.location.hash.substring(1));
            let token = hash.get('access_token');
            let type = hash.get('type');
            if (!token) {
                const query = new URLSearchParams(window.location.search);
                token = query.get('token');
                type = query.get('type');
            }

            if (!token) {
                document.querySelector('.loader').style.display = 'none';
                document.querySelector('h2').innerText = 'Lien invalide';
                document.querySelector('p').innerText = 'Aucun token détecté.';
                document.getElementById('link').style.display = 'block';
                return;
            }

            try {
                const { error } = await supabase.auth.verifyOtp({
                    token_hash: token,
                    type: type === 'recovery' ? 'recovery' : 'signup'
                });
                if (error) throw error;
                // Succès
                document.querySelector('.loader').style.display = 'none';
                document.querySelector('h2').innerText = 'Email confirmé !';
                document.querySelector('p').innerHTML = 'Votre adresse email a été validée.';
                document.getElementById('link').style.display = 'block';
            } catch (err) {
                document.querySelector('.loader').style.display = 'none';
                document.querySelector('h2').innerText = 'Erreur de confirmation';
                document.querySelector('p').innerHTML = 'Une erreur est survenue.';
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `<div class="error-details">${err.message}</div>`;
                document.getElementById('link').style.display = 'block';
            }
        }
        confirm();
    </script>
</body>
</html>
