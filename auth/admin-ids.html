<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des IDs | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #1a1a2e;
            overflow-x: hidden;
        }
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .bg-shapes .shape {
            position: absolute;
            background: rgba(107, 59, 164, 0.05);
            border-radius: 50%;
            filter: blur(80px);
        }
        .shape-1 { width: 500px; height: 500px; top: -200px; left: -200px; }
        .shape-2 { width: 600px; height: 600px; bottom: -200px; right: -200px; background: rgba(107, 59, 164, 0.08); }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(107,59,164,0.1);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo img { height: 42px; }
        .logo span { font-size: 1.4rem; font-weight: 700; color: #6b3ba4; }
        .nav-buttons {
            display: flex;
            gap: 16px;
        }
        .nav-btn-outline {
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid #6b3ba4;
            color: #6b3ba4;
            background: transparent;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        .nav-btn-outline:hover { background: #6b3ba4; color: white; transform: translateY(-2px); }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6b3ba4, #9b6bcd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .back-link {
            color: #6b3ba4;
            text-decoration: none;
            font-weight: 500;
        }
        .card {
            background: #fbfbff;
            border-radius: 32px;
            padding: 32px;
            margin-bottom: 40px;
            border: 1px solid #e9e9f0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
        }
        .card h2 {
            font-size: 1.6rem;
            margin-bottom: 24px;
            color: #1a1a2e;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 24px;
        }
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #2d2d3a;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e2f0;
            border-radius: 28px;
            background: white;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #6b3ba4;
            box-shadow: 0 0 0 3px rgba(107,59,164,0.1);
        }
        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary {
            background: #6b3ba4;
            color: white;
        }
        .btn-primary:hover {
            background: #552e84;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid #6b3ba4;
            color: #6b3ba4;
        }
        .btn-secondary:hover {
            background: #6b3ba4;
            color: white;
        }
        .btn-danger {
            background: #e53e3e;
            color: white;
        }
        .btn-danger:hover {
            background: #c53030;
        }
        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid #e9e9f0;
            margin-bottom: 24px;
        }
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 40px 40px 0 0;
            font-weight: 500;
            color: #5a5a72;
            transition: all 0.2s;
        }
        .tab.active {
            background: #6b3ba4;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid #e9e9f0;
        }
        th {
            font-weight: 600;
            color: #1a1a2e;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .status-pending { background: #fff3e0; color: #cc7b2c; }
        .status-used { background: #e0f2fe; color: #0369a1; }
        .status-revoked { background: #fee2e2; color: #b91c1c; }
        .action-icon {
            cursor: pointer;
            margin-right: 12px;
            font-size: 1.2rem;
        }
        .action-icon:hover { opacity: 0.7; }
        .generated-id {
            background: #f0f0f5;
            padding: 12px 16px;
            border-radius: 28px;
            font-family: monospace;
            margin-top: 16px;
            word-break: break-all;
        }
        .footer {
            text-align: center;
            padding: 32px;
            font-size: 0.8rem;
            color: #aaa;
            border-top: 1px solid #eee;
            margin-top: 60px;
        }
        @media (max-width: 768px) {
            .navbar { padding: 16px 24px; }
            .container { padding: 24px 16px; }
            .card { padding: 24px; }
            .form-row { flex-direction: column; gap: 16px; }
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='../index.html'">
            <img src="../public/img/logo-navbar.png" alt="HubISoccer">
            <span>HubISoccer</span>
        </div>
        <div class="nav-buttons">
            <a href="../index.html" class="nav-btn-outline">Accueil</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Gestion des IDs HubISoccer</h1>
            <a href="admin-dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour au tableau de bord</a>
        </div>

        <!-- Formulaire de génération -->
        <div class="card">
            <h2>Générer un nouvel ID</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Rôle *</label>
                    <select id="roleSelect">
                        <option value="joueur">Joueur</option>
                        <option value="agent">Agent FIFA</option>
                        <option value="coach">Coach</option>
                        <option value="academie">Académie</option>
                        <option value="parrain">Parrain</option>
                        <option value="arbitre">Corps arbitral</option>
                        <option value="staff">Staff médical</option>
                        <option value="tournoi">Gestionnaire de tournoi</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Pays (code ISO 2 lettres) *</label>
                    <input type="text" id="countryCode" placeholder="ex: BJ, FR, SN" maxlength="2" required>
                </div>
            </div>

            <!-- Champs spécifiques Joueur -->
            <div id="joueurFields" class="form-row">
                <div class="form-group">
                    <label>ID numérique réel (3 derniers chiffres)</label>
                    <input type="number" id="realId" placeholder="ex: 1772603338865">
                </div>
                <div class="form-group">
                    <label>Âge</label>
                    <input type="number" id="age" placeholder="ex: 18">
                </div>
            </div>

            <!-- Champs spécifiques Autres rôles -->
            <div id="otherFields" style="display: none;" class="form-row">
                <div class="form-group">
                    <label>Abréviation rôle (4 lettres)</label>
                    <input type="text" id="roleAbbr" placeholder="ex: AGEN, COAC, ACAD, PARR, ARBI, STAF, TOUR">
                </div>
                <div class="form-group">
                    <label>Téléphone (pour les 3 chiffres du milieu)</label>
                    <input type="text" id="phoneForId" placeholder="ex: 22997000000">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Compteur journalier (auto incrément)</label>
                    <input type="number" id="counter" placeholder="ex: 1, 2, 3...">
                </div>
            </div>

            <button class="btn btn-primary" id="generateBtn">Générer l'ID</button>
            <div id="generatedIdDisplay" class="generated-id" style="display: none;"></div>
            <button class="btn btn-secondary" id="saveIdBtn" style="display: none; margin-top: 12px;">Enregistrer dans la base</button>
        </div>

        <!-- Liste des IDs existants -->
        <div class="card">
            <h2>IDs existants</h2>
            <div class="tabs">
                <div class="tab active" data-tab="pending">En attente</div>
                <div class="tab" data-tab="used">Utilisés</div>
                <div class="tab" data-tab="revoked">Révoqués</div>
            </div>
            <div id="pendingTab" class="tab-content active">
                <table>
                    <thead>
                        <tr><th>ID</th><th>Rôle</th><th>Date de création</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="pendingTable"></tbody>
                </table>
            </div>
            <div id="usedTab" class="tab-content">
                <table>
                    <thead><tr><th>ID</th><th>Rôle</th><th>Date d'utilisation</th><th>Utilisateur</th></tr></thead>
                    <tbody id="usedTable"></tbody>
                </table>
            </div>
            <div id="revokedTab" class="tab-content">
                <table>
                    <thead><tr><th>ID</th><th>Rôle</th><th>Date de révocation</th></tr></thead>
                    <tbody id="revokedTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 HubISoccer - Administration sécurisée</p>
    </div>

    <script src="auth.js"></script>
    <script src="admin-auth.js"></script>
    <script>
        // Fonctions de génération d'ID
        function generateJoueurId(realId, age, countryCode, counter) {
            const lastThree = realId.toString().slice(-3).padStart(3, '0');
            const ageStr = age.toString().padStart(3, '0');
            const counterStr = counter.toString().padStart(6, '0');
            const now = new Date();
            const day = now.getDate().toString().padStart(2, '0');
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const year = now.getFullYear().toString().slice(-2);
            return `${lastThree}HU${ageStr}${countryCode.toUpperCase()}BI${counterStr}${day}${month}${year}`;
        }

        function generateOtherId(roleAbbr, countryCode, counter, phone) {
            const roleAbbrClean = roleAbbr.toUpperCase().slice(0,4);
            const counterStr = counter.toString().padStart(5, '0');
            const now = new Date();
            const day = now.getDate().toString().padStart(2, '0');
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const year = now.getFullYear().toString().slice(-2);
            // Extraire les 3 chiffres du milieu du téléphone
            const phoneDigits = phone.replace(/\D/g, '');
            const midIndex = Math.floor(phoneDigits.length / 2);
            let middleThree = phoneDigits.slice(midIndex - 1, midIndex + 2);
            if (middleThree.length < 3) middleThree = middleThree.padStart(3, '0');
            return `${roleAbbrClean}HU${countryCode.toUpperCase()}BI${day}${month}${year}SO${counterStr}${middleThree}`;
        }

        // Gestion de l'affichage des champs selon le rôle
        const roleSelect = document.getElementById('roleSelect');
        const joueurFields = document.getElementById('joueurFields');
        const otherFields = document.getElementById('otherFields');
        function toggleFields() {
            if (roleSelect.value === 'joueur') {
                joueurFields.style.display = 'flex';
                otherFields.style.display = 'none';
            } else {
                joueurFields.style.display = 'none';
                otherFields.style.display = 'flex';
                // Préremplir l'abréviation du rôle
                const abbrMap = {
                    agent: 'AGEN',
                    coach: 'COAC',
                    academie: 'ACAD',
                    parrain: 'PARR',
                    arbitre: 'ARBI',
                    staff: 'STAF',
                    tournoi: 'TOUR'
                };
                document.getElementById('roleAbbr').value = abbrMap[roleSelect.value] || '';
            }
        }
        roleSelect.addEventListener('change', toggleFields);
        toggleFields();

        // Génération de l'ID
        let lastGeneratedId = '';
        const generateBtn = document.getElementById('generateBtn');
        const generatedIdDisplay = document.getElementById('generatedIdDisplay');
        const saveIdBtn = document.getElementById('saveIdBtn');

        generateBtn.addEventListener('click', () => {
            const role = roleSelect.value;
            const countryCode = document.getElementById('countryCode').value.trim();
            const counter = parseInt(document.getElementById('counter').value, 10);
            if (!countryCode || isNaN(counter)) {
                window.showToast('Veuillez remplir tous les champs obligatoires', 'error');
                return;
            }
            let generatedId = '';
            if (role === 'joueur') {
                const realId = document.getElementById('realId').value.trim();
                const age = parseInt(document.getElementById('age').value, 10);
                if (!realId || isNaN(age)) {
                    window.showToast('Veuillez remplir l\'ID réel et l\'âge', 'error');
                    return;
                }
                generatedId = generateJoueurId(realId, age, countryCode, counter);
            } else {
                const roleAbbr = document.getElementById('roleAbbr').value.trim();
                const phone = document.getElementById('phoneForId').value.trim();
                if (!roleAbbr || !phone) {
                    window.showToast('Veuillez remplir l\'abréviation et le téléphone', 'error');
                    return;
                }
                generatedId = generateOtherId(roleAbbr, countryCode, counter, phone);
            }
            lastGeneratedId = generatedId;
            generatedIdDisplay.innerText = `ID généré : ${generatedId}`;
            generatedIdDisplay.style.display = 'block';
            saveIdBtn.style.display = 'inline-block';
        });

        // Sauvegarde dans la base
        saveIdBtn.addEventListener('click', async () => {
            if (!lastGeneratedId) return;
            const role = roleSelect.value;
            const { error } = await window.supabaseAuthPrive
                .from('hubisoccer_ids')
                .insert([{ id: lastGeneratedId, role: role, status: 'pending' }]);
            if (error) {
                window.showToast('Erreur : ' + error.message, 'error');
            } else {
                window.showToast('ID enregistré avec succès', 'success');
                generatedIdDisplay.style.display = 'none';
                saveIdBtn.style.display = 'none';
                loadIds(); // recharge les listes
            }
        });

        // Charger les IDs depuis la base
        async function loadIds() {
            // Pending
            const { data: pending, error: pendingError } = await window.supabaseAuthPrive
                .from('hubisoccer_ids')
                .select('*')
                .eq('status', 'pending')
                .order('created_at', { ascending: false });
            if (!pendingError) renderTable('pending', pending);

            // Used
            const { data: used, error: usedError } = await window.supabaseAuthPrive
                .from('hubisoccer_ids')
                .select('*, profiles(full_name)')
                .eq('status', 'used')
                .order('created_at', { ascending: false });
            if (!usedError) renderTable('used', used);

            // Revoked
            const { data: revoked, error: revokedError } = await window.supabaseAuthPrive
                .from('hubisoccer_ids')
                .select('*')
                .eq('status', 'revoked')
                .order('created_at', { ascending: false });
            if (!revokedError) renderTable('revoked', revoked);
        }

        function renderTable(status, data) {
            const tbody = document.getElementById(`${status}Table`);
            if (!tbody) return;
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">Aucun ID</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(item => {
                if (status === 'pending') {
                    return `
                        <tr>
                            <td>${item.id}</td>
                            <td>${item.role}</td>
                            <td>${new Date(item.created_at).toLocaleString()}</td>
                            <td><i class="fas fa-trash-alt action-icon" data-id="${item.id}" data-action="revoke" style="color:#e53e3e;"></i> Révoquer</td>
                        </tr>
                    `;
                } else if (status === 'used') {
                    return `
                        <tr>
                            <td>${item.id}</td>
                            <td>${item.role}</td>
                            <td>${item.assigned_to ? 'Utilisé' : '-'}</td>
                            <td>${item.profiles?.full_name || '-'}</td>
                        </tr>
                    `;
                } else {
                    return `
                        <tr>
                            <td>${item.id}</td>
                            <td>${item.role}</td>
                            <td>${new Date(item.created_at).toLocaleString()}</td>
                        </tr>
                    `;
                }
            }).join('');
            // Attacher les événements de révocation
            document.querySelectorAll('[data-action="revoke"]').forEach(el => {
                el.addEventListener('click', async (e) => {
                    const id = el.getAttribute('data-id');
                    if (confirm(`Révoquer l'ID ${id} ?`)) {
                        const { error } = await window.supabaseAuthPrive
                            .from('hubisoccer_ids')
                            .update({ status: 'revoked' })
                            .eq('id', id);
                        if (error) window.showToast('Erreur : ' + error.message, 'error');
                        else {
                            window.showToast('ID révoqué', 'success');
                            loadIds();
                        }
                    }
                });
            });
        }

        // Gestion des onglets
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const target = tab.getAttribute('data-tab');
                document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                document.getElementById(`${target}Tab`).classList.add('active');
            });
        });

        loadIds();
    </script>
</body>
</html>
