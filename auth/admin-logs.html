<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs de connexion | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* mêmes styles de base que admin-users.html */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #1a1a2e;
            overflow-x: hidden;
        }
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .bg-shapes .shape {
            position: absolute;
            background: rgba(107, 59, 164, 0.05);
            border-radius: 50%;
            filter: blur(80px);
        }
        .shape-1 { width: 500px; height: 500px; top: -200px; left: -200px; }
        .shape-2 { width: 600px; height: 600px; bottom: -200px; right: -200px; background: rgba(107, 59, 164, 0.08); }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(107,59,164,0.1);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo img { height: 42px; }
        .logo span { font-size: 1.4rem; font-weight: 700; color: #6b3ba4; }
        .nav-buttons {
            display: flex;
            gap: 16px;
        }
        .nav-btn-outline {
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid #6b3ba4;
            color: #6b3ba4;
            background: transparent;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        .nav-btn-outline:hover { background: #6b3ba4; color: white; transform: translateY(-2px); }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6b3ba4, #9b6bcd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .back-link {
            color: #6b3ba4;
            text-decoration: none;
            font-weight: 500;
        }
        .card {
            background: #fbfbff;
            border-radius: 32px;
            padding: 32px;
            margin-bottom: 40px;
            border: 1px solid #e9e9f0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
        }
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }
        .filter-group {
            flex: 1;
            min-width: 180px;
        }
        .filter-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .filter-group input, .filter-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e2e2f0;
            border-radius: 28px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid #e9e9f0;
        }
        th {
            font-weight: 600;
            color: #1a1a2e;
        }
        .success-badge {
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            display: inline-block;
        }
        .failure-badge {
            background: #fee2e2;
            color: #b91c1c;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            display: inline-block;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        .btn-primary {
            background: #6b3ba4;
            color: white;
        }
        .footer {
            text-align: center;
            padding: 32px;
            font-size: 0.8rem;
            color: #aaa;
            border-top: 1px solid #eee;
            margin-top: 60px;
        }
        @media (max-width: 768px) {
            .navbar { padding: 16px 24px; }
            .container { padding: 24px 16px; }
            .card { padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='../index.html'">
            <img src="../public/img/logo-navbar.png" alt="HubISoccer">
            <span>HubISoccer</span>
        </div>
        <div class="nav-buttons">
            <a href="../index.html" class="nav-btn-outline">Accueil</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Logs de connexion</h1>
            <a href="admin-dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour au tableau de bord</a>
        </div>

        <div class="card">
            <div class="filters">
                <div class="filter-group">
                    <label>Email</label>
                    <input type="text" id="filterEmail" placeholder="Rechercher par email">
                </div>
                <div class="filter-group">
                    <label>Statut</label>
                    <select id="filterStatus">
                        <option value="">Tous</option>
                        <option value="success">Succès</option>
                        <option value="failure">Échec</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Date début</label>
                    <input type="datetime-local" id="filterStart">
                </div>
                <div class="filter-group">
                    <label>Date fin</label>
                    <input type="datetime-local" id="filterEnd">
                </div>
                <div class="filter-group">
                    <button class="btn btn-primary" id="applyFilters">Appliquer</button>
                </div>
            </div>
            <table>
                <thead>
                    <tr><th>Email</th><th>Date</th><th>Statut</th><th>Adresse IP</th><th>User Agent</th></tr>
                </thead>
                <tbody id="logsTable"></tbody>
            </table>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 HubISoccer - Administration sécurisée</p>
    </div>

    <script src="auth.js"></script>
    <script src="admin-auth.js"></script>
    <script>
        async function loadLogs() {
            let query = window.supabaseAuthPrive
                .from('login_attempts')
                .select('*')
                .order('attempted_at', { ascending: false });

            const email = document.getElementById('filterEmail').value.trim();
            if (email) query = query.ilike('email', `%${email}%`);

            const status = document.getElementById('filterStatus').value;
            if (status === 'success') query = query.eq('success', true);
            if (status === 'failure') query = query.eq('success', false);

            const start = document.getElementById('filterStart').value;
            if (start) query = query.gte('attempted_at', new Date(start).toISOString());

            const end = document.getElementById('filterEnd').value;
            if (end) query = query.lte('attempted_at', new Date(end).toISOString());

            const { data, error } = await query;
            if (error) {
                console.error(error);
                return;
            }
            const tbody = document.getElementById('logsTable');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">Aucune tentative trouvée</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(log => `
                <tr>
                    <td>${log.email}</td>
                    <td>${new Date(log.attempted_at).toLocaleString()}</td>
                    <td>${log.success ? '<span class="success-badge">Succès</span>' : '<span class="failure-badge">Échec</span>'}</td>
                    <td>${log.ip_address || '-'}</td>
                    <td>${log.user_agent ? log.user_agent.substring(0, 50) + (log.user_agent.length > 50 ? '…' : '') : '-'}</td>
                </tr>
            `).join('');
        }

        document.getElementById('applyFilters').addEventListener('click', loadLogs);
        loadLogs();
    </script>
</body>
</html>
