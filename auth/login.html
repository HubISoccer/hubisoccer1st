<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | HubISoccer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #1a1a2e;
            overflow-x: hidden;
        }
        /* fond abstrait */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .bg-shapes .shape {
            position: absolute;
            background: rgba(107, 59, 164, 0.03);
            border-radius: 50%;
            filter: blur(80px);
        }
        .shape-1 { width: 500px; height: 500px; top: -200px; left: -200px; }
        .shape-2 { width: 600px; height: 600px; bottom: -200px; right: -200px; background: rgba(107, 59, 164, 0.05); }
        .shape-3 { width: 300px; height: 300px; top: 40%; left: 10%; background: rgba(0, 200, 150, 0.02); }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(107,59,164,0.1);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo img { height: 42px; }
        .logo span { font-size: 1.4rem; font-weight: 700; color: #6b3ba4; }
        .nav-btn-outline {
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid #6b3ba4;
            color: #6b3ba4;
            background: transparent;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        .nav-btn-outline:hover { background: #6b3ba4; color: white; transform: translateY(-2px); }
        .container {
            min-height: calc(100vh - 90px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }
        .login-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 48px 56px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05), 0 0 0 1px rgba(107,59,164,0.05);
            transition: transform 0.3s ease;
            border: 1px solid rgba(107,59,164,0.15);
        }
        .login-card:hover { transform: translateY(-5px); box-shadow: 0 40px 70px rgba(107,59,164,0.1); }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header h2 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6b3ba4, #9b6bcd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .login-header p { color: #5a5a72; font-size: 0.95rem; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 8px; color: #2d2d3a; font-size: 0.9rem; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper input {
            width: 100%;
            padding: 14px 48px 14px 18px;
            font-size: 1rem;
            border: 1px solid #e2e2f0;
            border-radius: 28px;
            background: #fbfbff;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: #6b3ba4;
            box-shadow: 0 0 0 3px rgba(107,59,164,0.1);
        }
        .input-wrapper .toggle-password {
            position: absolute;
            right: 16px;
            cursor: pointer;
            color: #aaa;
            transition: color 0.2s;
        }
        .input-wrapper .toggle-password:hover { color: #6b3ba4; }
        .forgot-link { text-align: right; margin-top: 8px; }
        .forgot-link a { font-size: 0.85rem; color: #6b3ba4; text-decoration: none; font-weight: 500; }
        .forgot-link a:hover { text-decoration: underline; }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #6b3ba4;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
            font-family: 'Inter', sans-serif;
        }
        .btn-login:hover { background: #552e84; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(107,59,164,0.3); }
        .signup-link { text-align: center; margin-top: 24px; font-size: 0.9rem; color: #5a5a72; }
        .signup-link a { color: #6b3ba4; text-decoration: none; font-weight: 600; }
        .signup-link a:hover { text-decoration: underline; }
        .footer { text-align: center; padding: 24px; font-size: 0.8rem; color: #aaa; border-top: 1px solid #eee; }
        @media (max-width: 640px) {
            .navbar { padding: 16px 24px; }
            .login-card { padding: 32px 24px; margin: 0 16px; }
            .login-header h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='../index.html'">
            <img src="../public/img/logo-navbar.png" alt="HubISoccer">
            <span>HubISoccer</span>
        </div>
        <div class="nav-buttons">
            <a href="../index.html" class="nav-btn-outline">Accueil</a>
        </div>
    </nav>

    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <h2>Bienvenue</h2>
                <p>Connectez-vous à votre espace</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" required placeholder="votre@email.com">
                    </div>
                </div>

                <div class="form-group">
                    <label>Mot de passe</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" required placeholder="••••••••">
                        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                    <div class="forgot-link">
                        <a href="reset-password.html">Mot de passe oublié ?</a>
                    </div>
                </div>

                <button type="submit" class="btn-login">Se connecter</button>
            </form>

            <div class="signup-link">
                Pas encore de compte ? <a href="role-select.html?action=signup">S'inscrire</a>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 HubISoccer - The Hub of Inspiration of Soccer</p>
    </div>

    <script src="auth.js"></script>
    <script>
        // Vérifier si déjà connecté
        window.checkSessionAndRedirect();

        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.classList.toggle('fa-eye-slash');
        });

        const form = document.getElementById('loginForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                window.showToast('Veuillez remplir tous les champs', 'error');
                return;
            }

            try {
                const { data, error } = await window.supabaseAuthPrive.auth.signInWithPassword({ email, password });
                if (error) throw error;
                window.showToast('Connexion réussie', 'success');
                await window.redirectToDashboard();
            } catch (err) {
                window.showToast(err.message || 'Erreur de connexion', 'error');
            }
        });

// Vérification des bans
async function isUserBanned(email) {
    // Récupérer l'utilisateur par email (profiles)
    const { data: profile, error } = await window.supabaseAuthPrive
        .from('profiles')
        .select('id')
        .eq('email', email)
        .single();

    if (error || !profile) return false; // pas d'utilisateur, pas de ban

    // Vérifier s'il y a un ban actif
    const { data: ban, error: banError } = await window.supabaseAuthPrive
        .from('bans')
        .select('expires_at, reason')
        .eq('user_id', profile.id)
        .or('expires_at.is.null,expires_at.gt.now()')
        .maybeSingle();

    if (ban) {
        return { banned: true, reason: ban.reason, expires_at: ban.expires_at };
    }
    return { banned: false };
}

// Enregistrement d'une tentative
async function recordAttempt(email, success) {
    await window.supabaseAuthPrive
        .from('login_attempts')
        .insert([{ email, success }]);
}

// Vérification du seuil d'échecs
async function checkFailureThreshold(email) {
    const tenMinutesAgo = new Date(Date.now() - 10 * 60 * 1000).toISOString();
    const { count, error } = await window.supabaseAuthPrive
        .from('login_attempts')
        .select('*', { count: 'exact', head: true })
        .eq('email', email)
        .eq('success', false)
        .gte('attempted_at', tenMinutesAgo);
    if (error) return false;
    return count >= 6; // seuil de 6 échecs
}

    </script>
</body>
</html>
